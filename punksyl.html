<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf: The Urban Punk Deck - Print Layout</title>
    
    <!-- Font Punk & Ransom Note Vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Dimensi Kartu Fisik Presisi (Eropa Standard) */
            --w: 54mm;
            --h: 85.6mm;

            /* CMYK Safe Print Colors - Neon Punk Palette */
            --c-cyan: #00aeef;
            --c-magenta: #ec008c;
            --c-yellow: #fff200;
            --c-black: #231f20;
            --c-red: #ed1c24;
            --c-green: #00a651;
            --c-orange: #f37021;
            --c-purple: #662d91;
            --c-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #111;
            background-image: radial-gradient(circle at center, #222 0%, #000 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Anton', sans-serif; font-size: 3rem; letter-spacing: 2px; color: var(--c-yellow); text-shadow: 3px 3px 0 var(--c-magenta); transform: rotate(-1deg);}
        .header p { font-family: 'Courier Prime', monospace; color: #ccc; margin-top: 5px; font-weight: bold; }

        /* --- PAGES --- */
        .page {
            background: #ffffff; /* Kertas print warna putih */
            box-shadow: none; /* Tanpa shadow pada layout kertas */
            margin: 0 auto 40px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        @media print {
            .screen-only, .control-panel, .header { display: none !important; }
            html, body { margin: 0 !important; padding: 0 !important; }
            body { background: none !important; padding: 0 !important; display: block !important; }
            #pages-container { margin: 0 !important; padding: 0 !important; }
            .page { box-shadow: none !important; margin: 0 !important; page-break-after: always; page-break-inside: avoid; break-after: page; background: none !important; }
            .card { box-shadow: none !important; border: 1px solid #b0b0b0 !important; transform: none !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; page-break-inside: avoid; }
            .card-placeholder { visibility: hidden !important; border: 0 !important; }
            .page:last-child { page-break-after: auto !important; break-after: auto !important; }
        }

        /* =========================================
           UNIVERSAL PUNK DESIGN SYSTEM
           ========================================= */
        .card {
            width: var(--w);
            height: var(--h);
            background-color: var(--c-white);
            position: relative;
            box-shadow: none; /* Dihapus shadow agar rapi dan datar */
            border-radius: 3.5mm; /* Pojok kartu rounded */
            border: 1px solid #e0e0e0; /* Garis tepi abu-abu tipis */
            overflow: hidden;
            flex-shrink: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            padding: 0;
            pointer-events: none; /* Mencegah hover effect sesuai permintaan */
        }

        /* Slash Background Layer */
        .pk-bg-slash {
            position: absolute;
            top: var(--slash-top, -10mm);
            left: -15mm;
            right: -15mm;
            bottom: var(--slash-bot, 42mm);
            background: var(--accent);
            transform: rotate(var(--rot-slash, -5deg));
            z-index: 1;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 0 100%);
        }

        /* Grunge / Halftone overlay texture */
        .pk-bg-slash::after {
            content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
            background-image: radial-gradient(rgba(0,0,0,0.15) 20%, transparent 20%), radial-gradient(rgba(0,0,0,0.15) 20%, transparent 20%);
            background-position: 0 0, 2px 2px; background-size: 4px 4px; opacity: 0.5;
        }

        /* Content Container */
        .pk-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Header (Title & Subtitle) */
        .pk-header {
            padding: 4mm 3mm 2mm 3mm;
            transform: rotate(var(--rot-header, -2deg));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 2mm;
        }
        .pk-title {
            font-family: 'Anton', sans-serif;
            font-size: var(--title-size, 20pt);
            color: var(--title-color, var(--c-yellow));
            text-transform: uppercase;
            line-height: 0.85;
            /* Heavy black stroke & shadow for max visibility */
            text-shadow: 2px 2px 0 var(--c-black), -1px -1px 0 var(--c-black), 1px -1px 0 var(--c-black), -1px 1px 0 var(--c-black), 1px 1px 0 var(--c-black);
            letter-spacing: 1px;
            margin-bottom: 0;
            flex-shrink: 0;
        }
        .pk-subtitle {
            font-family: 'Courier Prime', monospace;
            font-size: 6.5pt;
            font-weight: 700;
            background: var(--c-black);
            color: var(--c-white);
            padding: 1mm 1.5mm;
            display: inline-block;
            transform: rotate(var(--rot-sub, 2deg));
            box-shadow: 1px 1px 0 var(--accent);
            white-space: nowrap;
        }

        /* Art / SVG Area */
        .pk-art {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-top: -6mm; /* Ditarik lebih ke atas */
            padding: 0 4mm;
        }

        /* Bottom Section (Quote & Desc) */
        .pk-bottom {
            padding: 3mm 3mm 5mm 3mm; /* Tambah padding bawah agar tulisan naik */
            padding-top: 2mm; /* Kurangi padding atas */
            margin-top: -4mm; /* Tarik kotak deskripsi lebih ke atas menimpa art */
            background: linear-gradient(transparent, var(--c-white) 15%, var(--c-white));
            position: relative;
            z-index: 5;
        }
        .pk-quote {
            font-family: 'Anton', sans-serif;
            font-size: 7pt; /* Sedikit dikecilkan agar lebih muat */
            color: var(--accent);
            line-height: 1.1;
            margin-bottom: 1.5mm; /* Rapatkan dengan teks deskripsi */
            transform: rotate(var(--rot-quote, 1deg));
            letter-spacing: 0.5px;
        }
        .pk-desc {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 4.8pt;
            color: var(--c-black);
            line-height: 1.25; /* Rapatkan sedikit antar baris */
            text-align: left;
        }
        .pk-desc strong { color: var(--accent); font-weight: 900; }

        /* Badges */
        .pk-faction {
            position: absolute;
            top: 2.5mm;
            right: 2.5mm;
            font-family: 'Anton', sans-serif;
            font-size: 6.5pt;
            color: var(--c-black);
            z-index: 3;
            letter-spacing: 1px;
        }
        .pk-code {
            position: absolute;
            bottom: 2mm;
            right: 2mm;
            font-family: 'Space Mono', monospace;
            font-size: 4.5pt;
            font-weight: 700;
            color: var(--c-black);
            background: var(--title-color, var(--c-yellow));
            padding: 0.5mm 1mm;
            z-index: 3;
            border: 1px solid var(--c-black);
            transform: rotate(var(--rot-code, -2deg));
        }

        /* =========================================
           CARD BACK - PRINT BLEED SYSTEM
           Menghilangkan border & memberikan bleed (margin negatif & stretch)
           sehingga lebih aman dipotong dari posisi kartu depan
           ========================================= */
        .card[data-id="card_back"] {
            border: none !important;
            border-radius: 0 !important;
            width: calc(var(--w) + 4mm) !important;
            height: calc(var(--h) + 4mm) !important;
            margin: -2mm !important;
            z-index: 10;
        }
        .card[data-id="card_back"] .pk-faction {
            top: 4.5mm !important; 
            right: 4.5mm !important;
        }
        .card[data-id="card_back"] .pk-code {
            bottom: 4mm !important; 
            right: 4mm !important;
        }
        .card[data-id="card_back"] .pk-header {
            padding: 6mm 5mm 2mm 5mm !important; 
        }
        .card[data-id="card_back"] .pk-art {
            padding: 0 6mm !important;
        }
        .card[data-id="card_back"] .pk-bottom {
            padding: 1mm 5mm 7mm 5mm !important; 
            background: none !important;
        }

        /* Specifically for Card Back text adjustments */
        .back-desc-area { text-align: center; border-top: 2px dashed var(--c-black); padding-top: 2mm; margin-top: 1mm;}
        .barcode { font-family: 'Space Mono', monospace; font-size: 14pt; letter-spacing: -2px; color: var(--c-black); font-weight: 900;}

    </style>
</head>
<body>

    <div class="header screen-only">
        <h1>THE PUNK ASYLUM</h1>
        <p>1 Design System. 6 Mahakarya Brutal. Layout Website Mode</p>
    </div>

    <!-- CONTROL PANEL FOR PRINT/DOWNLOAD -->
    <div class="control-panel screen-only" style="background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0; border-left: 5px solid var(--c-magenta); padding: 15px 25px; margin: 0 auto 30px; max-width: 900px; box-shadow: 5px 5px 0 var(--c-cyan); display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; position: relative; z-index: 10;">
        <div style="width: 100%; text-align: center; margin-bottom: 12px; border-bottom: 2px dashed var(--c-yellow); padding-bottom: 10px;">
            <p style="margin: 0; font-size: 13px; color: #fff; font-weight: 900; font-family: 'Space Mono', monospace; letter-spacing: -0.5px;">
                <span style="color: var(--c-yellow); font-weight: 700; background: var(--c-black); padding: 0 5px;">PRINT SYSTEM ACTIVE.</span> Hit <kbd style="background: var(--c-magenta); border-radius: 0; border: none; padding: 2px 4px; color:#fff;">Ctrl+P</kbd> & set:
                1. FORMAT: <span style="color:var(--c-cyan)">A4</span> | 
                2. SCALE: <span style="color:var(--c-cyan)">100%</span> | 
                3. MARGINS: <span style="color:var(--c-cyan)">NONE</span> | 
                4. <span style="color:var(--c-cyan)">BACKGROUND GRAPHICS</span>
            </p>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%;">
            <div class="control-group" style="display: flex; align-items: center; gap: 8px; background: #000; padding: 8px 14px; border: 1px solid #333;">
                <label for="paper-size" style="font-size: 11px; font-weight: 900; color: var(--c-magenta); text-transform: uppercase;">Paper:</label>
                <select id="paper-size" onchange="changePaperSize()" style="font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 600; padding: 4px 8px; border: 1px solid var(--c-magenta); background: #222; color: #fff; cursor: pointer; outline: none;">
                    <option value="a4">A4 (9 Cards)</option>
                    <option value="f4">F4 / Folio (9 Cards)</option>
                    <option value="a3">A3 (20 Cards)</option>
                    <option value="a3plus">A3+ (25 Cards)</option>
                    <option value="single">Single Layout</option>
                </select>
            </div>

            <div style="width: 2px; background: #444; margin: 0 5px;"></div>

            <div class="control-group" style="display: flex; align-items: center; gap: 8px; background: #000; padding: 8px 14px; border: 1px solid #333;">
                <label for="export-dpi" style="font-size: 11px; font-weight: 900; color: var(--c-cyan); text-transform: uppercase;">DPI Render:</label>
                <select id="export-dpi" onchange="changePaperSize()" style="font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 600; padding: 4px 8px; border: 1px solid var(--c-cyan); background: #222; color: #fff; cursor: pointer; outline: none;">
                    <option value="1">Standard (96)</option>
                    <option value="2">Sharp (192)</option>
                    <option value="4" selected>Extreme (384)</option>
                </select>
            </div>

            <div class="control-group" style="display: flex; align-items: center; gap: 8px; background: #000; padding: 8px 14px; border: 1px solid #333;">
                <label for="back-mode" style="font-size: 11px; font-weight: 900; color: var(--c-yellow); text-transform: uppercase;">Back Mode:</label>
                <select id="back-mode" onchange="changePaperSize()" style="font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 600; padding: 4px 8px; border: 1px solid var(--c-yellow); background: #222; color: #fff; cursor: pointer; outline: none;">
                    <option value="duplex">Duplex Auto</option>
                    <option value="manual-long">Manual: Long Edge</option>
                    <option value="manual-short">Manual: Short Edge</option>
                </select>
            </div>

            <button class="control-btn" onclick="window.print()" title="Ctrl+P" style="font-family: 'Anton', sans-serif; font-size: 14px; letter-spacing: 1px; padding: 10px 18px; cursor: pointer; border: none; background: var(--c-yellow); color: var(--c-black); box-shadow: 3px 3px 0 var(--c-cyan);">
                >> PRINT / PDF
            </button>

            <div style="width: 2px; background: #444; margin: 0 5px;"></div>

            <div class="control-group" style="display: flex; align-items: center; gap: 8px; background: #000; padding: 8px 14px; border: 1px solid #333;">
                <label for="export-format" style="font-size: 11px; font-weight: 900; color: var(--c-green); text-transform: uppercase;">Arch:</label>
                <select id="export-format" style="font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 600; padding: 4px 8px; border: 1px solid var(--c-green); background: #222; color: #fff; cursor: pointer; outline: none;">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                </select>
            </div>
            <button id="btn-download-all" class="control-btn" onclick="downloadAllCardsDomToImage('Punksyl', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#ffffff':null})" style="font-family: 'Anton', sans-serif; font-size: 14px; letter-spacing: 1px; padding: 10px 18px; cursor: pointer; border: none; background: var(--c-magenta); color: var(--c-white); box-shadow: 3px 3px 0 var(--c-yellow);">
                [ ZIP ARCHIVE ]
            </button>
        </div>
    </div>

    <!-- DYNAMIC CONTAINER -->
    <div id="pages-container"></div>

    <script src="punksyl_data.js"></script>
    <script src="svg_punksyl.js"></script>

    <script>
        function generatePunksylCard(card) {
            return `
            <div class="card ${card.className || ''} c-code-wrapper" data-id="${card.id}" style="${card.style}">
                <div class="pk-bg-slash" style="${card.slashStyle || ''}"></div>
                <div class="pk-faction" style="${card.factionStyle || ''}">${card.faction}</div>
                <div class="pk-content">
                    <div class="pk-header">
                        <div class="pk-title" style="${card.titleStyle || ''}">${card.title}</div>
                        <div class="pk-subtitle" style="${card.subtitleStyle || ''}">${card.subtitle}</div>
                    </div>
                    <div class="pk-art" style="${card.artStyle || ''}">
                        ${punksylArt[card.id] || ''}
                    </div>
                    <div class="pk-bottom" style="${card.bottomStyle || ''}">
                        <div class="pk-quote" style="${card.quoteStyle || ''}">${card.quote}</div>
                        <div class="pk-desc">
                            ${card.descHtml}
                        </div>
                    </div>
                </div>
                <div class="pk-code" style="${card.codeStyle || ''}">${card.code}</div>
            </div>`;
        }

        function mapBackSlotIndex(slotIndex, cols, rows, backMode) {
            var row = Math.floor(slotIndex / cols);
            var col = slotIndex % cols;
            if (backMode === 'manual-long') {
                col = (cols - 1) - col;
            } else if (backMode === 'manual-short') {
                row = (rows - 1) - row;
            }
            return (row * cols) + col;
        }

        function renderPageFromSlots(slotCards, isBackPage) {
            var html = '<div class="page' + (isBackPage ? ' page-back' : '') + '">';
            var placeholder = '<div class="card card-placeholder" style="visibility:hidden;border:0 !important;box-shadow:none !important;background:transparent !important;pointer-events:none !important;" aria-hidden="true"></div>';
            for (var i = 0; i < slotCards.length; i++) {
                if (slotCards[i]) html += generatePunksylCard(slotCards[i]);
                else html += placeholder;
            }
            html += '</div>';
            return html;
        }

        function changePaperSize() {
            var paperSelect = document.getElementById('paper-size');
            var dpiSelect = document.getElementById('export-dpi') || document.getElementById('pdf-dpi');
            var backModeSelect = document.getElementById('back-mode');
            var paperId = paperSelect ? paperSelect.value : 'a4';
            var dpiScale = parseFloat(dpiSelect ? dpiSelect.value : '1');
            var backMode = backModeSelect ? backModeSelect.value : 'duplex';
            var container = document.getElementById('pages-container') || document.querySelector('.pages-container');
            if (!container) return;
            container.innerHTML = '';
            
            var config = window.CardPrintLayout ? window.CardPrintLayout.applyCSS(paperId, dpiScale) : { cardsPerPage: 9, cols: 3, rows: 3 };
            var cardsPerPage = config.cardsPerPage || (config.cols * config.rows);
            var cols = config.cols || 3;
            var rows = config.rows || 3;
            
            var htmlContent = '';
            var frontCards = punksylDeckData.filter(function(c) { return c.id !== 'card_back'; });
            var backCardData = null;
            for (var k = 0; k < punksylDeckData.length; k++) {
                if (punksylDeckData[k].id === 'card_back') { backCardData = punksylDeckData[k]; break; }
            }

            if (paperId === 'single') {
                for (var s = 0; s < frontCards.length; s++) {
                    htmlContent += renderPageFromSlots([frontCards[s]], false);
                    if (backCardData) {
                        htmlContent += renderPageFromSlots([backCardData], true);
                    }
                }
            } else {
                for (var i = 0; i < frontCards.length; i += cardsPerPage) {
                    var pageCards = frontCards.slice(i, i + cardsPerPage);
                    var frontSlots = new Array(cardsPerPage).fill(null);
                    for (var j = 0; j < pageCards.length; j++) {
                        frontSlots[j] = pageCards[j];
                    }
                    htmlContent += renderPageFromSlots(frontSlots, false);

                    if (backCardData) {
                        var backSlots = new Array(cardsPerPage).fill(null);
                        for (var b = 0; b < pageCards.length; b++) {
                            var mappedIndex = mapBackSlotIndex(b, cols, rows, backMode);
                            backSlots[mappedIndex] = backCardData;
                        }
                        htmlContent += renderPageFromSlots(backSlots, true);
                    }
                }
            }

            container.innerHTML = htmlContent;
        }

        document.addEventListener("DOMContentLoaded", () => {
            changePaperSize();
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@2.8.0/dist/dom-to-image-more.min.js"></script>
    <script src="download_helper.js?v=2"></script>
</body>
</html>
