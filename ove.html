<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desain Kartu Eksklusif Obsidian Vanguard - Supreme Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --card-w: 54mm;
            --card-h: 85.6mm;
            --gold-light: #fcf6ba;
            --gold-base: #d4af37;
            --gold-dark: #aa771c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
            color: #111;
            padding: 40px 10px;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .header-title {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: #aa771c;
            margin-bottom: 10px;
            letter-spacing: 4px;
            text-shadow: none;
        }

        .header-subtitle {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .screen-note {
            display: none; /* Replaced by control-panel */
        }
        
        /* Modern Control Panel */
        .control-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; padding: 15px 25px; margin: 0 auto 30px; max-width: 900px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; position: relative; z-index: 10;}
        .control-group { display: flex; align-items: center; gap: 8px; background: #fdfbf7; padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); }
        .control-group label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
        .control-group select { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; background: #fff; color: #222; cursor: pointer; outline: none; transition: border-color 0.2s; }
        .control-group select:focus { border-color: #d4af37; }
        .control-btn { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; padding: 10px 18px; border-radius: 8px; cursor: pointer; letter-spacing: 0.5px; border: none; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; align-items: center; gap: 6px; }
        .btn-gold { background: linear-gradient(135deg, #aa771c, #d4af37); color: #000; box-shadow: 0 4px 12px rgba(170, 119, 28, 0.3); }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(170, 119, 28, 0.5); }
        .btn-red { background: linear-gradient(135deg, #dc143c, #8a0303); color: #fff; box-shadow: 0 4px 12px rgba(138, 3, 3, 0.3); }
        .btn-red:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(138, 3, 3, 0.5); }
        kbd { background: #eee; border-radius: 3px; border: 1px solid #b4b4b4; box-shadow: 0 1px 1px rgba(0,0,0,.2); color: #333; display: inline-block; font-size: .85em; font-weight: 700; line-height: 1; padding: 2px 4px; white-space: nowrap; }

        .page {
            background: #fff;
            margin: 0 auto 30px;
            padding: 9.15mm 3.75mm;
            display: grid;
            gap: 6mm;
            justify-content: center;
            align-content: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            position: relative;
            border-radius: 2px;
            /* Layout size/grid is managed dynamically via JS */
        }

        .card {
            width: var(--card-w);
            height: var(--card-h);
            position: relative;
            background: #0a0a0c;
            border-radius: 3mm;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            page-break-inside: avoid;
            background: #0a0a0c;
            border: none;
        }

        .safe-area {
            position: absolute;
            inset: 2mm;
            pointer-events: none;
        }

        .safe-area > * {
            pointer-events: auto;
        }

        .gold-text-fx {
            background: linear-gradient(to right, #bf953f, var(--gold-light), #b38728, #fbf5b7, var(--gold-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .silver-text-fx {
            background: linear-gradient(to right, #888, #fff, #aaa, #fff, #666);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .theme-supreme { --fac-color: #8a2be2; --fac-dark: #4a154b; --fac-light: #b066ff; }
        .theme-good { --fac-color: #4183d7; --fac-dark: #0f2c59; --fac-light: #88aadd; }
        .theme-evil { --fac-color: #dc143c; --fac-dark: #590f0f; --fac-light: #ff6666; }
        .theme-neutral { --fac-color: #a0a0a0; --fac-dark: #2a2a2a; --fac-light: #e0e0e0; }
        .theme-back { --fac-color: #d4af37; --fac-dark: #1a1505; --fac-light: #fcf6ba; }

        .card-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, var(--fac-dark) 0%, #0a0a0c 70%);
        }

        .card-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="2" cy="2" r="1" fill="rgba(212,175,55,0.2)"/></svg>');
            opacity: 0.6;
        }


        .card-ring {
            position: absolute;
            top: -10mm;
            left: -10mm;
            right: -10mm;
            height: 60mm;
            border: 1px solid var(--fac-color);
            border-radius: 50%;
            opacity: 0.3;
            box-shadow: inset 0 0 20px var(--fac-dark), 0 0 20px var(--fac-dark);
            /* Clip off the bottom 42% of the ellipse so its bottom arc
               (which falls ~50mm from card top) doesn't render as a
               thin horizontal line in exported images. */
            clip-path: inset(0 0 42% 0);
        }

        .card-header {
            position: absolute;
            top: 3mm;
            width: 100%;
            text-align: center;
            display: flex;
            justify-content: space-between;
            padding: 0 4mm;
            z-index: 10;
        }

        .card-id { font-size: 7px; color: #fff; font-weight: bold; letter-spacing: 2px; }

        .card-faction {
            font-size: 5px;
            background: var(--fac-color);
            color: #fff;
            padding: 1mm 2mm;
            border-radius: 2mm;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
        }
        
        .theme-neutral .card-faction {
            color: #000;
        }

        .card-svg {
            position: absolute;
            top: 12mm;
            width: 100%;
            height: 32mm;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .card-svg svg {
            height: 100%;
            width: 100%;
            filter: drop-shadow(0 5px 15px var(--fac-dark));
        }

        .card-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 48mm;
            background: linear-gradient(0deg, rgba(8, 8, 10, 1) 60%, rgba(8, 8, 10, 0) 100%);
            padding: 5mm 4mm;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 10;
        }

        .card-name-en {
            font-size: 6px;
            color: var(--gold-base);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .card-name-id {
            font-family: 'Cinzel', serif;
            font-size: 15px;
            font-weight: 900;
            margin: 1mm 0;
            line-height: 1;
        }

        .card-ability {
            font-size: 6.5px;
            color: var(--gold-light);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 1.5mm 0;
            margin-bottom: 2mm;
            font-weight: 800;
            letter-spacing: 1px;
            background: rgba(212, 175, 55, 0.05);
            text-transform: uppercase;
        }

        .card-desc {
            font-size: 6.5px;
            color: #ccc;
            line-height: 1.4;
            margin-bottom: 2mm;
            text-align: justify;
            text-align-last: center;
        }

        .card-desc strong {
            color: var(--fac-light);
            font-weight: 800;
        }

        .card-footer {
            font-size: 5px;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Card Back */
        .theme-back .card-bg { 
            background: radial-gradient(circle at 50% 50%, #151005 0%, #050505 100%); 
        }
        .theme-back .card-bg::after {
            content: ''; position: absolute; inset: 0;
            background-image: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.04) 0px, transparent 1px, transparent 12px, rgba(212, 175, 55, 0.04) 13px);
            opacity: 0.8;
        }
        .theme-back .card-ring {
            top: 5mm; left: 5mm; right: 5mm; bottom: 5mm; border-radius: 3mm;
            width: auto; height: auto; transform: none;
            border: 1px solid var(--gold-dark); opacity: 0.7;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.15), 0 0 10px rgba(0,0,0,0.8);
            clip-path: none;
            background: rgba(10, 10, 12, 0.4);
        }
        .theme-back .card-svg {
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 44mm; height: 44mm;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.25));
        }
        .theme-back .card-text-top {
            position: absolute; top: 9mm; width: 100%; text-align: center;
            font-family: 'Cinzel', serif; font-size: 8px; font-weight: 700;
            color: var(--gold-light); letter-spacing: 4px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
        }
        .theme-back .card-text-bottom {
            position: absolute; bottom: 14mm; width: 100%; text-align: center;
            font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold-base);
            font-weight: 900; letter-spacing: 9px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.9), 0 0 20px rgba(212, 175, 55, 0.4);
        }
        .theme-back .card-text-sub {
            position: absolute; bottom: 8.5mm; width: 100%; text-align: center;
            font-size: 6px; color: #fff; letter-spacing: 4px;
            font-weight: bold; /* Diubah menjadi bold sesuai permintaan */
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        /* Role-Specific Unique Styling (DECK 1) */
        
        /* 1. SP·01 : Game Moderator */
        .role-SP_01 .card-bg { 
            background: radial-gradient(circle at 50% 20%, #4a154b 0%, #050110 80%), radial-gradient(circle at 20% 80%, rgba(138, 43, 226, 0.3) 0%, transparent 50%); 
        }
        .role-SP_01 .card-ring { 
            border: 1.5px dashed #b066ff; 
            box-shadow: inset 0 0 30px #4a154b, 0 0 30px #8a2be2; 
            border-radius: 50%;
        }
        .role-SP_01 .card-ring::after {
            content: ''; position: absolute; inset: -4mm; border: 1px dotted #d4af37; border-radius: 50%; opacity: 0.8;
            /* Using simple static rotate to visually look different without actual animation overhead */
            transform: rotate(45deg);
        }

        /* 2. VL·01 : Seer */
        .role-VL_01 .card-bg { 
            background: repeating-radial-gradient(circle at 50% 30%, rgba(15, 44, 89, 0.4) 0px, rgba(15, 44, 89, 0) 10px, rgba(65, 131, 215, 0.1) 20px), radial-gradient(circle at 50% 30%, #0f2c59 0%, #0a0a0c 80%); 
        }
        .role-VL_01 .card-ring {
            border-radius: 75% 0px; 
            border: 1.5px solid #88aadd; 
            top: 6mm; left: 50%; width: 45mm; height: 45mm;
            transform: translateX(-50%) rotate(45deg);
            box-shadow: 0 0 15px rgba(65, 131, 215, 0.5) inset, 0 0 20px rgba(136, 170, 221, 0.3);
            clip-path: none;
            background: radial-gradient(circle at 50% 50%, rgba(65, 131, 215, 0.15) 0%, transparent 60%);
        }
        .role-VL_01 .card-ring::after {
            content: ''; position: absolute; inset: 15mm; border-radius: 50%; border: 1px solid rgba(212, 175, 55, 0.6);
        }

        /* 3. VL·02 : Guardian */
        .role-VL_02 .card-bg {
            background: linear-gradient(135deg, rgba(17,17,17,0.8) 25%, rgba(26,37,48,0.8) 25%, rgba(26,37,48,0.8) 50%, rgba(17,17,17,0.8) 50%, rgba(17,17,17,0.8) 75%, rgba(26,37,48,0.8) 75%, rgba(26,37,48,0.8) 100%);
            background-size: 8mm 8mm; 
        }
        .role-VL_02 .card-bg::after {
            content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 30%, transparent 40%, rgba(10, 10, 12, 0.95) 80%);
        }
        .role-VL_02 .card-ring {
            border-radius: 4mm;
            border-width: 2px;
            border-style: solid;
            border-color: #88aadd;
            background: rgba(15, 44, 89, 0.2);
            clip-path: polygon(50% 0%, 100% 15%, 100% 85%, 50% 100%, 0% 85%, 0% 15%);
            top: -2mm; height: 50mm;
        }

        /* 4. VL·14 - 17 : Villager */
        .role-VL_14 .card-bg, .role-VL_15 .card-bg, .role-VL_16 .card-bg, .role-VL_17 .card-bg {
            background: radial-gradient(circle at 50% 30%, #1e3a2e 0%, #0a0a0c 70%); /* Earthy green base */
        }
        .role-VL_14 .card-bg::after, .role-VL_15 .card-bg::after, .role-VL_16 .card-bg::after, .role-VL_17 .card-bg::after {
            content: ''; position: absolute; inset: 0; 
            background-image: repeating-linear-gradient(45deg, rgba(80, 150, 80, 0.03) 0px, rgba(80, 150, 80, 0.03) 2px, transparent 2px, transparent 10px);
        }
        .role-VL_14 .card-ring, .role-VL_15 .card-ring, .role-VL_16 .card-ring, .role-VL_17 .card-ring {
            border-color: #557a55;
            box-shadow: inset 0 0 20px #1e3a2e;
            border-style: double;
            border-width: 4px;
        }

        /* 5. WW·01 - 02 : Werewolf */
        .role-WW_01 .card-bg, .role-WW_02 .card-bg {
            background: radial-gradient(circle at 50% 40%, rgba(89, 15, 15, 0.8) 0%, rgba(10, 10, 12, 1) 70%); 
        }
        .role-WW_01 .card-bg::before, .role-WW_02 .card-bg::before {
            display: none; /* Hide standard pattern */
        }
        .role-WW_01 .card-bg::after, .role-WW_02 .card-bg::after {
            content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 40mm;
            background: linear-gradient(to top, rgba(160, 10, 30, 0.4), transparent);
            pointer-events: none;
            z-index: 1;
        }
        .role-WW_01 .card-ring, .role-WW_02 .card-ring {
            border: 2px solid #dc143c;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; /* Organic distorted shape */
            transform: rotate(-15deg);
            opacity: 0.6;
            box-shadow: inset 0 0 25px rgba(220, 20, 60, 0.4);
            clip-path: none;
        }

        /* Role-Specific Unique Styling (DECK 2) */
        
        /* 6. VL·03 : Witch */
        .role-VL_03 .card-bg { 
            background: linear-gradient(135deg, rgba(50, 205, 50, 0.5) 0%, rgba(10, 10, 12, 0.9) 40%, rgba(10, 10, 12, 0.9) 60%, rgba(255, 0, 255, 0.4) 100%); 
        }
        .role-VL_03 .card-bg::after {
            content: ''; position: absolute; inset: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(50, 205, 50, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.15) 0%, transparent 40%),
                /* Edge blackout: left, right, and bottom */
                linear-gradient(to right, #080808 0%, transparent 18%, transparent 82%, #080808 100%),
                linear-gradient(to top, #080808 0%, transparent 20%);
        }
        .role-VL_03 .card-ring {
            border: none;
            box-shadow: -5px -5px 15px rgba(50, 205, 50, 0.4), 5px 5px 15px rgba(255, 0, 255, 0.4);
            border-left: 3px solid #32cd32;
            border-right: 3px solid #ff00ff;
            transform: rotate(15deg);
            border-radius: 60% 40% 70% 30% / 50% 50% 50% 50%;
        }

        /* 7. VL·04 : Hunter */
        .role-VL_04 .card-bg {
            background: radial-gradient(circle at 50% 50%, rgba(10, 10, 12, 0) 0%, rgba(40, 20, 10, 0.6) 80%), repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 15px);
        }
        .role-VL_04 .card-bg::after {
            content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 30%, transparent 50%, rgba(0, 0, 0, 0.9) 90%);
        }
        .role-VL_04 .card-ring {
            border-radius: 0; border: 1px solid rgba(136, 170, 221, 0.3);
            background: transparent;
            width: 40mm; height: 40mm; top: 8mm; left: 50%; transform: translateX(-50%);
            clip-path: polygon(45% 0%, 55% 0%, 55% 45%, 100% 45%, 100% 55%, 55% 55%, 55% 100%, 45% 100%, 45% 55%, 0% 55%, 0% 45%, 45% 45%);
            background: rgba(136, 170, 221, 0.2);
            box-shadow: none;
        }
        .role-VL_04 .card-ring::after {
            content: ''; position: absolute; inset: 5mm; border-radius: 50%; border: 1.5px dashed rgba(136, 170, 221, 0.8);
        }

        /* 8. VL·05 : King */
        .role-VL_05 .card-bg {
            background: radial-gradient(circle at 50% 10%, rgba(139, 0, 0, 0.7) 0%, rgba(10, 10, 12, 1) 70%);
        }
        .role-VL_05 .card-bg::after {
            content: ''; position: absolute; inset: 0;
            background-image: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.05) 0px, rgba(212, 175, 55, 0.05) 5px, transparent 5px, transparent 20px);
        }
        .role-VL_05 .card-ring {
            border: 3px solid #d4af37;
            border-radius: 2mm 2mm 50% 50%;
            clip-path: polygon(0% 20%, 10% 0%, 20% 20%, 30% 0%, 40% 20%, 50% 0%, 60% 20%, 70% 0%, 80% 20%, 90% 0%, 100% 20%, 100% 100%, 0% 100%);
            top: 2mm; height: 45mm; left: 50%; width: 45mm; transform: translateX(-50%);
            box-shadow: inset 0 30px 20px rgba(139, 0, 0, 0.4), 0 0 15px rgba(212, 175, 55, 0.3);
            background: rgba(139, 0, 0, 0.1);
        }

        /* 9. VL·06 : Drunker */
        .role-VL_06 .card-bg {
            background: radial-gradient(ellipse at 30% 60%, rgba(218, 165, 32, 0.3) 0%, transparent 60%), radial-gradient(ellipse at 70% 30%, rgba(205, 133, 63, 0.25) 0%, transparent 60%);
        }
        .role-VL_06 .card-bg::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-radial-gradient(circle at 50% 50%, rgba(218, 165, 32, 0.05) 0, rgba(218, 165, 32, 0.1) 10px, transparent 15px);
            opacity: 0.5; filter: blur(2px);
        }
        .role-VL_06 .card-ring {
            border: 2px solid rgba(218, 165, 32, 0.6);
            border-radius: 40% 70% 50% 60% / 60% 40% 70% 50%;
            transform: rotate(30deg) translate(-10%, 10%);
            box-shadow: inset -10px -10px 20px rgba(205, 133, 63, 0.3);
        }
        .role-VL_06 .card-ring::after {
            content: ''; position: absolute; inset: -4mm; border: 1.5px dashed rgba(218, 165, 32, 0.4);
            border-radius: 60% 50% 70% 40% / 50% 70% 40% 60%; transform: rotate(-45deg);
        }

        /* 10. VL·07 : Little Girl */
        .role-VL_07 .card-bg {
            background: #0a0a0c;
        }
        .role-VL_07 .card-bg::after {
            content: ''; position: absolute; inset: 0;
            /* Door crack effect: thin light in the middle, complete dark sides */
            background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 30%, rgba(136, 170, 221, 0.25) 50%, rgba(0,0,0,0.85) 70%, rgba(0,0,0,0.95) 100%);
        }
        .role-VL_07 .card-ring {
            width: 30mm; height: 30mm; left: 50%; top: 12mm; transform: translateX(-50%);
            border: 1px dotted rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(136, 170, 221, 0.1) inset;
        }

        /* 11. VL·09 : Sheriff */
        .role-VL_09 .card-bg {
            background: linear-gradient(0deg, rgba(15, 44, 89, 0.6) 0%, rgba(10, 10, 12, 1) 100%);
        }
        .role-VL_09 .card-bg::after {
            content: ''; position: absolute; inset: 0;
            background-image: repeating-linear-gradient(-45deg, rgba(255, 215, 0, 0.05) 0px, rgba(255, 215, 0, 0.05) 4px, transparent 4px, transparent 15px);
        }
        .role-VL_09 .card-ring {
            border: 2px solid #ffd700; background: rgba(255, 215, 0, 0.05);
            /* 6-pointed star / Hexagon morph */
            clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%);
            border-radius: 0; width: 45mm; height: 45mm; left: 50%; top: 5mm; transform: translateX(-50%);
            box-shadow: none;
        }

        /* 12. WW·03 : Alpha Wolf */
        .role-WW_03 .card-bg {
            background: radial-gradient(circle at 50% 50%, rgba(120, 10, 10, 0.7) 0%, #0a0a0c 80%);
        }
        .role-WW_03 .card-bg::after {
            content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 50mm;
            background: linear-gradient(to top, rgba(20, 5, 5, 0.9), rgba(160, 20, 20, 0.6), transparent);
            pointer-events: none; z-index: 1;
        }
        .role-WW_03 .card-ring {
            border: 3px solid #ff3333;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; 
            transform: rotate(-25deg);
            opacity: 0.8;
            box-shadow: inset 0 0 35px rgba(255, 50, 50, 0.6), 0 0 20px rgba(255, 0, 0, 0.3);
            background: radial-gradient(circle at 20% 80%, rgba(255, 50, 50, 0.3) 0%, transparent 60%);
        }

        /* 13. NT·01 : Jester */
        .role-NT_01 .card-bg {

            border-left: 3px solid rgba(139, 0, 0, 0.6);
            /* Splintered at the bottom claws */
            clip-path: polygon(0 0, 100% 0, 100% 60%, 90% 80%, 100% 100%, 75% 90%, 50% 100%, 25% 90%, 0 100%, 10% 80%, 0 60%);
            box-shadow: inset 0 10px 15px rgba(136, 170, 221, 0.2), inset 0 -15px 15px rgba(139, 0, 0, 0.5);
        }

        /* 62. NT·08 : Vampire (Gothic Fangs) */
        .role-NT_08 .card-bg {
            background: linear-gradient(135deg, rgba(60, 0, 20, 0.8) 0%, rgba(10, 10, 12, 1) 100%);
        }
        .role-NT_08 .card-bg::after { /* Velvet lace overlay */
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(rgba(0,0,0,0.5) 20%, transparent 20%), radial-gradient(rgba(0,0,0,0.5) 20%, transparent 20%);
            background-position: 0 0, 5px 5px;
            background-size: 10px 10px; opacity: 0.3;
        }
        .role-NT_08 .card-ring {
            border: 2px solid rgba(200, 30, 50, 0.6);
            border-radius: 50% 50% 20% 20%;
            width: 45mm; height: 50mm; top: 2mm; left: 50%; transform: translateX(-50%);
            /* Two fangs pointing down */
            clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 60%, 65% 100%, 50% 70%, 35% 100%, 20% 60%, 0 80%);
            box-shadow: inset 0 0 25px rgba(100, 0, 20, 0.8);
            background: rgba(60, 0, 20, 0.2);
        }

        /* 63. NT·09 : The Count (Vampire High Collar) */
        .role-NT_09 .card-bg {
            background: radial-gradient(ellipse at 50% 80%, rgba(100, 0, 10, 0.8) 0%, rgba(20, 0, 5, 1) 100%);
        }
        .role-NT_09 .card-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0, 0, 0, 0.8) 100%);
        }
        .role-NT_09 .card-ring {
            border: 4px solid #8b0000; /* Rich crimson */
            border-bottom: 2px solid rgba(212, 175, 55, 0.5); /* Gold trim bottom */
            border-radius: 0 0 40% 40%;
            width: 46mm; height: 55mm; top: -2mm; left: 50%; transform: translateX(-50%);
            /* Extreme aristocratic collar curving around */
            clip-path: polygon(15% 0%, 50% 20%, 85% 0%, 100% 30%, 100% 100%, 0 100%, 0 30%);
            box-shadow: inset 0 15px 20px rgba(0, 0, 0, 0.9), 0 0 10px rgba(212, 175, 55, 0.3);
            background: rgba(100, 0, 10, 0.1);
        }

        /* Role-Specific Unique Styling (DECK 8 - MONSTERS & EXPANSION FINAL) */
        
        /* 64. NT·10 : Chupacabra (Desert Thorns) */
        .role-NT_10 .card-bg {
            background: radial-gradient(circle at 60% 40%, rgba(100, 50, 30, 0.6) 0%, rgba(20, 10, 5, 0.9) 60%, rgba(10, 10, 12, 1) 100%);
        }
        .role-NT_10 .card-bg::after { /* Dust/sand particles */
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(rgba(150, 100, 50, 0.2) 1px, transparent 1px);
            background-size: 6px 6px; opacity: 0.5; filter: blur(0.5px);
        }
        .role-NT_10 .card-ring {
            border: 3px solid rgba(139, 40, 20, 0.8);
            border-radius: 50%; width: 45mm; height: 45mm; top: 5mm; left: 50%; transform: translateX(-50%);
            /* Cactus thorns jagged edge */
            clip-path: polygon(10% 5%, 15% 15%, 25% 0%, 35% 15%, 50% 5%, 65% 15%, 75% 0%, 85% 15%, 90% 5%, 95% 25%, 100% 15%, 95% 35%, 100% 50%, 95% 65%, 100% 85%, 90% 95%, 85% 85%, 75% 100%, 65% 85%, 50% 95%, 35% 85%, 25% 100%, 15% 85%, 10% 95%, 5% 75%, 0% 85%, 5% 65%, 0% 50%, 5% 35%, 0% 15%, 5% 25%);
            box-shadow: inset 0 0 15px rgba(100, 20, 10, 0.6);
            background: rgba(139, 40, 20, 0.1);
        }

        /* 65. NT·11 : Bogeyman (Closet Nightmare Haze) */
        .role-NT_11 .card-bg {
            background: linear-gradient(180deg, rgba(20, 0, 40, 0.8) 0%, rgba(5, 5, 10, 1) 100%);
        }
        .role-NT_11 .card-bg::after { /* Haze effect */
            content: ''; position: absolute; inset: 0; background: repeating-radial-gradient(circle at 50% 100%, rgba(60, 0, 80, 0.3) 0px, transparent 10px, rgba(40, 0, 60, 0.4) 20px); filter: blur(3px);
        }
        .role-NT_11 .card-ring {
            border: 4px solid rgba(80, 40, 120, 0.5);
            /* Extremely deformed wobbly ring */
            border-radius: 30% 70% 20% 80% / 60% 40% 70% 30%;
            width: 45mm; height: 45mm; top: 5mm; left: 50%; transform: translateX(-50%);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9), 0 0 15px rgba(80, 20, 100, 0.6);
            clip-path: none; filter: contrast(1.2);
            background: rgba(40, 10, 60, 0.3);
        }

        /* 66. NT·12 : Hoodlum (Concrete & Heavy Hexagon) */
        .role-NT_12 .card-bg {
            background: radial-gradient(circle at 40% 60%, rgba(60, 65, 70, 0.8) 0%, rgba(20, 22, 25, 1) 80%);
        }
        .role-NT_12 .card-bg::after { /* Asphalt noise */
            content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.1) 0px, transparent 2px, rgba(0,0,0,0.2) 4px);
        }
        .role-NT_12 .card-ring {
            border: 6px solid rgba(100, 105, 110, 0.9); /* Cold steel */
            border-radius: 0; width: 46mm; height: 50mm; top: 2mm; left: 50%; transform: translateX(-50%);
            /* Cold heavy hexagonal iron pipe */
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
            background: rgba(50, 55, 60, 0.2);
        }

        /* 67. NT·13 : Wild Child (Feral Roots) */
        .role-NT_13 .card-bg {
            background: linear-gradient(135deg, rgba(20, 60, 30, 0.6) 0%, rgba(40, 30, 10, 0.8) 50%, rgba(10, 10, 12, 1) 100%);
        }
        .role-NT_13 .card-bg::after { /* Feral leaves blur */
            content: ''; position: absolute; top: -10mm; right: -10mm; width: 40mm; height: 50mm; background: radial-gradient(ellipse, rgba(50, 100, 40, 0.4) 0%, transparent 60%); filter: blur(5px);
        }
        .role-NT_13 .card-ring {
            border: 4px solid rgba(80, 120, 60, 0.8);
            border-radius: 50%; width: 45mm; height: 45mm; top: 5mm; left: 50%; transform: translateX(-50%);
            /* Messy vines reaching in */
            clip-path: polygon(10% 0, 20% 20%, 40% 0, 50% 15%, 60% 0, 80% 20%, 90% 0, 100% 30%, 85% 40%, 100% 50%, 80% 60%, 100% 80%, 75% 75%, 50% 100%, 30% 80%, 20% 100%, 10% 80%, 0 60%, 15% 50%, 0 35%);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.7);
            background: rgba(80, 120, 60, 0.1);
        }

        /* 68. NT·14 : Sasquatch (Pine Needle Haze & Fur) */
        .role-NT_14 .card-bg {
            background: radial-gradient(circle at 50% 30%, rgba(30, 40, 30, 0.6) 0%, rgba(15, 20, 15, 0.9) 60%, #0a0a0c 100%);
        }
        .role-NT_14 .card-bg::after {
            content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 20% 80%, rgba(0,0,0,0.8), transparent 50%), radial-gradient(circle at 80% 80%, rgba(0,0,0,0.8), transparent 50%);
        }
        .role-NT_14 .card-ring {
            border: 2px solid rgba(90, 100, 80, 0.6);
            border-radius: 50%; width: 45mm; height: 45mm; top: 5mm; left: 50%; transform: translateX(-50%);
            /* Hairy/Furry edge, tight zigzag */
            clip-path: polygon(2% 0%, 5% 5%, 8% 2%, 12% 8%, 15% 3%, 20% 10%, 23% 5%, 28% 12%, 32% 6%, 37% 15%, 42% 8%, 48% 18%, 52% 10%, 58% 20%, 62% 12%, 68% 22%, 72% 15%, 78% 25%, 82% 18%, 88% 28%, 92% 21%, 98% 30%, 95% 35%, 100% 40%, 96% 45%, 100% 50%, 96% 55%, 100% 60%, 95% 65%, 98% 70%, 92% 79%, 88% 72%, 82% 82%, 78% 75%, 72% 85%, 68% 78%, 62% 88%, 58% 80%, 52% 90%, 48% 82%, 42% 92%, 37% 85%, 32% 94%, 28% 88%, 23% 95%, 20% 90%, 15% 97%, 12% 92%, 8% 98%, 5% 95%, 2% 100%, 5% 90%, 0% 85%, 4% 80%, 0% 75%, 4% 70%, 0% 65%, 5% 60%, 0% 55%, 4% 50%, 0% 45%, 4% 40%, 0% 35%, 5% 30%, 0% 25%, 4% 20%, 0% 15%, 4% 10%);
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.8);
            background: rgba(40, 50, 40, 0.2);
        }

        /* 69. NT·15 : Leprechaun (Four Leaf Clover Magic) */
        .role-NT_15 .card-bg {
            background: radial-gradient(ellipse at 50% 50%, rgba(0, 100, 50, 0.7) 0%, rgba(10, 10, 12, 1) 70%);
        }
        .role-NT_15 .card-bg::after { /* Gold dust */
            content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255, 215, 0, 0.5) 1px, transparent 1px); background-size: 15px 15px; opacity: 0.4;
        }
        .role-NT_15 .card-ring {
            border: 3px solid #ffd700; /* Pure gold */
            border-radius: 50%; width: 45mm; height: 45mm; top: 5mm; left: 50%; transform: translateX(-50%);
            /* Cut into 4 clover leaves */
            clip-path: polygon(50% 10%, 80% 0, 100% 20%, 90% 50%, 100% 80%, 80% 100%, 50% 90%, 20% 100%, 0 80%, 10% 50%, 0 20%, 20% 0);
            box-shadow: inset 0 0 20px rgba(0, 150, 50, 0.5), 0 0 10px rgba(255, 215, 0, 0.4);
            background: rgba(0, 100, 50, 0.2);
        }

        /* 70. NT·16 : Bloody Mary (Victorian Cursed Mirror) */
        .role-NT_16 .card-bg {
            background: linear-gradient(0deg, rgba(80, 0, 20, 0.6) 0%, rgba(150, 160, 170, 0.3) 100%);
        }
        .role-NT_16 .card-bg::before { /* Edge blackout */
            content: ''; position: absolute; inset: 0; z-index: 1;
            background:
                linear-gradient(to right, #080808 0%, transparent 18%, transparent 82%, #080808 100%),
                linear-gradient(to top, #080808 0%, transparent 18%);
        }
        .role-NT_16 .card-bg::after { /* Mirror shine */
            content: ''; position: absolute; top: -10mm; left: -10mm; width: 30mm; height: 50mm; background: linear-gradient(90deg, transparent 40%, rgba(255, 255, 255, 0.3) 50%, transparent 60%); transform: rotate(30deg); z-index: 2;
        }
        .role-NT_16 .card-ring {
            border: 4px solid rgba(200, 200, 210, 0.6); /* Silver mirror frame */
            border-radius: 50% 50% 10mm 10mm / 40% 40% 20mm 20mm; /* Vintage mirror shape */
            width: 44mm; height: 50mm; top: 2mm; left: 50%; transform: translateX(-50%);
            box-shadow: inset 0 0 15px rgba(139, 0, 0, 0.4);
            clip-path: none;
        }
        .role-NT_16 .card-ring::before { /* Dropping blood from the top edge */
            content: ''; position: absolute; top: 0; left: 40%; width: 5mm; height: 18mm; background: #8b0000; border-radius: 0 0 2.5mm 2.5mm; box-shadow: inset -1px 0 2px rgba(0,0,0,0.5);
        }
        .role-NT_16 .card-ring::after { /* Second drop */
            content: ''; position: absolute; top: 0; left: 60%; width: 3mm; height: 10mm; background: #8b0000; border-radius: 0 0 1.5mm 1.5mm;
        }

        /* 71. NT·17 : The Thing (Slime Swamp Gelatinous) */
        .role-NT_17 .card-bg {
            background: radial-gradient(ellipse at 50% 50%, rgba(0, 80, 60, 0.6) 0%, rgba(20, 20, 30, 0.9) 70%);
        }
        .role-NT_17 .card-bg::after { /* Slime bubbles */
            content: ''; position: absolute; bottom: 0; left: 10mm; width: 10mm; height: 10mm; border-radius: 50%; border: 1px solid rgba(0, 255, 100, 0.4); box-shadow: 15mm -10mm 0 -2mm rgba(0,255,100,0.3);
        }
        .role-NT_17 .card-ring {
            border: 4px solid rgba(0, 150, 100, 0.7); /* Slimy cyan/green */
            border-radius: 40% 60% 60% 40% / 30% 70% 30% 70%; /* Gross amoeba shape */
            width: 45mm; height: 45mm; top: 5mm; left: 50%; transform: translateX(-50%);
            box-shadow: inset 0 0 20px rgba(0, 100, 50, 0.8), 0 5px 15px rgba(0, 0, 0, 0.5);
            /* Stretched tentacle reaching out left */
            clip-path: polygon(20% 0, 80% 0, 100% 20%, 90% 50%, 100% 80%, 70% 100%, 30% 100%, 0 80%, 10% 50%, -10% 30%);
            background: rgba(0, 100, 50, 0.1);
        }

        /* 72. NT·18 : Nostradamus (Ancient Burned Parchment) */
        .role-NT_18 .card-bg {
            background: linear-gradient(135deg, rgba(80, 50, 20, 0.6) 0%, rgba(20, 0, 40, 0.9) 100%);
        }
        .role-NT_18 .card-bg::after { /* Star chart */
            content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255, 255, 255, 0.8) 1px, transparent 1px); background-size: 20px 20px; background-position: 0 0, 10px 10px; opacity: 0.3;
        }
        .role-NT_18 .card-ring {
            border: 4px solid rgba(200, 160, 100, 0.8); /* Sepia vellum */
            border-radius: 10px; /* Rectangular parchment basis */
            width: 44mm; height: 48mm; top: 3mm; left: 50%; transform: translateX(-50%);
            /* Burned edges randomly jagged */
            clip-path: polygon(5% 0%, 20% 5%, 40% 0%, 60% 8%, 80% 0%, 95% 5%, 100% 20%, 92% 40%, 100% 60%, 95% 80%, 100% 95%, 80% 100%, 60% 92%, 40% 100%, 20% 95%, 5% 100%, 0% 80%, 8% 60%, 0% 40%, 5% 20%);
            box-shadow: inset 0 0 30px rgba(100, 40, 0, 0.9), 0 0 10px rgba(255, 100, 0, 0.5); /* Fire glow inside */
            background: rgba(100, 60, 20, 0.2);
        }

        @media print {
            body { background: #fff; padding: 0; min-height: auto; }
            .header-title, .header-subtitle, .screen-note, .screen-only, .download-options { display: none !important; }
            .page {
                margin: 0; box-shadow: none; page-break-after: always;
                padding: 9.15mm 3.75mm; border: none; background: transparent;
            }
            .page:last-child { page-break-after: auto; }
            /* @page size managed dynamically via JS */
        }
    
        /* Mobile Responsive */
        @media screen and (max-width: 768px) {
            body { padding: 15px 5px !important; }
            h1.print-title, .header-title { font-size: 22px !important; letter-spacing: 5px !important; text-align: center !important; }
            .print-subtitle, .header-subtitle { font-size: 10px !important; letter-spacing: 2px !important; text-align: center !important; margin-bottom: 15px !important; }
            .control-panel { 
                padding: 12px !important; 
                flex-direction: column !important; 
                gap: 10px !important;
                border-radius: 8px !important;
                margin-left: 10px !important;
                margin-right: 10px !important;
            }
            .control-panel > div {
                flex-direction: column !important;
                gap: 8px !important;
            }
            .control-group { 
                width: 100% !important; 
                flex-direction: column !important; 
                align-items: stretch !important; 
                gap: 5px !important; 
            }
            .control-group label { text-align: left !important; }
            .control-group select { width: 100% !important; font-size: 14px !important; padding: 8px !important; }
            .control-btn { width: 100% !important; justify-content: center !important; padding: 12px !important; font-size: 14px !important; }
            .control-panel > div > div[style*="width: 2px"] { display: none !important; }
            
            #pages-container {
                width: 100% !important;
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch !important;
                padding-bottom: 20px !important;
                padding-top: 5px !important;
            }
            
            #pages-container::after {
                content: '→ Geser untuk melihat semua kartu →' !important;
                display: block !important;
                text-align: center !important;
                font-size: 11px !important;
                color: #888 !important;
                margin-top: 10px !important;
                font-family: inherit !important;
                width: max-content !important;
                min-width: 100% !important;
            }
        }
    </style>
</head>

<body>
    <h1 class="header-title">OBSIDIAN VANGUARD EDITION</h1>
    <p class="header-subtitle">UNIFIED SUPREME CELESTIAL LAYOUT</p>
    <div class="control-panel screen-only">
        <div style="width: 100%; text-align: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <p style="margin: 0; font-size: 13px; color: #333; font-weight: 500;">
                <span style="color: #aa771c; font-weight: 700;">PANDUAN CETAK:</span> Tekan <kbd>Ctrl+P</kbd> dan pastikan opsi <strong>"Background graphics"</strong> tercentang.
            </p>
            <p style="margin: 4px 0 0; font-size: 11px; color: #777;">
                Gunakan panel di bawah ini untuk mengontrol resolusi &amp; format, atau klik ganda pada kartu untuk unduhan instan.
            </p>
        </div>
        
        <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%;">
            <!-- CETAK PDF GROUP -->
            <div class="control-group">
                <label for="paper-size">Kertas:</label>
                <select id="paper-size" onchange="changePaperSize()">
                    <option value="a4">A4 (9 Kartu)</option>
                    <option value="f4">F4 / Folio (9 Kartu)</option>
                    <option value="a3">A3 (20 Kartu)</option>
                    <option value="a3plus">A3+ (25 Kartu)</option>
                    <option value="single">Single (Cetak PVC)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="pdf-dpi">Detail PDF:</label>
                <select id="pdf-dpi" onchange="changePaperSize()">
                    <option value="1">Standar (96 DPI)</option>
                    <option value="2">Tajam (192 DPI)</option>
                    <option value="4">Ekstrem (384 DPI)</option>
                </select>
            </div>
            <button class="control-btn btn-red" onclick="window.print()" title="Simpan sebagai PDF (Ctrl+P)">
                🖨️ Simpan PDF
            </button>
            
            <div style="width: 2px; background: #eee; margin: 0 5px; border-radius: 2px;"></div>
            
            <!-- DOWNLOAD IMAGE GROUP -->
            <div class="control-group">
                <label for="export-format">Format:</label>
                <select id="export-format">
                    <option value="png">PNG (Transparan)</option>
                    <option value="jpg">JPG (Background Hitam)</option>
                </select>
            </div>
            <button id="btn-download-all" class="control-btn btn-gold" onclick="downloadAllCards('ObsidianVanguardOve', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#0a0a0c':null})">
                ⬇ Download ZIP
            </button>
        </div>
    </div>

    <div id="pages-container"></div>

    <script src="cards.js"></script>
    <script src="svg_ove.js"></script>
    <script>
        // cardsPerPage is determined dynamically per paper size
        const container = document.getElementById("pages-container");

        function generateCardHTML(card) {
            let factionClass = card.factionUpClass || 'faction-neutral';
            let themeClass = 'theme-neutral';
            let factionLabel = 'NEUTRAL';
            let textFxClass = 'silver-text-fx';

            if (factionClass === 'faction-supreme') {
                themeClass = 'theme-supreme';
                factionLabel = 'SUPREME';
                textFxClass = 'gold-text-fx';
            } else if (factionClass === 'faction-good') {
                themeClass = 'theme-good';
                factionLabel = 'ALLIANCE';
                textFxClass = 'gold-text-fx';
            } else if (factionClass === 'faction-evil') {
                themeClass = 'theme-evil';
                factionLabel = 'SHADOW';
                textFxClass = 'gold-text-fx';
            }

            let svgIcon = getSvgOve(card.id, factionClass);
            let roleClass = 'role-' + card.id.replace('·', '_');

            return `
            <div class="card ${themeClass} ${roleClass}">
                <div class="card-bg"></div>
                <div class="card-ring"></div>
                <div class="safe-area">
                    <div class="card-header">
                        <div class="card-id">${card.id}</div>
                        <div class="card-faction">${factionLabel}</div>
                    </div>
                    <div class="card-svg">
                        ${svgIcon}
                    </div>
                    <div class="card-content">
                        <div class="card-name-en">${card.nameEn}</div>
                        <div class="card-name-id ${textFxClass}">${card.nameId}</div>
                        <div class="card-ability">✦ ${card.ability} ✦</div>
                        <div class="card-desc">${card.desc}</div>
                        <div class="card-footer">${card.footer.replace('—', '//')}</div>
                    </div>
                </div>
            </div>
            `;
        }

        // Layout Logic
        function changePaperSize() {
            const paperId = document.getElementById('paper-size').value;
            const container = document.getElementById("pages-container");
            const dpiScale = parseFloat(document.getElementById('pdf-dpi')?.value || 1);
            container.innerHTML = ""; // Clear existing

            let cols = 3, rows = 3;
            // Native mm width (Screen bounds)
            let wMM = 210, hMM = 297, cssPadding = "9.15mm 3.75mm";
            
            if (paperId === 'a4') {
                cols = 3; rows = 3; wMM = 210; hMM = 297;
            } else if (paperId === 'f4') {
                cols = 3; rows = 3; wMM = 215; hMM = 330;
            } else if (paperId === 'a3') {
                cols = 5; rows = 4; wMM = 297; hMM = 420;
            } else if (paperId === 'a3plus') {
                cols = 5; rows = 5; wMM = 329; hMM = 483;
            } else if (paperId === 'single') {
                cols = 1; rows = 1; wMM = 58; hMM = 90; cssPadding = "0";
            }
            
            // Screen display size
            const cssWidth = wMM + "mm";
            const cssHeight = hMM + "mm";

            // GIANT CANVAS HACK for PRINT:
            // Multiply the pure physical size for @page by the dpiScale multiplier
            // For example, A4 at 4x zoom tells the printer the physical page is an 840x1188mm massive poster
            const printTargetWidth = parseFloat((wMM * dpiScale).toFixed(2)) + "mm";
            const printTargetHeight = parseFloat((hMM * dpiScale).toFixed(2)) + "mm";
            
            const localCardsPerPage = cols * rows;

            // Render Dynamic CSS
            let styleEl = document.getElementById('dynamic-paper-style');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'dynamic-paper-style';
                document.head.appendChild(styleEl);
            }
            
            styleEl.innerHTML = `
                @page { size: ${printTargetWidth} ${printTargetHeight}; margin: 0; }
                @media print {
                    .page { 
                        width: ${cssWidth}; height: ${cssHeight}; 
                        padding: ${cssPadding}; gap: 6mm; 
                        grid-template-columns: repeat(${cols}, var(--card-w)); grid-auto-rows: var(--card-h); 
                        display: grid; margin: 0; 
                        page-break-after: always; page-break-inside: avoid; overflow: hidden; 
                        zoom: ${dpiScale};
                    }
                    .screen-only, .download-options, .header-title, .header-subtitle, .screen-note { display: none !important; }
                }
                .page {
                    width: ${cssWidth};
                    min-height: ${cssHeight};
                    padding: ${cssPadding};
                    grid-template-columns: repeat(${cols}, var(--card-w));
                    grid-auto-rows: var(--card-h);
                }
            `;

            const backContent = `
            <div class="card theme-back">
                <div class="card-bg"></div>
                <div class="card-ring"></div>
                <div class="safe-area">
                    <div class="card-text-top">OBSIDIAN VANGUARD</div>
                    <div class="card-svg">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <radialGradient id="grad-eye" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" stop-color="#dc143c"/>
                                    <stop offset="50%" stop-color="#8a0303"/>
                                    <stop offset="100%" stop-color="#210000"/>
                                </radialGradient>
                                <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ffd700"/>
                                    <stop offset="50%" stop-color="#aa771c"/>
                                    <stop offset="100%" stop-color="#fcf6ba"/>
                                </linearGradient>
                            </defs>
                            
                            <!-- Outer Ornate Borders -->
                            <circle cx="50" cy="50" r="48" fill="none" stroke="url(#grad-gold)" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.8"/>
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#aa771c" stroke-width="1.5" opacity="0.9"/>
                            <circle cx="50" cy="50" r="41.5" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>
                            
                            <!-- Intersecting Golden Hexagram/Squares Motif -->
                            <rect x="22" y="22" width="56" height="56" fill="none" stroke="#d4af37" stroke-width="0.75" transform="rotate(45 50 50)" />
                            <rect x="22" y="22" width="56" height="56" fill="none" stroke="#d4af37" stroke-width="0.75" />
                            <polygon points="50,6 61,39 94,50 61,61 50,94 39,61 6,50 39,39" fill="rgba(10,10,12,0.8)" stroke="#aa771c" stroke-width="1" />
                            
                            <!-- Inner Sanctum Ring -->
                            <circle cx="50" cy="50" r="28" fill="#08080a" stroke="url(#grad-gold)" stroke-width="2" />
                            <circle cx="50" cy="50" r="25" fill="none" stroke="#dc143c" stroke-width="0.5" stroke-dasharray="1 3" />
                            
                            <!-- Arcane Core Eye -->
                            <path d="M 28,50 Q 50,28 72,50 Q 50,72 28,50 Z" fill="none" stroke="#d4af37" stroke-width="1" />
                            <circle cx="50" cy="50" r="8" fill="url(#grad-eye)" stroke="#fcf6ba" stroke-width="0.5"/>
                            <circle cx="50" cy="50" r="2" fill="#fff" opacity="0.8"/>
                            
                            <!-- Decorative Anchors/Jewels -->
                            <path d="M 50,0 L 53,7 L 50,14 L 47,7 Z" fill="url(#grad-gold)" />
                            <path d="M 50,100 L 53,93 L 50,86 L 47,93 Z" fill="url(#grad-gold)" />
                            <path d="M 0,50 L 7,47 L 14,50 L 7,53 Z" fill="url(#grad-gold)" />
                            <path d="M 100,50 L 93,47 L 86,50 L 93,53 Z" fill="url(#grad-gold)" />
                        </svg>
                    </div>
                    <div class="card-text-bottom">WEREWOLF</div>
                    <div class="card-text-sub">MRSETIAWAN</div>
                </div>
            </div>
            `;

            // Generate Front Pages
            for (let i = 0; i < cardsData.length; i += localCardsPerPage) {
                const pageCards = cardsData.slice(i, i + localCardsPerPage);
                const pageDiv = document.createElement("div");
                pageDiv.className = "page";

                let pageHTML = "";
                pageCards.forEach(card => {
                    pageHTML += generateCardHTML(card);
                });

                pageDiv.innerHTML = pageHTML;
                container.appendChild(pageDiv);
            }

            // Generate Back Page
            const backPageDiv = document.createElement("div");
            backPageDiv.className = "page";
            let backPageHTML = "";
            for (let i = 0; i < localCardsPerPage; i++) {
                backPageHTML += backContent;
            }
            backPageDiv.innerHTML = backPageHTML;
            container.appendChild(backPageDiv);
        }

        // Initialize first render
        changePaperSize();
        if(window.location.search.includes('preview=1')) { setTimeout(() => { const card = document.querySelector('.card'); if (card) { document.body.innerHTML = ''; document.body.appendChild(card); document.body.style.cssText = 'margin:0;padding:0;background:transparent;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;'; card.style.transform = 'scale(1)'; card.style.margin = '0'; } }, 50); }

        // Download Logic
        document.addEventListener('dblclick', function (e) {
            const card = e.target.closest('.card');
            if (!card) return;
            downloadCard(card);
        });

        let lastTap = 0;
        document.addEventListener('touchend', function (e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                const card = e.target.closest('.card');
                if (card) {
                    downloadCard(card);
                    e.preventDefault();
                }
            }
            lastTap = currentTime;
        });

        function downloadCard(card) {
            const format = (document.getElementById('export-format').value || 'png').trim().toLowerCase();
            const idElement = card.querySelector('.card-id');
            let cardId = idElement ? idElement.innerText : 'card-back';
            cardId = cardId.replace(/·/g, '-');
            const bgColor = format === 'jpg' ? '#0a0a0c' : null;
            if (typeof downloadCardDomToImage !== 'undefined') {
                downloadCardDomToImage(card, `OVE-${cardId}`, { format, bgColor });
            }
        }

    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="download_helper.js?v=2"></script>
</body>
