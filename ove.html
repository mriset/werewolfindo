<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desain Kartu Eksklusif Obsidian Vanguard - Supreme Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --card-w: 58mm;
            --card-h: 90mm;
            --gold-light: #fcf6ba;
            --gold-base: #d4af37;
            --gold-dark: #aa771c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
            color: #111;
            padding: 40px 10px;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .header-title {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: #aa771c;
            margin-bottom: 10px;
            letter-spacing: 4px;
            text-shadow: none;
        }

        .header-subtitle {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .screen-note {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            color: #555;
            margin: 8px auto 30px;
            background: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            max-width: 650px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            line-height: 1.6;
        }

        .page {
            background: #fff;
            margin: 0 auto 30px;
            padding: 9.15mm 3.75mm;
            display: grid;
            gap: 6mm;
            justify-content: center;
            align-content: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            position: relative;
            border-radius: 2px;
            /* Layout size/grid is managed dynamically via JS */
        }

        .card {
            width: var(--card-w);
            height: var(--card-h);
            position: relative;
            background: #0a0a0c;
            border-radius: 4mm;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            page-break-inside: avoid;
            background: #0a0a0c;
            border: none;
        }

        .safe-area {
            position: absolute;
            inset: 2mm;
            pointer-events: none;
        }

        .safe-area > * {
            pointer-events: auto;
        }

        .gold-text-fx {
            background: linear-gradient(to right, #bf953f, var(--gold-light), #b38728, #fbf5b7, var(--gold-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .silver-text-fx {
            background: linear-gradient(to right, #888, #fff, #aaa, #fff, #666);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .theme-supreme { --fac-color: #8a2be2; --fac-dark: #4a154b; --fac-light: #b066ff; }
        .theme-good { --fac-color: #4183d7; --fac-dark: #0f2c59; --fac-light: #88aadd; }
        .theme-evil { --fac-color: #dc143c; --fac-dark: #590f0f; --fac-light: #ff6666; }
        .theme-neutral { --fac-color: #a0a0a0; --fac-dark: #2a2a2a; --fac-light: #e0e0e0; }
        .theme-back { --fac-color: #d4af37; --fac-dark: #1a1505; --fac-light: #fcf6ba; }

        .card-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, var(--fac-dark) 0%, #0a0a0c 70%);
        }

        .card-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="2" cy="2" r="1" fill="rgba(212,175,55,0.2)"/></svg>');
            opacity: 0.6;
        }

        .card-ring {
            position: absolute;
            top: -10mm;
            left: -10mm;
            right: -10mm;
            height: 60mm;
            border: 1px solid var(--fac-color);
            border-radius: 50%;
            opacity: 0.3;
            box-shadow: inset 0 0 20px var(--fac-dark), 0 0 20px var(--fac-dark);
            /* Clip off the bottom 42% of the ellipse so its bottom arc
               (which falls ~50mm from card top) doesn't render as a
               thin horizontal line in exported images. */
            clip-path: inset(0 0 42% 0);
        }

        .card-header {
            position: absolute;
            top: 3mm;
            width: 100%;
            text-align: center;
            display: flex;
            justify-content: space-between;
            padding: 0 4mm;
            z-index: 10;
        }

        .card-id { font-size: 7px; color: #fff; font-weight: bold; letter-spacing: 2px; }

        .card-faction {
            font-size: 5px;
            background: var(--fac-color);
            color: #fff;
            padding: 1mm 2mm;
            border-radius: 2mm;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
        }
        
        .theme-neutral .card-faction {
            color: #000;
        }

        .card-svg {
            position: absolute;
            top: 12mm;
            width: 100%;
            height: 32mm;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .card-svg svg {
            height: 100%;
            width: 100%;
            filter: drop-shadow(0 5px 15px var(--fac-dark));
        }

        .card-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 48mm;
            background: linear-gradient(0deg, rgba(8, 8, 10, 1) 60%, rgba(8, 8, 10, 0) 100%);
            padding: 5mm 4mm;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 10;
        }

        .card-name-en {
            font-size: 6px;
            color: var(--gold-base);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .card-name-id {
            font-family: 'Cinzel', serif;
            font-size: 15px;
            font-weight: 900;
            margin: 1mm 0;
            line-height: 1;
        }

        .card-ability {
            font-size: 6.5px;
            color: var(--gold-light);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 1.5mm 0;
            margin-bottom: 2mm;
            font-weight: 800;
            letter-spacing: 1px;
            background: rgba(212, 175, 55, 0.05);
            text-transform: uppercase;
        }

        .card-desc {
            font-size: 6.5px;
            color: #ccc;
            line-height: 1.4;
            margin-bottom: 2mm;
            text-align: justify;
            text-align-last: center;
        }

        .card-desc strong {
            color: var(--fac-light);
            font-weight: 800;
        }

        .card-footer {
            font-size: 5px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Card Back */
        .theme-back .card-bg { background: #050505; }
        .theme-back .card-ring {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50mm; height: 50mm; border-color: var(--gold-dark); opacity: 0.5;
        }
        .theme-back .card-svg {
            top: 50%; left: 50%; transform: translate(-50%, -50%); height: 40mm;
        }
        .theme-back .card-text-top {
            position: absolute; top: 12mm; width: 100%; text-align: center;
            font-family: 'Cinzel', serif; font-size: 7px; color: var(--gold-base); letter-spacing: 4px;
        }
        .theme-back .card-text-bottom {
            position: absolute; bottom: 12mm; width: 100%; text-align: center;
            font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold-base);
            font-weight: 900; letter-spacing: 6px;
        }
        .theme-back .card-text-sub {
            position: absolute; bottom: 8mm; width: 100%; text-align: center;
            font-size: 5px; color: var(--gold-dark); letter-spacing: 3px;
        }

        @media print {
            body { background: #fff; padding: 0; min-height: auto; }
            .header-title, .header-subtitle, .screen-note, .screen-only, .download-options { display: none; }
            .page {
                margin: 0; box-shadow: none; page-break-after: always;
                padding: 9.15mm 3.75mm; border: none; background: transparent;
            }
            .page:last-child { page-break-after: auto; }
            /* @page size managed dynamically via JS */
        }
    </style>
</head>

<body>
    <h1 class="header-title">OBSIDIAN VANGUARD EDITION</h1>
    <p class="header-subtitle">UNIFIED SUPREME CELESTIAL LAYOUT</p>
    <div class="screen-note">
        <strong>PANDUAN CETAK:</strong> Tekan <code>Ctrl+P</code>. Pastikan opsi <strong>"Background graphics"</strong> tercentang.<br />
        <span style="font-size:11px; font-weight:400; color:#888;">(Gunakan Klik Ganda / Double-Tap untuk mengunduh desain kartu individunya).</span>
    </div>

    <div style="text-align: center; margin-bottom: 20px;" class="download-options screen-only">
        <label for="export-format" style="font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600; color: #333;">Format Unduhan: </label>
        <select id="export-format" style="font-family: 'Montserrat', sans-serif; font-size: 12px; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; background: #fff; color: #111;">
            <option value="png">PNG</option>
            <option value="jpg">JPG</option>
        </select>
        <label for="paper-size" style="font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600; color: #333; margin-left:15px;">Ukuran Kertas: </label>
        <select id="paper-size" onchange="changePaperSize()" style="font-family: 'Montserrat', sans-serif; font-size: 12px; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; background: #fff; color: #111;">
            <option value="a4">A4 (9 Kartu)</option>
            <option value="f4">F4 / Folio (9 Kartu)</option>
            <option value="a3">A3 (20 Kartu)</option>
            <option value="a3plus">A3+ (25 Kartu)</option>
            <option value="single">1 Kartu (Cetak Satuan/PVC)</option>
        </select>
        <button id="btn-download-all"
            onclick="downloadAllCards('ObsidianVanguardOve', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#0a0a0c':null})"
            style="margin-left:12px; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; background:linear-gradient(135deg,#aa771c,#d4af37); color:#000; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; letter-spacing:1px; box-shadow: 0 2px 8px rgba(170,119,28,0.3);">
            ⬇ Download Semua (ZIP)
        </button>
    </div>

    <div id="pages-container"></div>

    <script src="cards.js"></script>
    <script src="svg_ove.js"></script>
    <script>
        const cardsPerPage = 9;
        const container = document.getElementById("pages-container");

        function generateCardHTML(card) {
            let factionClass = card.factionUpClass || 'faction-neutral';
            let themeClass = 'theme-neutral';
            let factionLabel = 'NETRAL';
            let textFxClass = 'silver-text-fx';

            if (factionClass === 'faction-supreme') {
                themeClass = 'theme-supreme';
                factionLabel = 'KHUSUS';
                textFxClass = 'gold-text-fx';
            } else if (factionClass === 'faction-good') {
                themeClass = 'theme-good';
                factionLabel = 'TIM BAIK';
                textFxClass = 'gold-text-fx';
            } else if (factionClass === 'faction-evil') {
                themeClass = 'theme-evil';
                factionLabel = 'TIM JAHAT';
                textFxClass = 'gold-text-fx';
            }

            let svgIcon = getSvgOve(card.id, factionClass);

            return `
            <div class="card ${themeClass}">
                <div class="card-bg"></div>
                <div class="card-ring"></div>
                <div class="safe-area">
                    <div class="card-header">
                        <div class="card-id">${card.id}</div>
                        <div class="card-faction">${factionLabel}</div>
                    </div>
                    <div class="card-svg">
                        ${svgIcon}
                    </div>
                    <div class="card-content">
                        <div class="card-name-en">${card.nameEn}</div>
                        <div class="card-name-id ${textFxClass}">${card.nameId}</div>
                        <div class="card-ability">✦ ${card.ability} ✦</div>
                        <div class="card-desc">${card.desc}</div>
                        <div class="card-footer">${card.footer.replace('—', '//')}</div>
                    </div>
                </div>
            </div>
            `;
        }

        // Layout Logic
        function changePaperSize() {
            const paperId = document.getElementById('paper-size').value;
            const container = document.getElementById("pages-container");
            container.innerHTML = ""; // Clear existing

            let cols = 3, rows = 3;
            let cssWidth = "210mm", cssHeight = "297mm", cssPadding = "9.15mm 3.75mm";
            
            if (paperId === 'a4') {
                cols = 3; rows = 3; cssWidth = "210mm"; cssHeight = "297mm";
            } else if (paperId === 'f4') {
                cols = 3; rows = 3; cssWidth = "215mm"; cssHeight = "330mm";
            } else if (paperId === 'a3') {
                cols = 5; rows = 4; cssWidth = "297mm"; cssHeight = "420mm";
            } else if (paperId === 'a3plus') {
                cols = 5; rows = 5; cssWidth = "329mm"; cssHeight = "483mm";
            } else if (paperId === 'single') {
                cols = 1; rows = 1; cssWidth = "58mm"; cssHeight = "90mm"; cssPadding = "0";
            }
            
            const localCardsPerPage = cols * rows;

            // Render Dynamic CSS
            let styleEl = document.getElementById('dynamic-paper-style');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'dynamic-paper-style';
                document.head.appendChild(styleEl);
            }
            
            styleEl.innerHTML = `
                @media print {
                    @page { size: ${cssWidth} ${cssHeight}; margin: 0; }
                    .page { width: ${cssWidth}; min-height: ${cssHeight}; padding: ${cssPadding}; }
                }
                .page {
                    width: ${cssWidth};
                    min-height: ${cssHeight};
                    padding: ${cssPadding};
                    grid-template-columns: repeat(${cols}, var(--card-w));
                    grid-auto-rows: var(--card-h);
                }
            `;

            const backContent = `
            <div class="card theme-back">
                <div class="card-bg"></div>
                <div class="card-ring"></div>
                <div class="safe-area">
                    <div class="card-text-top">OBSIDIAN VANGUARD</div>
                    <div class="card-svg">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="48" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.5" />
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#d4af37" stroke-width="1.5" />
                            <circle cx="50" cy="50" r="38" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-dasharray="2,2" />
                            <polygon points="50,10 55,35 80,50 55,65 50,90 45,65 20,50 45,35" fill="#0a0a0c" stroke="#d4af37" stroke-width="1" />
                            <polygon points="50,20 60,40 80,50 60,60 50,80 40,60 20,50 40,40" fill="none" stroke="#aa771c" stroke-width="0.5" />
                            <circle cx="50" cy="50" r="20" fill="#111" stroke="#d4af37" stroke-width="1.5" />
                            <path d="M35,55 L42,65 L50,55 L58,65 L65,55 M40,40 L60,40" fill="none" stroke="#d4af37" stroke-width="2" stroke-linejoin="round" />
                            <circle cx="50" cy="50" r="10" fill="none" stroke="#dc143c" stroke-width="0.5" />
                            <circle cx="15" cy="15" r="2" fill="#d4af37" />
                            <circle cx="85" cy="15" r="2" fill="#d4af37" />
                            <circle cx="15" cy="85" r="2" fill="#d4af37" />
                            <circle cx="85" cy="85" r="2" fill="#d4af37" />
                        </svg>
                    </div>
                    <div class="card-text-bottom">WEREWOLF</div>
                    <div class="card-text-sub">MRSETIAWAN</div>
                </div>
            </div>
            `;

            // Generate Front Pages
            for (let i = 0; i < cardsData.length; i += localCardsPerPage) {
                const pageCards = cardsData.slice(i, i + localCardsPerPage);
                const pageDiv = document.createElement("div");
                pageDiv.className = "page";

                let pageHTML = "";
                pageCards.forEach(card => {
                    pageHTML += generateCardHTML(card);
                });

                pageDiv.innerHTML = pageHTML;
                container.appendChild(pageDiv);
            }

            // Generate Back Page
            const backPageDiv = document.createElement("div");
            backPageDiv.className = "page";
            let backPageHTML = "";
            for (let i = 0; i < localCardsPerPage; i++) {
                backPageHTML += backContent;
            }
            backPageDiv.innerHTML = backPageHTML;
            container.appendChild(backPageDiv);
        }

        // Initialize first render
        changePaperSize();

        // Download Logic
        document.addEventListener('dblclick', function (e) {
            const card = e.target.closest('.card');
            if (!card) return;
            downloadCard(card);
        });

        let lastTap = 0;
        document.addEventListener('touchend', function (e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                const card = e.target.closest('.card');
                if (card) {
                    downloadCard(card);
                    e.preventDefault();
                }
            }
            lastTap = currentTime;
        });

        function downloadCard(card) {
            const format = (document.getElementById('export-format').value || 'png').trim().toLowerCase();
            const idElement = card.querySelector('.card-id');
            let cardId = idElement ? idElement.innerText : 'card-back';
            cardId = cardId.replace(/·/g, '-');
            const bgColor = format === 'jpg' ? '#0a0a0c' : null;
            downloadCardDomToImage(card, `ObsidianVanguardOve-${cardId}`, { format, bgColor });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@2.8.0/dist/dom-to-image-more.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="download_helper.js?v=2"></script>
</body>
</html>
