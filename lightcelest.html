<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf - 4 Factions (Light Mode Symmetrical Design)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Supreme (Gold) */
            --sup-light: #fdf5c9; --sup-base: #d4af37; --sup-dark: #8a5a19;
            /* Good (Blue/Silver) */
            --good-light: #e0f7fa; --good-base: #00acc1; --good-dark: #006064;
            /* Evil (Red) */
            --evil-light: #ffebee; --evil-base: #e53935; --evil-dark: #b71c1c;
            /* Neutral (Purple) */
            --neu-light: #f3e5f5; --neu-base: #8e24aa; --neu-dark: #4a148c;
            /* Cupid (Pink/Rose) */
            --cupid-light: #fce4ec; --cupid-base: #e91e63; --cupid-dark: #880e4f;
            /* Hunter (Green/Forest) */
            --hunter-light: #e8f5e9; --hunter-base: #4caf50; --hunter-dark: #1b5e20;
            /* Guard (Slate/Steel) */
            --guard-light: #f1f5f9; --guard-base: #64748b; --guard-dark: #334155;
            /* Witch (Amber/Orange) */
            --witch-light: #fff8e1; --witch-base: #ff8f00; --witch-dark: #e65100;
            /* Wizard (Indigo/Magic) */
            --wizard-light: #e8eaf6; --wizard-base: #5c6bc0; --wizard-dark: #1a237e;
            /* Veteran (Bronze/Brown) */
            --soldier-light: #efebe9; --soldier-base: #8d6e63; --soldier-dark: #3e2723;
            /* Bodyguard (Charcoal/Obsidian) */
            --bodyguard-light: #f5f5f5; --bodyguard-base: #757575; --bodyguard-dark: #212121;
            /* Priest (Divine Yellow/Gold) */
            --priest-light: #fffde7; --priest-base: #fbc02d; --priest-dark: #f57f17;
            /* Mayor (Royal Blue/Sapphire) */
            --mayor-light: #e3f2fd; --mayor-base: #1e88e5; --mayor-dark: #0d47a1;
            /* Sheriff (Gunmetal/Blue Grey) */
            --sheriff-light: #eceff1; --sheriff-base: #607d8b; --sheriff-dark: #263238;
            /* Lone Wolf (Teal/Midnight) */
            --lonewolf-light: #e0f2f1; --lonewolf-base: #00897b; --lonewolf-dark: #004d40;
            /* Doppelganger (Violet/Phantom) */
            --doppel-light: #f5f3ff; --doppel-base: #7c3aed; --doppel-dark: #4c1d95;
            /* Serial Killer (Crimson/Steel) */
            --killer-light: #ffcdd2; --killer-base: #b71c1c; --killer-dark: #111111;
            /* Idiot (Lime/Mustard) - New Role */
            --idiot-light: #f9fbe7; --idiot-base: #c0ca33; --idiot-dark: #827717;
            /* Prince (Copper/Deep Orange) - New Role */
            --prince-light: #fbe9e7; --prince-base: #ff5722; --prince-dark: #bf360c;
            /* Little Girl (Magenta/Berry) - New Role */
            --girl-light: #fce4ec; --girl-base: #d81b60; --girl-dark: #880e4f;

            --card-w: 54mm;
            --card-h: 85.6mm;
            --scale: 1; /* Pas di dalam canvas A4 */
        }

        body {
            margin: 0;
            padding: 40px;
            background: #cbd5e1;
            background-image: radial-gradient(circle at 50% 50%, #e2e8f0 0%, #94a3b8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            color: #1f2937;
        }

        /* A4 PAGE CANVAS */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: #ffffff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            box-sizing: border-box;
            padding: 15mm;
            display: flex;
            flex-wrap: wrap;
            gap: 5mm;
            align-content: flex-start;
            justify-content: flex-start;
        }

        /* BASE CARD STYLE */
        .card {
            width: calc(var(--card-w) * var(--scale));
            height: calc(var(--card-h) * var(--scale));
            position: relative;
            border-radius: 3mm;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05) inset;
            overflow: hidden;
            flex-shrink: 0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box;
        }
        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 2mm;
            pointer-events: none;
            border-width: 1px;
            border-style: solid;
        }
        
        .c-header { position: absolute; top: 25px; left: 10px; right: 10px; text-align: center; }
        .c-header h1 { font-family: 'Cinzel', serif; font-size: 15px; margin: 0; }
        .c-header h2 { font-size: 7px; margin: 2px 0 0 0; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
        
        .c-svg-wrapper {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -55%);
            width: 120px; height: 120px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }
        
        .c-content { position: absolute; bottom: 12px; left: 12px; right: 12px; text-align: center; }
        .ability-title { font-family: 'Cinzel', serif; font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;}
        .desc-text { font-size: 7px; line-height: 1.4; text-align: justify; color: #4b5563; font-weight: 700;} 
        .f-supreme  .desc-text strong { color: var(--sup-dark); }
        .f-good     .desc-text strong { color: var(--good-dark); }
        .f-evil     .desc-text strong { color: var(--evil-dark); }
        .f-neutral  .desc-text strong { color: var(--neu-dark); }
        .f-cupid    .desc-text strong { color: var(--cupid-dark); }
        .f-hunter   .desc-text strong { color: var(--hunter-dark); }
        .f-guard    .desc-text strong { color: var(--guard-dark); }
        .f-witch    .desc-text strong { color: var(--witch-dark); }
        .f-wizard   .desc-text strong { color: var(--wizard-dark); }
        .f-soldier  .desc-text strong { color: var(--soldier-dark); }
        .f-bodyguard .desc-text strong { color: var(--bodyguard-dark); }
        .f-priest   .desc-text strong { color: var(--priest-dark); }
        .f-mayor    .desc-text strong { color: var(--mayor-dark); }
        .f-sheriff  .desc-text strong { color: var(--sheriff-dark); }
        .f-lonewolf .desc-text strong { color: var(--lonewolf-dark); }
        .f-doppel   .desc-text strong { color: var(--doppel-dark); }
        .f-killer   .desc-text strong { color: var(--killer-base); }
        .f-idiot    .desc-text strong { color: var(--idiot-dark); }
        .f-prince   .desc-text strong { color: var(--prince-dark); }
        .f-girl     .desc-text strong { color: var(--girl-dark); }
        
        .c-code { position: absolute; top: 10px; left: 10px; font-size: 7px; font-weight: bold; }
        .c-faction { position: absolute; top: 10px; right: 10px; font-size: 7px; font-weight: bold; text-transform: uppercase; }


        /* FACTION STYLES */
        .f-supreme { background: linear-gradient(135deg, #ffffff 0%, #fffdf0 100%); border: 3px solid var(--sup-base); }
        .f-supreme:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(212, 175, 55, 0.4); }
        .f-supreme::before { border-color: rgba(212, 175, 55, 0.4); }
        .f-supreme .c-header h1, .f-supreme .ability-title, .f-supreme .c-code, .f-supreme .c-faction, .f-supreme .c-header h2 { color: var(--sup-dark); }
        .f-supreme .c-svg-wrapper { background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%); }

        .f-good { background: linear-gradient(135deg, #ffffff 0%, #f0fdfa 100%); border: 3px solid var(--good-base); }
        .f-good:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(0, 172, 193, 0.4); }
        .f-good::before { border-color: rgba(0, 172, 193, 0.4); }
        .f-good .c-header h1, .f-good .ability-title, .f-good .c-code, .f-good .c-faction, .f-good .c-header h2 { color: var(--good-dark); }
        .f-good .c-svg-wrapper { background: radial-gradient(circle, rgba(0, 172, 193, 0.1) 0%, transparent 70%); border: 1px dashed rgba(0,172,193,0.3); }

        .f-evil { background: linear-gradient(135deg, #ffffff 0%, #fef2f2 100%); border: 3px solid var(--evil-base); }
        .f-evil:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(229, 57, 53, 0.4); }
        .f-evil::before { border-color: rgba(229, 57, 53, 0.3); }
        .f-evil .c-header h1, .f-evil .ability-title, .f-evil .c-code, .f-evil .c-faction, .f-evil .c-header h2 { color: var(--evil-dark); }
        .f-evil .c-svg-wrapper { background: radial-gradient(circle, rgba(229, 57, 53, 0.1) 0%, transparent 70%); }

        .f-neutral { background: linear-gradient(135deg, #ffffff 0%, #faf5ff 100%); border: 3px solid var(--neu-base); }
        .f-neutral:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(142, 36, 170, 0.4); }
        .f-neutral::before { border-color: rgba(142, 36, 170, 0.3); }
        .f-neutral .c-header h1, .f-neutral .ability-title, .f-neutral .c-code, .f-neutral .c-faction, .f-neutral .c-header h2 { color: var(--neu-dark); }
        .f-neutral .c-svg-wrapper { background: radial-gradient(circle, rgba(142, 36, 170, 0.1) 0%, transparent 70%); }

        .f-cupid::before { border-color: rgba(233, 30, 99, 0.3); }
        .f-cupid .c-header h1, .f-cupid .ability-title, .f-cupid .c-code, .f-cupid .c-faction, .f-cupid .c-header h2 { color: var(--cupid-dark); }
        .f-cupid .c-svg-wrapper { background: radial-gradient(circle, rgba(233, 30, 99, 0.1) 0%, transparent 70%); }

        .f-hunter { background: linear-gradient(135deg, #ffffff 0%, #f1f8e9 100%); border: 3px solid var(--hunter-base); }
        .f-hunter:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(76, 175, 80, 0.4); }
        .f-hunter::before { border-color: rgba(76, 175, 80, 0.3); }
        .f-hunter .c-header h1, .f-hunter .ability-title, .f-hunter .c-code, .f-hunter .c-faction, .f-hunter .c-header h2 { color: var(--hunter-dark); }
        .f-hunter .c-svg-wrapper { background: radial-gradient(circle, rgba(76, 175, 80, 0.1) 0%, transparent 70%); }

        .f-guard { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); border: 3px solid var(--guard-base); }
        .f-guard:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(100, 116, 139, 0.4); }
        .f-guard::before { border-color: rgba(100, 116, 139, 0.3); }
        .f-guard .c-header h1, .f-guard .ability-title, .f-guard .c-code, .f-guard .c-faction, .f-guard .c-header h2 { color: var(--guard-dark); }
        .f-guard .c-svg-wrapper { background: radial-gradient(circle, rgba(100, 116, 139, 0.1) 0%, transparent 70%); }

        .f-witch { background: linear-gradient(135deg, #ffffff 0%, #fff8e1 100%); border: 3px solid var(--witch-base); }
        .f-witch:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(255, 143, 0, 0.4); }
        .f-witch::before { border-color: rgba(255, 143, 0, 0.3); }
        .f-witch .c-header h1, .f-witch .ability-title, .f-witch .c-code, .f-witch .c-faction, .f-witch .c-header h2 { color: var(--witch-dark); }
        .f-witch .c-svg-wrapper { background: radial-gradient(circle, rgba(255, 143, 0, 0.1) 0%, transparent 70%); }

        .f-wizard { background: linear-gradient(135deg, #ffffff 0%, #e8eaf6 100%); border: 3px solid var(--wizard-base); }
        .f-wizard:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(92, 107, 192, 0.4); }
        .f-wizard::before { border-color: rgba(92, 107, 192, 0.3); }
        .f-wizard .c-header h1, .f-wizard .ability-title, .f-wizard .c-code, .f-wizard .c-faction, .f-wizard .c-header h2 { color: var(--wizard-dark); }
        .f-wizard .c-svg-wrapper { background: radial-gradient(circle, rgba(92, 107, 192, 0.1) 0%, transparent 70%); }

        .f-soldier { background: linear-gradient(135deg, #ffffff 0%, #efebe9 100%); border: 3px solid var(--soldier-base); }
        .f-soldier:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(141, 110, 99, 0.4); }
        .f-soldier::before { border-color: rgba(141, 110, 99, 0.3); }
        .f-soldier .c-header h1, .f-soldier .ability-title, .f-soldier .c-code, .f-soldier .c-faction, .f-soldier .c-header h2 { color: var(--soldier-dark); }
        .f-soldier .c-svg-wrapper { background: radial-gradient(circle, rgba(141, 110, 99, 0.1) 0%, transparent 70%); }

        .f-bodyguard { background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%); border: 3px solid var(--bodyguard-base); }
        .f-bodyguard:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(117, 117, 117, 0.4); }
        .f-bodyguard::before { border-color: rgba(117, 117, 117, 0.3); }
        .f-bodyguard .c-header h1, .f-bodyguard .ability-title, .f-bodyguard .c-code, .f-bodyguard .c-faction, .f-bodyguard .c-header h2 { color: var(--bodyguard-dark); }
        .f-bodyguard .c-svg-wrapper { background: radial-gradient(circle, rgba(117, 117, 117, 0.1) 0%, transparent 70%); }

        .f-priest { background: linear-gradient(135deg, #ffffff 0%, #fffde7 100%); border: 3px solid var(--priest-base); }
        .f-priest:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(251, 192, 45, 0.4); }
        .f-priest::before { border-color: rgba(251, 192, 45, 0.3); }
        .f-priest .c-header h1, .f-priest .ability-title, .f-priest .c-code, .f-priest .c-faction, .f-priest .c-header h2 { color: var(--priest-dark); }
        .f-priest .c-svg-wrapper { background: radial-gradient(circle, rgba(251, 192, 45, 0.1) 0%, transparent 70%); }

        .f-mayor { background: linear-gradient(135deg, #ffffff 0%, #e3f2fd 100%); border: 3px solid var(--mayor-base); }
        .f-mayor:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(30, 136, 229, 0.4); }
        .f-mayor::before { border-color: rgba(30, 136, 229, 0.3); }
        .f-mayor .c-header h1, .f-mayor .ability-title, .f-mayor .c-code, .f-mayor .c-faction, .f-mayor .c-header h2 { color: var(--mayor-dark); }
        .f-mayor .c-svg-wrapper { background: radial-gradient(circle, rgba(30, 136, 229, 0.1) 0%, transparent 70%); }

        .f-sheriff { background: linear-gradient(135deg, #ffffff 0%, #eceff1 100%); border: 3px solid var(--sheriff-base); }
        .f-sheriff:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(96, 125, 139, 0.4); }
        .f-sheriff::before { border-color: rgba(96, 125, 139, 0.3); }
        .f-sheriff .c-header h1, .f-sheriff .ability-title, .f-sheriff .c-code, .f-sheriff .c-faction, .f-sheriff .c-header h2 { color: var(--sheriff-dark); }
        .f-sheriff .c-svg-wrapper { background: radial-gradient(circle, rgba(96, 125, 139, 0.1) 0%, transparent 70%); }

        .f-lonewolf { background: linear-gradient(135deg, #ffffff 0%, #e0f2f1 100%); border: 3px solid var(--lonewolf-base); }
        .f-lonewolf:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(0, 137, 123, 0.4); }
        .f-lonewolf::before { border-color: rgba(0, 137, 123, 0.3); }
        .f-lonewolf .c-header h1, .f-lonewolf .ability-title, .f-lonewolf .c-code, .f-lonewolf .c-faction, .f-lonewolf .c-header h2 { color: var(--lonewolf-dark); }
        .f-lonewolf .c-svg-wrapper { background: radial-gradient(circle, rgba(0, 137, 123, 0.1) 0%, transparent 70%); }

        .f-doppel { background: linear-gradient(135deg, #ffffff 0%, #f5f3ff 100%); border: 3px solid var(--doppel-base); }
        .f-doppel:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(124, 58, 237, 0.4); }
        .f-doppel::before { border-color: rgba(124, 58, 237, 0.3); }
        .f-doppel .c-header h1, .f-doppel .ability-title, .f-doppel .c-code, .f-doppel .c-faction, .f-doppel .c-header h2 { color: var(--doppel-dark); }
        .f-doppel .c-svg-wrapper { background: radial-gradient(circle, rgba(124, 58, 237, 0.1) 0%, transparent 70%); }

        .f-killer { background: linear-gradient(135deg, #ffffff 0%, var(--killer-light) 100%); border: 3px solid var(--killer-base); }
        .f-killer:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(183, 28, 28, 0.5); }
        .f-killer::before { border-color: rgba(183, 28, 28, 0.4); }
        .f-killer .c-header h1 { color: var(--killer-dark); text-shadow: 0 1px 3px rgba(183, 28, 28, 0.4); }
        .f-killer .c-header h2, .f-killer .c-code, .f-killer .c-faction { color: var(--killer-base); opacity: 1; font-weight: 800; }
        .f-killer .ability-title { color: var(--killer-base); }
        .f-killer .c-svg-wrapper { background: radial-gradient(circle, rgba(183, 28, 28, 0.15) 0%, transparent 70%); }

        .f-idiot { background: linear-gradient(135deg, #ffffff 0%, #f9fbe7 100%); border: 3px solid var(--idiot-base); }
        .f-idiot:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(192, 202, 51, 0.4); }
        .f-idiot::before { border-color: rgba(192, 202, 51, 0.3); }
        .f-idiot .c-header h1 { color: var(--idiot-dark); text-shadow: 0 1px 3px rgba(192, 202, 51, 0.3); }
        .f-idiot .c-header h2, .f-idiot .c-code, .f-idiot .c-faction { color: var(--idiot-dark); opacity: 0.8; }
        .f-idiot .ability-title { color: var(--idiot-dark); }
        .f-idiot .c-svg-wrapper { background: radial-gradient(circle, rgba(192, 202, 51, 0.1) 0%, transparent 70%); }

        .f-prince { background: linear-gradient(135deg, #ffffff 0%, #fbe9e7 100%); border: 3px solid var(--prince-base); }
        .f-prince:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(255, 87, 34, 0.4); }
        .f-prince::before { border-color: rgba(255, 87, 34, 0.3); }
        .f-prince .c-header h1 { color: var(--prince-dark); text-shadow: 0 1px 3px rgba(255, 87, 34, 0.3); }
        .f-prince .c-header h2, .f-prince .c-code, .f-prince .c-faction { color: var(--prince-dark); opacity: 0.8; }
        .f-prince .ability-title { color: var(--prince-dark); }
        .f-prince .c-svg-wrapper { background: radial-gradient(circle, rgba(255, 87, 34, 0.1) 0%, transparent 70%); }

        /* =========================================================
           LITTLE GIRL (Magenta / Berry) - NEW
           ========================================================= */
        .f-girl { background: linear-gradient(135deg, #ffffff 0%, #fce4ec 100%); border: 3px solid var(--girl-base); }
        .f-girl:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(216, 27, 96, 0.4); }
        .f-girl::before { border-color: rgba(216, 27, 96, 0.3); }
        .f-girl .c-header h1 { color: var(--girl-dark); text-shadow: 0 1px 3px rgba(216, 27, 96, 0.2); }
        .f-girl .c-header h2 { color: var(--girl-dark); opacity: 0.8; }

        .f-girl .ability-title { color: var(--girl-dark); }
        .f-girl .c-code, .f-girl .c-faction { color: var(--girl-dark); opacity: 0.8; }

        /* =========================================================
           KARTU: CARD BACK (Belakang)
           ========================================================= */
        .f-back { background: #ffffff; }
        .f-back:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.1), 0 0 15px rgba(212, 175, 55, 0.4); }
        .f-back::before { border-color: var(--sup-base); inset: 6px; opacity: 0.5; }
        .back-pattern {
            position: absolute; inset: 0; opacity: 0.08;
            background-image: repeating-linear-gradient(45deg, var(--sup-dark) 0, var(--sup-dark) 1px, transparent 1px, transparent 8px),
                              repeating-linear-gradient(-45deg, var(--sup-dark) 0, var(--sup-dark) 1px, transparent 1px, transparent 8px);
        }
        .back-center-logo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            display: flex; justify-content: center; align-items: center;
        }
        .back-text-top {
            position: absolute; top: 15px; left: 0; right: 0; text-align: center;
            font-family: 'Cinzel', serif; color: var(--sup-dark); font-size: 10px; letter-spacing: 4px; text-shadow: 0 1px 3px rgba(212, 175, 55, 0.2); font-weight: 700;
        }
        .back-text-bottom {
            position: absolute; bottom: 15px; left: 0; right: 0; text-align: center;
            font-family: 'Cinzel', serif; color: var(--sup-dark); font-size: 7px; letter-spacing: 2px; font-weight: 700;
        }

        /* PRINT MEDIA QUERY */
        @media print {
            @page { size: A4; margin: 0; }
            body { background: none; padding: 0; }

            .card { box-shadow: none !important; transform: none !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    
        .screen-only { }
        .control-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; padding: 15px 25px; margin: 0 auto 30px; max-width: 900px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; position: relative; z-index: 10;}
        .control-group { display: flex; align-items: center; gap: 8px; background: #fdfbf7; padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); }
        .control-group label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
        .control-group select { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; background: #fff; color: #222; cursor: pointer; outline: none; transition: border-color 0.2s; }
        .control-group select:focus { border-color: #d4af37; }
        .control-btn { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; padding: 10px 18px; border-radius: 8px; cursor: pointer; letter-spacing: 0.5px; border: none; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; align-items: center; gap: 6px; }
        .btn-gold { background: linear-gradient(135deg, #aa771c, #d4af37); color: #000; box-shadow: 0 4px 12px rgba(170, 119, 28, 0.3); }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(170, 119, 28, 0.5); }

<body>

<div class="control-panel screen-only">
    <div style="width: 100%; text-align: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
        <p style="margin: 0; font-size: 13px; color: #333; font-weight: 500;">
            <span style="color: #aa771c; font-weight: 700;">PANDUAN CETAK:</span> Tekan <kbd>Ctrl+P</kbd> dan pastikan:
            <strong>1.</strong> Format: <strong style="color:red">A4</strong> &nbsp;&nbsp;
            <strong>2.</strong> Scale/Skala: <strong style="color:red">100% (Custom)</strong> &nbsp;&nbsp;
            <strong>3.</strong> Margins: <strong style="color:red">None</strong> &nbsp;&nbsp;
            <strong>4.</strong> Centang <strong style="color:red">"Background graphics"</strong>.
        </p>
        <p style="margin: 4px 0 0; font-size: 11px; color: #777;">
            Gunakan panel di bawah ini untuk mengontrol ukuran kertas &amp; format, atau klik ganda pada kartu untuk unduhan instan.
        </p>
    </div>
    
    <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%;">
        <div class="control-group">
            <label for="paper-size">Kertas:</label>
            <select id="paper-size" onchange="changePaperSize()">
                <option value="a4">A4 (9 Kartu)</option>
                <option value="f4">F4 / Folio (9 Kartu)</option>
                <option value="a3">A3 (20 Kartu)</option>
                <option value="a3plus">A3+ (25 Kartu)</option>
                <option value="single">Single (Cetak PVC)</option>
            </select>
        </div>
        <div class="control-group">
            <label for="pdf-dpi">Detail PDF:</label>
            <select id="pdf-dpi" onchange="changePaperSize()">
                <option value="1">Standar (96 DPI)</option>
                <option value="2">Tajam (192 DPI)</option>
                <option value="4">Ekstrem (384 DPI)</option>
            </select>
        </div>
        <button class="control-btn btn-red" onclick="window.print()" title="Simpan sebagai PDF (Ctrl+P)">
            🖨️ Simpan PDF
        </button>
        
        <div style="width: 2px; background: #eee; margin: 0 5px; border-radius: 2px;"></div>
        
        <div class="control-group">
            <label for="export-format">Format:</label>
            <select id="export-format">
                <option value="png">PNG (Transparan)</option>
                <option value="jpg">JPG (Background Putih)</option>
            </select>
        </div>
        <button id="btn-download-all" class="control-btn btn-gold" onclick="downloadAllCardsDomToImage('LightCelest', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#ffffff':null})">
            ⬇ Download ZIP
        </button>
    </div>
</div>

<div id="pages-container"></div>
<script src="svg_lightcelest.js"></script>
<script src="cards.js"></script>
<script>
    // IDs of roles originally included in lightcelest.html
    const includedIds = [
        'SP·01', // Moderator
        'VL·01', // Seer
        'WW·03', // Alpha Wolf
        'NT·01', // Jester
        'NT·03', // Cupid
        'VL·04', // Hunter
        'VL·02', // Guard
        'VL·03', // Witch
        'WW·01', // Werewolf (mapped to WW.02 originally)
        'VL·13', // Wizard
        'VL·20', // Veteran
        'VL·18', // Bodyguard
        'VL·19', // Priest
        'VL·10', // Mayor
        'VL·09', // Sheriff
        'VL·14', // Villager 1
        'VL·15', // Villager 2
        'VL·16', // Villager 3
        'WW·02', // Werewolf (mapped to WW.03 originally)

        'NT·04', // Doppelganger

    ];

    // Mapping from card ID to specific CSS class used in lightcelest
    const classMap = {
        'SP·01': 'f-supreme',
        'VL·01': 'f-good',
        'WW·03': 'f-evil',
        'NT·01': 'f-neutral',
        'NT·03': 'f-cupid',
        'VL·04': 'f-hunter',
        'VL·02': 'f-guard',
        'VL·03': 'f-witch',
        'WW·01': 'f-evil',
        'VL·13': 'f-wizard',
        'VL·20': 'f-soldier',
        'VL·18': 'f-bodyguard',
        'VL·19': 'f-priest',
        'VL·10': 'f-mayor',
        'VL·09': 'f-sheriff',
        'VL·14': 'f-good',
        'VL·15': 'f-good',
        'VL·16': 'f-good',
        'WW·02': 'f-evil',
        'WW·05': 'f-lonewolf',
        'NT·04': 'f-doppel',
        'NT·05': 'f-killer',
        'VL·26': 'f-idiot',
        'VL·35': 'f-prince',
        'VL·07': 'f-girl'
    };

    // Map CSS faction class → displayed faction label
    const factionLabelMap = {
        'f-supreme':   'SUPREME',
        'f-good':      'ALLIANCE',
        'f-hunter':    'ALLIANCE',
        'f-guard':     'ALLIANCE',
        'f-witch':     'ALLIANCE',
        'f-wizard':    'ALLIANCE',
        'f-soldier':   'ALLIANCE',
        'f-bodyguard': 'ALLIANCE',
        'f-priest':    'ALLIANCE',
        'f-mayor':     'ALLIANCE',
        'f-sheriff':   'ALLIANCE',
        'f-idiot':     'ALLIANCE',
        'f-prince':    'ALLIANCE',
        'f-girl':      'ALLIANCE',
        'f-evil':      'SHADOWS',
        'f-neutral':   'NEUTRAL',
        'f-cupid':     'NEUTRAL',
        'f-lonewolf':  'NEUTRAL',
        'f-doppel':    'NEUTRAL',
        'f-killer':    'NEUTRAL',
    };

    function generateCardHTML(card) {
        const customClass = classMap[card.id] || 'f-neutral';
        return `
    <div class="card ${customClass}">
        <div class="c-code c-id">${card.id}</div>
        <div class="c-faction">${factionLabelMap[customClass] || ''}</div>
        <div class="c-header">
            <h1 class="card-name">${card.nameId}</h1>
            <h2>${card.nameEn}</h2>
        </div>
        <div class="c-svg-wrapper">
            ${svgsLightCelest[card.id] || ''}
        </div>
        <div class="c-content">
            <div class="ability-title">${card.ability}</div>
            <div class="desc-text">
                ${card.desc}
            </div>
        </div>
    </div>`;
    }

    const backContent = `
    <div class="card f-back">
        <div class="back-pattern"></div>
        <div class="back-text-top">WEREWOLF</div>
        <div class="back-center-logo">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                <defs>
                    <linearGradient id="backGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#d4af37" />
                        <stop offset="50%" stop-color="#8a5a19" />
                        <stop offset="100%" stop-color="#5c3a0d" />
                    </linearGradient>
                </defs>
                <circle cx="100" cy="100" r="90" fill="none" stroke="url(#backGrad)" stroke-width="1.5" stroke-dasharray="4 4"/>
                <circle cx="100" cy="100" r="85" fill="none" stroke="url(#backGrad)" stroke-width="2.5"/>
                <circle cx="100" cy="100" r="75" fill="none" stroke="url(#backGrad)" stroke-width="1"/>
                <circle cx="100" cy="20" r="6" fill="url(#backGrad)"/>
                <circle cx="100" cy="180" r="6" fill="none" stroke="url(#backGrad)" stroke-width="2"/>
                <circle cx="20" cy="100" r="6" fill="url(#backGrad)" opacity="0.7"/>
                <circle cx="180" cy="100" r="6" fill="url(#backGrad)" opacity="0.7"/>
                <polygon points="100,25 175,100 100,175 25,100" fill="none" stroke="url(#backGrad)" stroke-width="1.5" opacity="0.5"/>
                <polygon points="100,40 160,100 100,160 40,100" fill="none" stroke="url(#backGrad)" stroke-width="1.5" opacity="0.7"/>
                <circle cx="100" cy="100" r="50" fill="none" stroke="url(#backGrad)" stroke-width="2.5"/>
                <path d="M 100 130 C 80 130 70 110 75 90 C 78 80 85 70 85 60 C 85 55 90 50 95 55 C 92 65 95 75 105 80 C 115 85 120 70 120 65 C 122 62 128 65 125 70 C 120 85 130 100 120 120 C 115 125 110 130 100 130 Z" fill="url(#backGrad)"/>
                <polygon points="100,60 102,65 107,65 103,68 104,73 100,70 96,73 97,68 93,65 98,65" fill="url(#backGrad)"/>
            </svg>
        </div>
        <div class="back-text-bottom">OBSIDIAN VANGUARD</div>
    </div>`;

    function changePaperSize() {
        const paperId = document.getElementById('paper-size').value;
        const container = document.getElementById("pages-container");
        const dpiScale = parseFloat(document.getElementById('pdf-dpi')?.value || 1);
        container.innerHTML = ""; // Clear existing

        let cols = 3, rows = 3;
        let wMM = 210, hMM = 297, cssPadding = "15mm 15mm", cssGap = "5mm";
        
        if (paperId === 'a4') {
            cols = 3; rows = 3; wMM = 210; hMM = 297;
            cssPadding = "15mm 15mm"; cssGap = "5mm";
        } else if (paperId === 'f4') {
            cols = 3; rows = 3; wMM = 215; hMM = 330;
            cssPadding = "25mm 15.5mm"; cssGap = "5mm";
        } else if (paperId === 'a3') {
            cols = 5; rows = 4; wMM = 297; hMM = 420;
            cssPadding = "28mm 1.1mm"; cssGap = "1.2mm";
        } else if (paperId === 'a3plus') {
            cols = 5; rows = 5; wMM = 329; hMM = 483;
            cssPadding = "8.5mm 11.5mm"; cssGap = "4mm";
        } else if (paperId === 'single') {
            cols = 1; rows = 1; wMM = 54; hMM = 85.6;
            cssPadding = "0"; cssGap = "0mm";
        }
        
        const cssWidth = wMM + "mm";
        const cssHeight = hMM + "mm";
        const printTargetWidth = parseFloat((wMM * dpiScale).toFixed(2)) + "mm";
        const printTargetHeight = parseFloat((hMM * dpiScale).toFixed(2)) + "mm";
        
        const localCardsPerPage = cols * rows;

        // Render Dynamic CSS
        let styleEl = document.getElementById('dynamic-paper-style');
        if (!styleEl) {
            styleEl = document.createElement('style');
            styleEl.id = 'dynamic-paper-style';
            document.head.appendChild(styleEl);
        }
        
        styleEl.innerHTML = `
            @page { size: ${printTargetWidth} ${printTargetHeight}; margin: 0; }
            @media print {
                .screen-only, h1.print-title, .print-subtitle, .screen-note { display: none !important; }
                .page { 
                    width: ${cssWidth}; height: ${cssHeight}; 
                    padding: ${cssPadding} !important; gap: ${cssGap} !important; 
                    margin: 0; page-break-after: always; page-break-inside: avoid; display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: flex-start; overflow: hidden; 
                    zoom: ${dpiScale};
                }
            }
            .page {
                width: ${cssWidth};
                min-height: ${cssHeight};
                padding: ${cssPadding};
                gap: ${cssGap};
                display: flex;
                flex-wrap: wrap;
                align-content: flex-start;
                justify-content: flex-start;
            }
        `;

        // Render Cards
        const filteredCards = cardsData.filter(c => includedIds.includes(c.id));
        // Sort them as per includedIds array for original order
        filteredCards.sort((a, b) => includedIds.indexOf(a.id) - includedIds.indexOf(b.id));

        let htmlContent = '';
        for (let i = 0; i < filteredCards.length; i += localCardsPerPage) {
            const pageCards = filteredCards.slice(i, i + localCardsPerPage);
            
            let pageHTML = `<div class="page">`;
            pageCards.forEach(card => {
                pageHTML += generateCardHTML(card);
            });
            pageHTML += `</div>`;
            
            container.innerHTML += pageHTML;
        }

        // Render Backs
        let backPageHTML = `<div class="page">`;
        for (let i = 0; i < localCardsPerPage; i++) {
            backPageHTML += backContent;
        }
        backPageHTML += `</div>`;
        container.innerHTML += backPageHTML;
    }

    document.addEventListener("DOMContentLoaded", () => {
        changePaperSize();
        if(window.location.search.includes('preview=1')) { setTimeout(() => { const card = document.querySelector('.card'); if (card) { document.body.innerHTML = ''; document.body.appendChild(card); document.body.style.cssText = 'margin:0;padding:0;background:transparent;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;'; card.style.transform = 'scale(1)'; card.style.margin = '0'; } }, 50); }
    });

    // Double click / double tap download functionality
    document.addEventListener('dblclick', function(e) {
        const card = e.target.closest('.card');
        if (!card) return;
        downloadCard(card);
    });
    
    let lastTap = 0;
    document.addEventListener('touchend', function(e) {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        if (tapLength < 500 && tapLength > 0) {
            const card = e.target.closest('.card');
            if (card) {
                downloadCard(card);
                e.preventDefault();
            }
        }
        lastTap = currentTime;
    });
    
    function downloadCard(card) {
        const format = (document.getElementById('export-format').value || 'png').trim().toLowerCase();
        const idElement = card.querySelector('.c-id, .c-code');
        let cardId = idElement ? idElement.innerText : 'card-back';
        cardId = cardId.replace(/·/g, '-');
        const bgColor = format === 'jpg' ? '#ffffff' : null;
        if(typeof downloadCardDomToImage !== "undefined") {
            downloadCardDomToImage(card, `Werewolf-${cardId}`, { format, bgColor });
        }
    }
</script>
