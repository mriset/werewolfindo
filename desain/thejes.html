<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf - Jester's Chaos Edition</title>

    <!-- Kombinasi Font Premium untuk berbagai tema -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Oswald:wght@500;700;900&family=Caveat:wght@700&family=Special+Elite&family=Rye&display=swap"
        rel="stylesheet">

    <style>
        :root {
            /* Dimensi Kartu Fisik Presisi (Standar Eropa) */
            --card-w: 54mm;
            --card-h: 85.6mm;
            --paper-white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .header h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            color: #C71585;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 0px #008080, 0 4px 15px rgba(0, 0, 0, 0.5);
            line-height: 1;
        }

        .header p {
            color: #a0aec0;
            font-size: 1rem;
            letter-spacing: 2px;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        /* --- CONTROL PANEL --- */
        .control-panel {
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 25px;
            margin: 0 auto 30px;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #222;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group label {
            font-size: 11px;
            font-weight: 700;
            color: #ccc;
            text-transform: uppercase;
        }

        .control-group select {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #333;
            color: #fff;
            cursor: pointer;
            outline: none;
        }

        button {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 700;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            color: white;
            transition: 0.2s;
        }

        .btn-print {
            background: linear-gradient(135deg, #1E272E, #27AE60);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }

        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(39, 174, 96, 0.5);
        }

        kbd {
            background: #333;
            border-radius: 3px;
            border: 1px solid #555;
            padding: 2px 4px;
        }

        /* --- PAGE LAYOUT --- */
        .page {
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 0 auto 40px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: flex-start;
        }

        @media print {

            .screen-only,
            .control-panel,
            .header {
                display: none !important;
            }

            body {
                background: none !important;
                padding: 0 !important;
            }

            .page {
                box-shadow: none !important;
                margin: 0 !important;
                page-break-after: always;
                background: none !important;
            }

            .card {
                box-shadow: none !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* ====================================================================
           UNIVERSAL CHAOTIC LAYOUT (ADAPTED FROM JESTER)
           ==================================================================== */
        .card {
            width: var(--card-w);
            height: var(--card-h);
            background: var(--paper-white);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            box-sizing: border-box;

            /* Menggunakan CSS Variabel dari Data JSON */
            padding: 3mm;
            display: flex;
            flex-direction: column;
            border: 2mm solid var(--c1);
            border-image: repeating-linear-gradient(45deg, var(--c1), var(--c1) 5mm, var(--c2) 5mm, var(--c2) 10mm) 10;
        }

        .ch-art {
            position: absolute;
            top: 14mm;
            left: 5mm;
            width: 42mm;
            height: 42mm;
            z-index: 1;
            transform: rotate(var(--rot-art));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ch-art svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 4px 4px rgba(0, 0, 0, 0.15));
        }

        .ch-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .ch-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .ch-faction-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2mm;
        }

        .ch-faction {
            font-family: var(--f-faction);
            font-size: 6pt;
            color: var(--c2);
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .ch-code {
            font-family: 'Special Elite', monospace;
            font-size: 4pt;
            color: #fff;
            background: var(--c1);
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            padding: 2mm 1mm;
        }

        .ch-titles {
            text-align: right;
            transform: rotate(var(--rot-title));
            transform-origin: top right;
        }

        .ch-title {
            font-family: var(--f-title);
            font-size: 19pt;
            font-weight: 900;
            color: var(--c1);
            line-height: 0.85;
            text-shadow: 1px 1px 0px #fff, 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        .ch-title-en {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 4.5pt;
            background: var(--c2);
            color: #FFF;
            padding: 0.8mm 1.5mm;
            display: inline-block;
            margin-top: 1mm;
            letter-spacing: 1px;
        }

        .ch-footer {
            margin-top: auto;
            background: rgba(255, 255, 255, 0.95);
            border: 1.5px dashed var(--c1);
            padding: 2mm;
            transform: rotate(var(--rot-foot));
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.05);
        }

        .ch-quote {
            font-family: var(--f-quote);
            font-size: 6.5pt;
            color: var(--c1);
            margin-bottom: 1.5mm;
            line-height: 1.1;
            text-align: center;
            font-weight: 700;
        }

        .ch-desc {
            font-family: 'Montserrat', sans-serif;
            font-size: 5pt;
            font-weight: 600;
            color: #222;
            line-height: 1.35;
            text-align: justify;
        }

        .ch-desc b {
            color: var(--c2);
            font-weight: 900;
        }

        /* KHUSUS CARD BACK */
        .card-back .ch-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--c2);
            background: var(--c1);
            color: #fff;
        }

        .card-back .ch-desc {
            color: #fff;
            text-align: center;
            font-size: 5.5pt;
            letter-spacing: 1px;
        }

        .card-back .ch-title {
            font-size: 24pt;
        }
    </style>
</head>

<body>

    </div>

            </p>

        <div style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; width:100%;">

                    <path d="M 40,75 L 65,75 L 50,88 Z" fill="#FFFFFF"/>
                    
                    <!-- Stars -->
                    <polygon points="30,30 32,35 37,35 33,38 35,43 30,40 25,43 27,38 23,35 28,35" fill="var(--c2)"/>
                    <circle cx="70" cy="40" r="1.5" fill="#FFFFFF"/>
                    <circle cx="25" cy="60" r="1" fill="#FFFFFF"/>
                </svg>`
        };

        // FUNGSI GENERATE HTML KARTU MENGGUNAKAN 1 TEMPLATE "JESTER/CHAOTIC"
        function generateCardHTML(card) {
            // Setup CSS Variables inline for this specific card
            const inlineStyles = `
                --c1: ${card.c1};
                --c2: ${card.c2};
                --rot-art: ${card.rotArt};
                --rot-title: ${card.rotTitle};
                --rot-foot: ${card.rotFoot};
                --f-title: ${card.fTitle};
                --f-faction: ${card.fFaction};
                --f-quote: ${card.fQuote};
            `;

            // Jika ini adalah kartu belakang, kita sembunyikan quote dan modifikasi footer
            const isBackClass = card.isBack ? 'card-back' : '';
            const quoteHTML = card.isBack ? '' : `<div class="ch-quote">${card.quote}</div>`;

            return `
            <div class="card ${isBackClass}" style="${inlineStyles}">
                <div class="ch-art">${cardArt[card.id]}</div>
                <div class="ch-content">
                    <div class="ch-header">
                        <div class="ch-faction-wrap">
                            <div class="ch-faction">${card.faction}</div>
                            <div class="ch-code">${card.code}</div>
                        </div>
                        <div class="ch-titles">
                            <div class="ch-title">${card.titleId}</div>
                            <div class="ch-title-en">${card.titleEn}</div>
                        </div>
                    </div>
                    <div class="ch-footer">
                        ${quoteHTML}
                        <div class="ch-desc">${card.desc}</div>
                    </div>
                </div>
            </div>`;
        }

        // FUNGSI GANTI KERTAS UNTUK PRINT
        function changePaperSize() {
            const paperId = document.getElementById('paper-size').value;
            const container = document.getElementById("pages-container");
            container.innerHTML = "";

            let wMM = 210, hMM = 297, cssPadding = "15mm 15mm", cssGap = "5.5mm";
            let cardsPerPage = 9;

            if (paperId === 'a4') {
                wMM = 210; hMM = 297; cssPadding = "15mm 15mm"; cssGap = "5.5mm"; cardsPerPage = 9;
            } else if (paperId === 'single') {
                wMM = 54; hMM = 85.6; cssPadding = "0"; cssGap = "0mm"; cardsPerPage = 1;
            }

            let styleEl = document.getElementById('dynamic-paper-style');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'dynamic-paper-style';
                document.head.appendChild(styleEl);
            }

            styleEl.innerHTML = `
                @page { size: ${wMM}mm ${hMM}mm; margin: 0; }
                .page { width: ${wMM}mm; min-height: ${hMM}mm; padding: ${cssPadding}; gap: ${cssGap}; }
            `;

            let htmlContent = '';

            // Loop untuk merender kartu ke dalam page
            for (let i = 0; i < deckData.length; i += cardsPerPage) {
                const pageCards = deckData.slice(i, i + cardsPerPage);
                htmlContent += `<div class="page">`;
                pageCards.forEach(card => {
                    htmlContent += generateCardHTML(card);
                });
                htmlContent += `</div>`;
            }

            container.innerHTML = htmlContent;
        }

        // INIT
        document.addEventListener("DOMContentLoaded", () => {
            changePaperSize();
        });
    </script>
