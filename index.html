<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Halaman HTML</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d0f;
            background-image: radial-gradient(ellipse at 50% 0%, #1a1a2e 0%, #0d0d0f 70%);
            color: #ffffff;
            padding: 2.5rem 1.5rem;
            min-height: 100vh;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 0.4rem;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .subtitle {
            text-align: center;
            color: #555;
            font-size: 0.82rem;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            margin: 2rem 0 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #1e1e1e;
        }
        ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 0.65rem;
        }
        li a {
            display: block;
            padding: 0.75rem 1rem;
            background: #141416;
            color: #c0c0cc;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #1f1f24;
            transition: all 0.18s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        li a:hover {
            background: #1c1c22;
            color: #ffffff;
            border-color: #4db8ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(77, 184, 255, 0.12);
        }
        li a .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4db8ff;
            margin-right: 7px;
            opacity: 0.6;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Antigravity</h1>
        <p class="subtitle">Werewolf Card Design Collection</p>

        <p class="section-label">📁 Root</p>
        <ul>
            <li><a href="niasy.html"><span class="dot"></span>niasy.html</a></li>
            <li><a href="dossier.html"><span class="dot"></span>dossier.html</a></li>
            <li><a href="popartcha.html"><span class="dot"></span>popartcha.html</a></li>
            <li><a href="twiscarn.html"><span class="dot"></span>twiscarn.html</a></li>
            <li><a href="carntick.html"><span class="dot"></span>carntick.html</a></li>
            <li><a href="tornarch.html"><span class="dot"></span>tornarch.html</a></li>
            <li><a href="bestiary.html"><span class="dot"></span>bestiary.html</a></li>
            <li><a href="tacdos.html"><span class="dot"></span>tacdos.html</a></li>
        </ul>
    </div>
</body>
</html>
