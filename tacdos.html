<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightmare Asylum - Tactical Dossier Edition</title>
    <!-- Font Premium -->
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;600;800&family=Oswald:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --card-w: 54mm;
            --card-h: 85.6mm;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1c20;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .header h1 {
            font-family: 'Oswald', sans-serif;
            color: #fff;
            letter-spacing: 4px;
            font-size: 2.5rem;
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #222;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        kbd {
            background: #333;
            border-radius: 3px;
            border: 1px solid #555;
            color: #fff;
            display: inline-block;
            font-size: .85em;
            font-weight: 700;
            padding: 2px 4px;
        }

        /* --- PAGES --- */
        .page {
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 0 auto 40px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        @media print {
            .screen-only,
            .control-panel,
            .header {
                display: none !important;
            }

            body {
                background: none !important;
                padding: 0 !important;
            }

            .page {
                box-shadow: none !important;
                margin: 0 !important;
                page-break-after: always;
                page-break-inside: avoid;
                background: none !important;
            }

            .card {
                box-shadow: none !important;
                border: 1.5px solid var(--t-dark) !important;
                transform: none !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                page-break-inside: avoid;
            }
        }

        /* ==========================================
           TACTICAL DOSSIER BASE STYLE
        ========================================== */
        .card {
            width: var(--card-w);
            height: var(--card-h);
            background-color: var(--t-light);
            border: 1.5px solid var(--t-dark);
            border-radius: 3mm;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background-image: radial-gradient(var(--t-dark) 0.5px, transparent 0.5px);
            background-size: 4mm 4mm;
            -webkit-font-smoothing: antialiased;
        }

        .card:hover {
            z-index: 10;
        }

        .tac-header {
            background: var(--t-dark);
            height: calc(28mm + 2px);
            padding: calc(3mm + 2px) calc(4mm + 2px) 3mm calc(4mm + 2px);
            margin: -2px -2px 0 -2px;
            width: calc(100% + 4px);
            clip-path: polygon(0 0, 100% 0, 100% 55%, 0 100%);
            position: relative;
            z-index: 1;
        }

        .tac-code {
            font-family: 'Courier Prime', monospace;
            font-size: 5pt;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .tac-title-en {
            font-family: 'Oswald', sans-serif;
            font-size: 16pt;
            font-weight: 900;
            color: var(--t-title);
            line-height: 1.1;
            margin-top: 1mm;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tac-title-id {
            font-family: 'Courier Prime', monospace;
            font-size: 6pt;
            color: #fff;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .tac-watermark {
            position: absolute;
            right: 1.5mm;
            bottom: 3mm;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-family: 'Oswald', sans-serif;
            font-size: 5pt;
            color: var(--t-dark);
            opacity: 0.3;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .tac-art {
            position: absolute;
            right: 3mm;
            top: 15mm;
            width: 40mm;
            height: 40mm;
            z-index: 2;
            filter: drop-shadow(3px 5px 4px rgba(0, 0, 0, 0.25));
        }

        .tac-content {
            margin-top: auto;
            margin-bottom: 3.5mm;
            margin-left: 3.5mm;
            margin-right: 5mm;
            padding: 2.5mm 3mm;
            background: var(--t-bg);
            border-left: 2.5mm solid var(--t-accent);
            border-radius: 0 2mm 2mm 0;
            position: relative;
            z-index: 3;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.05);
        }

        .tac-quote {
            font-family: 'Courier Prime', monospace;
            font-size: 6pt;
            font-weight: 700;
            font-style: italic;
            color: var(--t-dark);
            margin-bottom: 2mm;
            line-height: 1.25;
        }

        .tac-ability {
            font-family: 'Montserrat', sans-serif;
            font-size: 5.2pt;
            color: #222;
            line-height: 1.4;
            font-weight: 600;
        }

        .tac-ability strong {
            color: var(--t-accent);
            font-weight: 800;
        }
        @media print {
            html, body {
                margin: 0 !important;
                padding: 0 !important;
            }
            body {
                display: block !important;
            }
            #pages-container {
                margin: 0 !important;
                padding: 0 !important;
            }
            .page {
                break-after: page;
            }
            .page:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }
        }

    </style>
</head>

<body>

    <div class="header screen-only">
        <h1>Nightmare Asylum</h1>
        <p style="font-family: 'Courier Prime', monospace; color: #aaa; font-size: 12px; margin: 0;">TACTICAL DOSSIER
            ARCHITECTURE - THEMED ROLES</p>
    </div>

    <!-- CONTROL PANEL -->
    <div class="control-panel screen-only" style="background: rgba(30,30,30,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px 25px; margin: 0 auto 30px; max-width: 900px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; z-index: 10;">
        <div style="width:100%; text-align:center; margin-bottom:12px; border-bottom:1px solid #444; padding-bottom:10px;">
            <p style="margin:0; font-size:13px; color:#fff; font-weight:500;">
                <span style="color:#27AE60; font-weight:700;">PANDUAN CETAK:</span>
                Tekan <kbd>Ctrl+P</kbd> dan pastikan:
                <strong>1.</strong> Format: <strong style="color:#27AE60">A4</strong>&nbsp;&nbsp;
                <strong>2.</strong> Scale: <strong style="color:#27AE60">100%</strong>&nbsp;&nbsp;
                <strong>3.</strong> Margins: <strong style="color:#27AE60">None</strong>&nbsp;&nbsp;
                <strong>4.</strong> Centang <strong style="color:#27AE60">Background graphics</strong>.
            </p>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; width:100%;">
            <div class="control-group">
                <label for="paper-size" style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Kertas:</label>
                <select id="paper-size" onchange="changePaperSize()" style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="a4">A4 (9 Kartu)</option>
                    <option value="f4">F4 / Folio (9 Kartu)</option>
                    <option value="a3">A3 (20 Kartu)</option>
                    <option value="a3plus">A3+ (25 Kartu)</option>
                    <option value="single">Single (Per Kartu)</option>
                </select>
            </div>
            <div style="width:2px; background:#444; margin:0 5px; border-radius:2px;"></div>
            <div class="control-group">
                <label for="export-dpi" style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Detail PDF:</label>
                <select id="export-dpi" onchange="changePaperSize()" style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="1">Standar (96 DPI)</option>
                    <option value="2">Tajam (192 DPI)</option>
                    <option value="4" selected>Ekstrem (384 DPI)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="back-mode" style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Balik:</label>
                <select id="back-mode" onchange="changePaperSize()" style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="duplex">Duplex / Otomatis</option>
                    <option value="manual-long">Manual (Sisi Panjang)</option>
                    <option value="manual-short">Manual (Sisi Pendek)</option>
                </select>
            </div>
            <button onclick="window.print()" style="font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; padding:10px 18px; border-radius:8px; cursor:pointer; border:none; background:linear-gradient(135deg,#1E272E,#27AE60); box-shadow:0 4px 12px rgba(39,174,96,0.3); color:white;">
                🖨️ Simpan PDF
            </button>
            <div style="width:2px; background:#444; margin:0 5px; border-radius:2px;"></div>
            <div class="control-group">
                <label for="export-format" style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Zip:</label>
                <select id="export-format" style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                </select>
            </div>
            <button id="btn-download-all" onclick="downloadAllCardsDomToImage('TacDos', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#ffffff':null})" style="font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; padding:10px 18px; border-radius:8px; cursor:pointer; border:none; background:linear-gradient(135deg,#3B1C54,#F39C12); box-shadow:0 4px 12px rgba(243,156,18,0.3); color:white;">
                ⬇ Download (.ZIP)
            </button>
        </div>
    </div>

    <!-- DYNAMIC CONTAINER -->
    <div id="pages-container"></div>

    <!-- DATA & ART SCRIPTS -->
    <script src="tacdos_data.js"></script>
    <script src="svg_tacdos.js"></script>

    <script>
        function generateTacdosCard(card) {
            var backContentStyle = card.isBack ? ' style="border-left-color: #111;"' : '';
            var quoteHtml = card.isBack
                ? '<div class="tac-quote" style="text-align:center; font-size:7pt; letter-spacing:1px;">' + card.quote + '</div>'
                : '<div class="tac-quote">' + card.quote + '</div>';
            var abilityHtml = card.isBack
                ? '<div style="text-align:center; color:#D4AF37; font-size:8pt; letter-spacing:3px; font-weight:900; background:#111; padding:2mm; border-radius:1mm;">' + card.ability + '</div>'
                : '<div class="tac-ability">' + card.ability + '</div>';

            var html = '';
            html += '<div class="card" id="' + card.id + '" data-id="' + card.id + '" style="' + card.cssVars + '">';
            html += '  <div class="tac-header">';
            html += '    <div class="tac-code c-code">' + card.code + '</div>';
            html += '    <div class="tac-title-en">' + card.titleEn + '</div>';
            html += '    <div class="tac-title-id">' + card.titleId + '</div>';
            html += '  </div>';
            html += '  <div class="tac-art">' + (tacdosArt[card.id] || '') + '</div>';
            html += '  <div class="tac-content"' + backContentStyle + '>';
            html += '    ' + quoteHtml;
            html += '    ' + abilityHtml;
            html += '  </div>';
            html += '  <div class="tac-watermark">' + card.watermark + '</div>';
            html += '</div>';
            return html;
        }

                function mapBackSlotIndex(slotIndex, cols, rows, backMode) {
            var row = Math.floor(slotIndex / cols);
            var col = slotIndex % cols;
            if (backMode === 'manual-long') {
                col = (cols - 1) - col;
            } else if (backMode === 'manual-short') {
                row = (rows - 1) - row;
            }
            return (row * cols) + col;
        }

        function renderPageFromSlots(slotCards, isBackPage, renderCardFn, placeholderClass) {
            var html = "<div class=\"page" + (isBackPage ? " page-back" : "") + "\">";
            var placeholder = "<div class=\"" + placeholderClass + " card-placeholder\" style=\"visibility:hidden;border:0 !important;box-shadow:none !important;background:transparent !important;pointer-events:none !important;\" aria-hidden=\"true\"></div>";
            for (var i = 0; i < slotCards.length; i++) {
                if (slotCards[i]) html += renderCardFn(slotCards[i]);
                else html += placeholder;
            }
            html += "</div>";
            return html;
        }

        function changePaperSize() {
            var paperSelect = document.getElementById('paper-size');
            var dpiSelect = document.getElementById('export-dpi') || document.getElementById('pdf-dpi');
            var backModeSelect = document.getElementById('back-mode');
            var paperId = paperSelect ? paperSelect.value : 'a4';
            var dpiScale = parseFloat(dpiSelect ? dpiSelect.value : '1');
            var backMode = backModeSelect ? backModeSelect.value : 'duplex';
            var container = document.getElementById('pages-container') || document.querySelector('.pages-container');
            if (!container) return;
            container.innerHTML = "";

            var config = window.CardPrintLayout ? window.CardPrintLayout.applyCSS(paperId, dpiScale) : { cardsPerPage: 9, cols: 3, rows: 3 };
            var cardsPerPage = config.cardsPerPage || (config.cols * config.rows);
            var cols = config.cols || 3;
            var rows = config.rows || 3;
            var renderCardFn = generateTacdosCard;
            var placeholderClass = 'card';

            var htmlContent = "";
            var frontCards = tacdosDeckData.filter(function(c) { return !c.isBack; });
            var backCardData = null;
            for (var k = 0; k < tacdosDeckData.length; k++) {
                if (tacdosDeckData[k].isBack) { backCardData = tacdosDeckData[k]; break; }
            }

            if (paperId === 'single') {
                for (var s = 0; s < frontCards.length; s++) {
                    htmlContent += renderPageFromSlots([frontCards[s]], false, renderCardFn, placeholderClass);
                    if (backCardData) {
                        htmlContent += renderPageFromSlots([backCardData], true, renderCardFn, placeholderClass);
                    }
                }
            } else {
                for (var i = 0; i < frontCards.length; i += cardsPerPage) {
                    var pageCards = frontCards.slice(i, i + cardsPerPage);
                    var frontSlots = new Array(cardsPerPage).fill(null);
                    for (var j = 0; j < pageCards.length; j++) {
                        frontSlots[j] = pageCards[j];
                    }
                    htmlContent += renderPageFromSlots(frontSlots, false, renderCardFn, placeholderClass);

                    if (backCardData) {
                        var backSlots = new Array(cardsPerPage).fill(null);
                        for (var b = 0; b < pageCards.length; b++) {
                            var mappedIndex = mapBackSlotIndex(b, cols, rows, backMode);
                            backSlots[mappedIndex] = backCardData;
                        }
                        htmlContent += renderPageFromSlots(backSlots, true, renderCardFn, placeholderClass);
                    }
                }
            }

            container.innerHTML = htmlContent;
        }
        document.addEventListener('DOMContentLoaded', function() { changePaperSize(); });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@2.8.0/dist/dom-to-image-more.min.js"></script>
    <script src="download_helper.js?v=2"></script>
</body>
</html>
