
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Modern Editorial Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #eef2f6; 
            font-family: 'Crimson Pro', serif; 
            padding: 40px; 
            color: #111; 
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-title {
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #1A365D;
            margin-bottom: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .header-desc {
            text-align: center;
            color: #4A5568;
            margin-bottom: 50px;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            letter-spacing: 1px;
            max-width: 800px;
        }

        .page { 
            width: 210mm; 
            min-height: 297mm; 
            background: #faf8f5; 
            margin: 0 auto 30px; 
            padding: 9.15mm 3.75mm; 
            display: grid; 
            grid-template-columns: repeat(3, 54.5mm); 
            grid-template-rows: repeat(3, 85.5mm); 
            gap: 6mm; 
            justify-content: center; 
            align-content: center; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15); 
            position: relative; 
        }

        .cards-container {
            width: 100%;
        }

        @media print {
            body { background: #fff; padding: 0; }
            .header-title, .header-desc, #export-options-container { display: none !important; }
            .page { box-shadow: none; margin: 0; page-break-after: always; outline: none; background: #fff; }
            .card { box-shadow: inset 0 0 0 1.5mm #F7FAFC !important; }
            @page { size: A4; margin: 0; }
        }

        /* ---------------------------------------------------
           COMMON CARD BASE (Modern Editorial Structure)
           --------------------------------------------------- */
        .card {
            width: 54.5mm;
            height: 85.5mm;
            position: relative;
            background: #ffffff;
            border-radius: 4mm;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 0 1.5mm #F7FAFC;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Ensure SVGs respect container */
        .card svg { width: 100%; height: 100%; display: block; }

        .card .inner {
            position: absolute;
            inset: 1.5mm;
            display: flex;
            flex-direction: column;
            padding: 0;
            background: #fff;
        }

        /* Top Layout (Art + Side ID) */
        .card .top-section {
            display: flex;
            height: 42%;
            border-bottom: 0.5px solid #E2E8F0;
        }
        .card .art-container {
            width: 65%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 0.5px solid #E2E8F0;
            position: relative;
            overflow: hidden;
            padding: 2mm;
        }
        .card .art-container::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 15px;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.03));
        }

        .card .id-faction-col {
            width: 35%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
            padding: 2mm;
            position: relative;
        }

        /* Faction vertical text — using transform instead of writing-mode
           because html2canvas mis-renders writing-mode + rotate(180deg). */
        .card .faction-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            overflow: hidden;
            width: 100%;
            margin-top: 1mm;
        }
        .card .faction {
            font-family: 'Outfit', sans-serif;
            font-size: 8px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            white-space: nowrap;
            transform: rotate(-90deg);
            transform-origin: center center;
        }
        .card .id {
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 2mm;
            letter-spacing: 0.5px;
        }

        /* Bottom Section */
        .card .bottom-section {
            padding: 3mm;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .card .name {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }
        .card .name-en {
            font-family: 'Outfit', sans-serif;
            font-size: 7px;
            font-weight: 500;
            color: #718096;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 1mm;
            margin-bottom: 2.5mm;
            padding-bottom: 1.5mm;
            display: inline-block;
        }
        .card .ability {
            font-family: 'Outfit', sans-serif;
            font-size: 7.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1.5mm;
        }
        .card .desc {
            font-family: 'Crimson Pro', serif;
            font-size: 9.5px;
            color: #2D3748;
            line-height: 1.35;
            text-align: left;
            flex-grow: 1;
        }
        .card .desc strong { font-weight: 700; }
        .card .footer {
            font-family: 'Outfit', sans-serif;
            font-size: 6px;
            font-weight: 700;
            color: #A0AEC0;
            text-align: right;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: auto;
        }

        /* ===================================================
           THEMING BY FACTION
           =================================================== */

        /* 1. KHUSUS / MODERATOR (Supreme) -> Purple / Gold */
        .theme-supreme { border: 0.5mm solid #553C9A; }
        .theme-supreme .art-container { background: #FAF5FF; }
        .theme-supreme .faction { color: #553C9A; }
        .theme-supreme .id { color: #322659; }
        .theme-supreme .name { color: #322659; }
        .theme-supreme .name-en { border-bottom: 1.5px solid #553C9A; }
        .theme-supreme .ability { color: #553C9A; }
        .theme-supreme .desc strong { color: #322659; }
        .theme-supreme .id-faction-col::before {
            content: ''; position: absolute; top:0; left:0; width: 1.5px; height: 100%; background: #D6BCFA;
        }

        /* 2. BAIK / VILLAGER (Good) -> Blue */
        .theme-good { border: 0.5mm solid #2B6CB0; }
        .theme-good .art-container { background: #EBF8FF; }
        .theme-good .faction { color: #2B6CB0; }
        .theme-good .id { color: #1A365D; }
        .theme-good .name { color: #1A365D; }
        .theme-good .name-en { border-bottom: 1.5px solid #2B6CB0; }
        .theme-good .ability { color: #2B6CB0; }
        .theme-good .desc strong { color: #1A365D; }
        .theme-good .id-faction-col::before {
            content: ''; position: absolute; top:0; left:0; width: 1.5px; height: 100%; background: #BEE3F8;
        }

        /* 3. JAHAT / WEREWOLF (Evil) -> Red/Crimson */
        .theme-evil { border: 0.5mm solid #C53030; }
        .theme-evil .art-container { background: #FFF5F5; }
        .theme-evil .faction { color: #C53030; }
        .theme-evil .id { color: #742A2A; }
        .theme-evil .name { color: #742A2A; }
        .theme-evil .name-en { border-bottom: 1.5px solid #C53030; }
        .theme-evil .ability { color: #C53030; }
        .theme-evil .desc strong { color: #742A2A; }
        .theme-evil .id-faction-col::before {
            content: ''; position: absolute; top:0; left:0; width: 1.5px; height: 100%; background: #FEB2B2;
        }

        /* 4. NETRAL / JESTER (Neutral) -> Slate/Green */
        .theme-neutral { border: 0.5mm solid #276749; }
        .theme-neutral .art-container { background: #F0FFF4; }
        .theme-neutral .faction { color: #276749; }
        .theme-neutral .id { color: #1C4532; }
        .theme-neutral .name { color: #1C4532; }
        .theme-neutral .name-en { border-bottom: 1.5px solid #276749; }
        .theme-neutral .ability { color: #276749; }
        .theme-neutral .desc strong { color: #1C4532; }
        .theme-neutral .id-faction-col::before {
            content: ''; position: absolute; top:0; left:0; width: 1.5px; height: 100%; background: #9AE6B4;
        }

        /* 5. BACK CARD (Absolute Black Minimalist Editorial) */
        .theme-back { 
            background: #111; 
            border: 0.5mm solid #111;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            inset: 0;
        }
        .theme-back .inner {
            background: #111;
            border: 0.5mm solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4mm;
        }
        .theme-back .title {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 8px;
            margin-top: 8mm;
            text-transform: uppercase;
        }
        .theme-back .subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 6px;
            font-weight: 500;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2mm;
        }

    </style>
</head>
<body>

    <h1 class="header-title">Werewolf: Modern Editorial</h1>
    <p class="header-desc">Desain seragam dengan layout editorial asimetris modern untuk kelima tipe kartu, mencakup 4 faksi (Supreme, Alliance, Shadows, Neutral) dan desain kartu belakang minimalis gelap.</p>

    <div id="export-options-container" style="text-align: center; margin-bottom: 30px; z-index: 10;">
        <label for="export-format" style="font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; color: #1A365D;">Format Unduhan (Klik Ganda Kartu): </label>
        <select id="export-format" style="font-family: 'Outfit', sans-serif; font-size: 14px; padding: 6px 12px; border-radius: 6px; border: 1px solid #1A365D; background: #fff; color: #111;">
            <option value="png">PNG (Transparan)</option>
            <option value="jpg">JPG (Background Putih)</option>
        </select>
        <button id="btn-download-all"
            onclick="downloadAllCards('Moded', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#ffffff':null})"
            style="margin-left:12px; font-family:'Outfit',sans-serif; font-size:14px; font-weight:700; background:linear-gradient(135deg,#1A365D,#2B5299); color:#fff; border:none; padding:7px 16px; border-radius:6px; cursor:pointer; letter-spacing:1px;">
            ⬇ Download Semua (ZIP)
        </button>
    </div>

    <div class="cards-container" id="cards-container">
        <!-- Cards injected dynamically -->
    </div>

    <script src="svg_moded.js"></script>
    <script src="cards.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="download_helper.js"></script>
    <script>
        const cardsContainer = document.getElementById('cards-container');

        const svgSupreme = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="35" fill="none" stroke="#D6BCFA" stroke-width="1"/><circle cx="50" cy="50" r="28" fill="none" stroke="#553C9A" stroke-width="0.5" stroke-dasharray="2,2"/><polygon points="50,25 80,50 50,75 20,50" fill="none" stroke="#322659" stroke-width="1.5"/><circle cx="50" cy="50" r="10" fill="#553C9A"/><circle cx="50" cy="50" r="4" fill="#FAF5FF"/><line x1="50" y1="25" x2="50" y2="15" stroke="#322659" stroke-width="1.5"/><line x1="50" y1="75" x2="50" y2="85" stroke="#322659" stroke-width="1.5"/><circle cx="50" cy="12" r="1.5" fill="#553C9A"/><circle cx="50" cy="88" r="1.5" fill="#553C9A"/></svg>`;

        const svgGood = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="40" fill="none" stroke="#BEE3F8" stroke-width="0.5"/><circle cx="50" cy="50" r="30" fill="none" stroke="#2B6CB0" stroke-width="1" stroke-dasharray="4,4"/><path d="M50,20 L75,30 L75,60 Q75,80 50,90 Q25,80 25,60 L25,30 Z" fill="#fff" stroke="#1A365D" stroke-width="2"/><path d="M40,45 L40,35 M50,55 L50,30 M60,45 L60,35" stroke="#2B6CB0" stroke-width="2" stroke-linecap="round"/><path d="M35,45 Q50,55 65,45 L65,55 Q50,65 35,55 Z" fill="#2B6CB0"/><line x1="50" y1="55" x2="50" y2="75" stroke="#1A365D" stroke-width="2.5" stroke-linecap="round"/><circle cx="50" cy="23" r="1.5" fill="#E53E3E"/></svg>`;

        const svgEvil = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="35" fill="none" stroke="#FEB2B2" stroke-width="1"/><polygon points="50,75 30,45 50,25 70,45" fill="none" stroke="#742A2A" stroke-width="1.5"/><polygon points="50,75 35,45 50,35 65,45" fill="#C53030"/><line x1="30" y1="45" x2="20" y2="30" stroke="#742A2A" stroke-width="1.5"/><line x1="70" y1="45" x2="80" y2="30" stroke="#742A2A" stroke-width="1.5"/><circle cx="43" cy="48" r="2" fill="#fff"/><circle cx="57" cy="48" r="2" fill="#fff"/><path d="M20,70 L40,20 M30,80 L50,30 M80,70 L60,20" stroke="#C53030" stroke-width="0.5" stroke-dasharray="2,4"/></svg>`;

        const svgNeutral = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="40" fill="none" stroke="#9AE6B4" stroke-width="0.5"/><path d="M30,35 Q50,20 70,35 L60,70 L40,70 Z" fill="none" stroke="#1C4532" stroke-width="1.5"/><path d="M30,35 Q50,50 70,35" fill="none" stroke="#276749" stroke-width="1"/><circle cx="40" cy="45" r="2.5" fill="#1C4532"/><circle cx="60" cy="45" r="2.5" fill="#1C4532"/><path d="M40,60 Q50,65 60,60" fill="none" stroke="#276749" stroke-width="1.5"/><circle cx="30" cy="30" r="3" fill="#276749"/><circle cx="70" cy="30" r="3" fill="#276749"/><circle cx="50" cy="22" r="3" fill="#276749"/></svg>`;

        const svgBack = `<svg viewBox="0 0 100 100" style="width: 45mm; height: 45mm;"><circle cx="50" cy="50" r="45" fill="none" stroke="#333" stroke-width="0.5"/><circle cx="50" cy="50" r="35" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="4,6"/><circle cx="50" cy="50" r="25" fill="none" stroke="#fff" stroke-width="0.5"/><polygon points="30,35 40,70 50,50 60,70 70,35 65,35 60,60 50,40 40,60 35,35" fill="#fff"/><circle cx="50" cy="15" r="4" fill="#fff"/><circle cx="50" cy="85" r="4" fill="#111" stroke="#fff" stroke-width="1"/><circle cx="15" cy="50" r="4" fill="none" stroke="#fff" stroke-width="1"/><path d="M15,46 A4,4 0 0,0 15,54 Z" fill="#fff"/><circle cx="85" cy="50" r="4" fill="none" stroke="#fff" stroke-width="1"/><path d="M85,46 A4,4 0 0,1 85,54 Z" fill="#fff"/></svg>`;

        function getSvgForTheme(theme) {
            if (theme === 'theme-supreme') return svgSupreme;
            if (theme === 'theme-evil') return svgEvil;
            if (theme === 'theme-neutral') return svgNeutral;
            return svgGood;
        }

        // Role alias: same nameEn = same illustration (master card ID)
        const roleAliases = {
            'Villager':  'VL·14',   // semua Warga Desa → pakai VL·14
            'Werewolf':  'WW·01',   // semua Serigala → pakai WW·01
            'Mason':     'VL·29',   // semua Mason (future)
        };

        function getSvgForCard(card) {
            if (typeof svgsModed === 'undefined') return getSvgForTheme(card.theme);
            // 1. Cek alias berdasarkan role nameEn
            const aliasId = roleAliases[card.nameEn];
            if (aliasId && svgsModed[aliasId]) return svgsModed[aliasId];
            // 2. Cek SVG khusus per card ID
            if (svgsModed[card.id]) return svgsModed[card.id];
            // 3. Fallback ke SVG tema
            return getSvgForTheme(card.theme);
        }

        function getColorForTheme(theme) {
            if (theme === 'theme-supreme') return '#553C9A';
            if (theme === 'theme-evil') return '#C53030';
            if (theme === 'theme-neutral') return '#276749';
            return '#2B6CB0';
        }

        const cardsPerPage = 9;
        
        function generateCardHTML(card) {
            const facLabel = card.factionArcana || card.factionWm || card.factionUp;
            return `
            <div class="card ${card.theme}">
                <div class="inner">
                    <div class="top-section">
                        <div class="art-container">
                            ${getSvgForCard(card)}
                        </div>
                        <div class="id-faction-col">
                            <div class="faction-wrapper">
                                <div class="faction">${facLabel}</div>
                            </div>
                            <div class="id">${card.id}</div>
                        </div>
                    </div>
                    <div class="bottom-section">
                        <div class="name">${card.nameId}</div>
                        <div class="name-en">${card.nameEn}</div>
                        <div class="ability">${card.ability}</div>
                        <div class="desc">${card.desc}</div>
                        <div class="footer">${card.footer}</div>
                    </div>
                </div>
            </div>
            `;
        }

        let htmlContent = '';
        for (let i = 0; i < cardsData.length; i += cardsPerPage) {
            const pageCards = cardsData.slice(i, i + cardsPerPage);
            
            htmlContent += `<div class="page">`;
            pageCards.forEach(card => {
                htmlContent += generateCardHTML(card);
            });
            htmlContent += `</div>`;
        }

        // Add 1 Page of Back Cards (9 cards)
        htmlContent += `<div class="page">`;
        for(let i=1; i<=9; i++) {
            htmlContent += `
                <div class="card theme-back">
                    <div class="inner">
                        ${svgBack}
                        <div class="title">WEREWOLF</div>
                        <div class="subtitle">MODERN EDITORIAL</div>
                    </div>
                </div>
            `;
        }
        htmlContent += `</div>`;

        cardsContainer.innerHTML = htmlContent;

        // Double Click to Download logic
        document.addEventListener('dblclick', function(e) {
            const card = e.target.closest('.card');
            if (!card) return;
            downloadCard(card);
        });

        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                const card = e.target.closest('.card');
                if (card) {
                    downloadCard(card);
                    e.preventDefault();
                }
            }
            lastTap = currentTime;
        });

        function downloadCard(card) {
            const format = (document.getElementById('export-format').value || 'png').trim().toLowerCase();
            const idElement = card.querySelector('.id');
            let cardId = idElement ? idElement.innerText : 'Back-Card';
            cardId = cardId.replace(/·/g, '-');
            const bgColor = format === 'jpg' ? '#ffffff' : null;
            downloadCardFaithful(card, `Werewolf-Editorial-${cardId}`, { format, bgColor });
        }

        function saveImage(dataUrl, cardId, ext) {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = `Werewolf-Editorial-${cardId}.${ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
