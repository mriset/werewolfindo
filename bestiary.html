<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf - Chaos Bestiary Edition</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:ital,wght@0,500;0,700;0,900;1,700&family=Playfair+Display:ital,wght@0,900;1,900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            /* Dimensi Kartu Fisik Presisi (Eropa Standard) */
            --w: 54mm;
            --h: 85.6mm;

            /* Warna Dasar yang aman untuk CMYK */
            --paper-bg: #ffffff;
            --ink-dark: #1a1a1a;
            --ink-text: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .header p {
            color: #aaa;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        kbd {
            background: #333;
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid #555;
            color: #fff;
            display: inline-block;
            font-size: .85em;
            font-weight: 700;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #222;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page {
            background: #ffffff;
            margin: 0 auto 40px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        @media print {
            html,
            body {
                margin: 0 !important;
                padding: 0 !important;
            }

            body {
                background: none !important;
                padding: 0 !important;
                display: block !important;
            }

            .header,
            .screen-only,
            .control-panel {
                display: none !important;
            }

            #pages-container {
                margin: 0 !important;
                padding: 0 !important;
            }

            .page {
                background: none !important;
                margin: 0 !important;
                page-break-after: always;
                page-break-inside: avoid;
                break-after: page;
            }

            .card {
                border: 1px solid #1a1a1a !important;
                transform: none !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                page-break-inside: avoid;
            }

            .card-placeholder {
                visibility: hidden !important;
                border: 0 !important;
            }

            .page:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }
        }

        /* =======================================================
           BASE LAYOUT: THE "CHAOS/JESTER" TEMPLATE
           ======================================================= */
        .card {
            width: var(--w);
            height: var(--h);
            background-color: var(--paper-bg);
            background-image: radial-gradient(circle at top right, rgba(0, 0, 0, 0.03), transparent 60%);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            border-radius: 3mm;
            border: 1px solid #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        .card-placeholder {
            background: transparent !important;
            border: 0 !important;
            box-shadow: none !important;
            pointer-events: none !important;
        }

        /* Frame putus-putus di dalam */
        .card-frame {
            position: absolute;
            inset: 2.5mm;
            border: 1.5px dashed var(--c-alt);
            transform: rotate(var(--r-frame));
            opacity: 0.6;
            z-index: 1;
            pointer-events: none;
        }

        /* Header (Nama Role) */
        .card-head {
            position: absolute;
            top: 4mm;
            left: -2mm;
            background: var(--c-main);
            color: #fff;
            padding: 1mm 4mm 1mm 5mm;
            transform: rotate(var(--r-head));
            z-index: 3;
            box-shadow: 2.5px 2.5px 0 var(--c-alt);
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 12.5pt;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Art Container */
        .card-art {
            position: absolute;
            top: 15mm;
            left: 50%;
            margin-left: -24mm;
            /* Center offset (width 48 / 2) */
            width: 48mm;
            height: 38mm;
            transform: rotate(var(--r-art));
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-art svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 3px 1px rgba(0, 0, 0, 0.1));
        }

        /* Teks Box di Bawah */
        .card-bottom {
            position: absolute;
            bottom: 3.5mm;
            right: 2.5mm;
            width: 90%;
            background: #ffffff;
            border: 2px solid var(--c-main);
            padding: 2mm;
            transform: rotate(var(--r-box));
            z-index: 3;
            box-shadow: -2.5px 2.5px 0 var(--c-alt);
            display: flex;
            flex-direction: column;
        }

        .card-subtitle {
            font-size: 5pt;
            font-weight: 900;
            color: var(--c-main);
            margin-bottom: 1mm;
            letter-spacing: 0.5px;
            border-bottom: 1px dotted var(--c-alt);
            padding-bottom: 0.5mm;
            text-transform: uppercase;
        }

        .card-quote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 900;
            font-size: 6.5pt;
            color: var(--ink-dark);
            line-height: 1.15;
            margin-bottom: 1.5mm;
        }

        .card-desc {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.8pt;
            color: var(--ink-text);
            font-weight: 600;
            line-height: 1.35;
            text-align: justify;
        }

        .card-desc strong {
            color: var(--c-main);
            font-weight: 900;
        }

        /* Specific style for Card Back */
        .card.card-back {
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent !important;
            border: none !important;
            border-radius: 0 !important;
            overflow: visible !important;
            z-index: 1;
        }

        .card.card-back::before {
            content: '';
            position: absolute;
            top: -2.5mm;
            bottom: -2.5mm;
            left: -2.5mm;
            right: -2.5mm;
            background-color: #161616;
            background-image: radial-gradient(circle at center, #2a0000 0%, #161616 100%);
            z-index: -1;
        }

        .back-frame {
            position: absolute;
            inset: 3mm;
            border: 2px solid #8A0303;
            transform: rotate(3deg);
            z-index: 1;
            pointer-events: none;
        }

        .back-frame-2 {
            position: absolute;
            inset: 3mm;
            border: 1px dashed #d4af37;
            transform: rotate(-2deg);
            z-index: 1;
            pointer-events: none;
        }

        .back-art {
            width: 40mm;
            height: 40mm;
            z-index: 2;
        }

        .back-text {
            position: absolute;
            bottom: 6mm;
            text-align: center;
            width: 100%;
            z-index: 3;
            transform: rotate(-1deg);
        }

        .back-text h2 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-size: 11pt;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 2px 2px 0px #8A0303;
        }

        .back-text p {
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            font-size: 5pt;
            letter-spacing: 3px;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="header screen-only">
        <h1>Monster Bestiary - Chaos Deck</h1>
        <p>TEKAN <kbd>CTRL+P</kbd> UNTUK MENCETAK (ATAU GUNAKAN KONTROL PANEL DI BAWAH)</p>
    </div>

    <!-- CONTROL PANEL -->
    <div class="control-panel screen-only" style="background: rgba(30,30,30,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px 25px; margin: 0 auto 30px; max-width: 900px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; z-index: 10;">
        <div style="width:100%; text-align:center; margin-bottom:12px; border-bottom:1px solid #444; padding-bottom:10px;">
            <p style="margin:0; font-size:13px; color:#fff; font-weight:500;">
                <span style="color:#27AE60; font-weight:700;">PANDUAN CETAK:</span>
                Tekan <kbd>Ctrl+P</kbd> dan pastikan:
                <strong>1.</strong> Format: <strong style="color:#27AE60">A4</strong>&nbsp;&nbsp;
                <strong>2.</strong> Scale: <strong style="color:#27AE60">100%</strong>&nbsp;&nbsp;
                <strong>3.</strong> Margins: <strong style="color:#27AE60">None</strong>&nbsp;&nbsp;
                <strong>4.</strong> Centang <strong style="color:#27AE60">Background graphics</strong>&nbsp;&nbsp;
                <strong>5.</strong> Pilih mode <strong style="color:#27AE60">Balik</strong> sesuai printer.
            </p>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; width:100%;">
            <div class="control-group">
                <label for="paper-size" style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Kertas:</label>
                <select id="paper-size" onchange="changePaperSize()" style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="a4">A4 (9 Kartu)</option>
                    <option value="f4">F4 / Folio (9 Kartu)</option>
                    <option value="a3">A3 (20 Kartu)</option>
                    <option value="a3plus">A3+ (25 Kartu)</option>
                    <option value="single">Single (Per Kartu)</option>
                </select>
            </div>
            <div style="width:2px; background:#444; margin:0 5px; border-radius:2px;"></div>
            <div class="control-group">
                <label for="export-dpi" style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Detail PDF:</label>
                <select id="export-dpi" onchange="changePaperSize()" style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="1">Standar (96 DPI)</option>
                    <option value="2">Tajam (192 DPI)</option>
                    <option value="4" selected>Ekstrem (384 DPI)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="back-mode" style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Balik:</label>
                <select id="back-mode" onchange="changePaperSize()" style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="duplex">Duplex / Otomatis</option>
                    <option value="manual-long">Manual (Sisi Panjang)</option>
                    <option value="manual-short">Manual (Sisi Pendek)</option>
                </select>
            </div>
            <button onclick="window.print()" style="font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; padding:10px 18px; border-radius:8px; cursor:pointer; border:none; background:linear-gradient(135deg,#1E272E,#27AE60); color:white;">
                🖨️ Simpan PDF
            </button>
            <div style="width:2px; background:#444; margin:0 5px; border-radius:2px;"></div>
            <div class="control-group">
                <label for="export-format" style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Zip:</label>
                <select id="export-format" style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                </select>
            </div>
            <button id="btn-download-all" onclick="downloadAllCardsDomToImage('Bestiary', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#ffffff':null})" style="font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; padding:10px 18px; border-radius:8px; cursor:pointer; border:none; background:linear-gradient(135deg,#3B1C54,#F39C12); color:white;">
                ⬇ Download (.ZIP)
            </button>
        </div>
    </div>

    <!-- DYNAMIC CONTAINER -->
    <div id="pages-container"></div>

    <!-- DATA & ART SCRIPTS -->
    <script src="bestiary_data.js"></script>
    <script src="svg_bestiary.js"></script>

    <script>
        function generateBestiaryCard(card) {
            var html = '';
            if (card.isBack) {
                html += '<div class="card card-back" data-id="' + card.id + '">';
                html += '  <div class="back-frame"></div>';
                html += '  <div class="back-frame-2"></div>';
                html += '  <div class="creator-label" style="position:absolute; top:8mm; width:100%; text-align:center; color:#d4af37; font-size:3mm; letter-spacing:2px; font-family:\'Courier New\', Courier, monospace; opacity:0.8; font-weight:bold; z-index:10;">MRSETIAWAN</div>';
                html += '  <div class="back-art">';
                html += '    ' + (bestiaryArt[card.id] || '');
                html += '  </div>';
                html += '  <div class="back-text">';
                html += '    <h2>' + card.title + '</h2>';
                html += '    <p>' + card.subtitle + '</p>';
                html += '  </div>';
                html += '</div>';
            } else {
                var headStyle = card.headStyle ? ' style="' + card.headStyle + '"' : '';
                var bottomStyle = card.bottomStyle ? ' style="' + card.bottomStyle + '"' : '';
                var subtitleStyle = card.subtitleStyle ? ' style="' + card.subtitleStyle + '"' : '';
                var quoteStyle = card.quoteStyle ? ' style="' + card.quoteStyle + '"' : '';

                html += '<div class="card" data-id="' + card.id + '" style="' + card.cssVars + '">';
                html += '  <div class="card-frame"></div>';
                html += '  <div class="card-head"' + headStyle + '>';
                html += '    <div class="card-title">' + card.title + '</div>';
                html += '  </div>';
                html += '  <div class="card-art">';
                html += '    ' + (bestiaryArt[card.id] || '');
                html += '  </div>';
                html += '  <div class="card-bottom"' + bottomStyle + '>';
                html += '    <div class="card-subtitle"' + subtitleStyle + '>' + card.subtitle + '</div>';
                html += '    <div class="card-quote"' + quoteStyle + '>' + card.quote + '</div>';
                html += '    <div class="card-desc">' + card.desc + '</div>';
                html += '  </div>';
                html += '</div>';
            }
            return html;
        }

        function mapBackSlotIndex(slotIndex, cols, rows, backMode) {
            var row = Math.floor(slotIndex / cols);
            var col = slotIndex % cols;
            if (backMode === 'manual-long') {
                col = (cols - 1) - col;
            } else if (backMode === 'manual-short') {
                row = (rows - 1) - row;
            }
            return (row * cols) + col;
        }

        function renderPageFromSlots(slotCards, isBackPage) {
            var html = '<div class="page' + (isBackPage ? ' page-back' : '') + '">';
            for (var i = 0; i < slotCards.length; i++) {
                if (slotCards[i]) html += generateBestiaryCard(slotCards[i]);
                else html += '<div class="card card-placeholder" aria-hidden="true"></div>';
            }
            html += '</div>';
            return html;
        }

        function changePaperSize() {
            var paperSelect = document.getElementById('paper-size');
            var dpiSelect = document.getElementById('export-dpi') || document.getElementById('pdf-dpi');
            var backModeSelect = document.getElementById('back-mode');
            var paperId = paperSelect ? paperSelect.value : 'a4';
            var dpiScale = parseFloat(dpiSelect ? dpiSelect.value : '1');
            var backMode = backModeSelect ? backModeSelect.value : 'duplex';
            var container = document.getElementById('pages-container') || document.querySelector('.pages-container');
            if (!container) return;
            container.innerHTML = '';

            var config = window.CardPrintLayout ? window.CardPrintLayout.applyCSS(paperId, dpiScale) : { cardsPerPage: 9, cols: 3, rows: 3 };
            var cardsPerPage = config.cardsPerPage || (config.cols * config.rows);
            var cols = config.cols || 3;
            var rows = config.rows || 3;

            var htmlContent = '';
            var frontCards = bestiaryDeckData.filter(function(c) { return !c.isBack; });
            var backCardData = null;
            for (var k = 0; k < bestiaryDeckData.length; k++) {
                if (bestiaryDeckData[k].isBack) { backCardData = bestiaryDeckData[k]; break; }
            }

            if (paperId === 'single') {
                for (var s = 0; s < frontCards.length; s++) {
                    htmlContent += renderPageFromSlots([frontCards[s]], false);
                    if (backCardData) {
                        htmlContent += renderPageFromSlots([backCardData], true);
                    }
                }
            } else {
                for (var i = 0; i < frontCards.length; i += cardsPerPage) {
                    var pageCards = frontCards.slice(i, i + cardsPerPage);
                    var frontSlots = new Array(cardsPerPage).fill(null);
                    for (var j = 0; j < pageCards.length; j++) {
                        frontSlots[j] = pageCards[j];
                    }
                    htmlContent += renderPageFromSlots(frontSlots, false);

                    if (backCardData) {
                        var backSlots = new Array(cardsPerPage).fill(null);
                        for (var b = 0; b < pageCards.length; b++) {
                            var mappedIndex = mapBackSlotIndex(b, cols, rows, backMode);
                            backSlots[mappedIndex] = backCardData;
                        }
                        htmlContent += renderPageFromSlots(backSlots, true);
                    }
                }
            }

            container.innerHTML = htmlContent;
        }

        document.addEventListener('DOMContentLoaded', function() { changePaperSize(); });
    </script>

    <!-- Use same library dependencies as tacdos for ZIP and element-to-image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@2.8.0/dist/dom-to-image-more.min.js"></script>
    <script src="download_helper.js?v=2"></script>
</body>
</html>
