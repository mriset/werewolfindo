<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightmare Asylum - Twisted Layout Deck</title>
    <!-- Kombinasi Font Premium & Font Panel -->
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Cinzel:wght@700;900&family=Courier+Prime:wght@400;700&family=Oswald:wght@500;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Montserrat:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Dimensi Presisi Kartu (Eropa Standard) */
            --card-w: 54.5mm;
            --card-h: 85.5mm;
            --scale: 1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Oswald', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header-title {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Cinzel', serif;
        }

        .header-title h1 {
            font-size: 2.8rem;
            color: #d4af37;
            margin: 0 0 10px 0;
            letter-spacing: 5px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .header-title p {
            font-family: 'Courier Prime', monospace;
            color: #aaa;
            letter-spacing: 2px;
            margin: 0;
        }

        /* --- CONTROL PANEL --- */
        .screen-only {}

        .control-panel {
            background: rgba(40, 40, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 25px;
            margin: 0 auto 30px;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            z-index: 10;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #222;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group label {
            font-size: 11px;
            font-weight: 700;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .control-group select {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #333;
            color: #fff;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .control-group select:focus {
            border-color: #d4af37;
        }

        .control-btn {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 700;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 0.5px;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #aa771c, #d4af37);
            color: #fff;
            box-shadow: 0 4px 12px rgba(170, 119, 28, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(170, 119, 28, 0.5);
        }

        kbd {
            background: #333;
            border-radius: 3px;
            border: 1px solid #555;
            color: #fff;
            display: inline-block;
            font-size: .85em;
            font-weight: 700;
            padding: 2px 4px;
        }

        @media print {

            .screen-only,
            .control-panel,
            .header-title {
                display: none !important;
            }
        }

        /* --- PAGES CONTAINER --- */
        .page {
            background: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 0 auto 40px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        @media print {
            .page {
                box-shadow: none;
                margin: 0;
                page-break-after: always;
                background: none;
            }

            body {
                background: none;
                padding: 0;
            }
        }

        /* --- BASE CARD SETUP --- */
        .card {
            width: calc(var(--card-w) * var(--scale));
            height: calc(var(--card-h) * var(--scale));
            border-radius: 4mm;
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            flex-shrink: 0;
            background: #ffffff;
            overflow: hidden;
            box-sizing: border-box;
        }

        @media print {
            .card {
                box-shadow: none !important;
                transform: none !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(212, 175, 55, 0.5);
            z-index: 10;
        }

        /* =========================================
           UNIVERSAL ASYMMETRIC THEME (TWISTED STYLE)
           ========================================= */
        .theme-twisted {
            display: flex;
            background-color: var(--bg-color, #ffffff);
            width: 100%;
            height: 100%;
        }

        .theme-twisted::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 2mm 2mm, var(--f-color) 0.4mm, transparent 0.6mm);
            background-size: 4mm 4mm;
            opacity: var(--bg-opacity, 0.08);
            pointer-events: none;
            z-index: 1;
        }

        .tw-sidebar {
            width: 10mm;
            background: var(--f-color);
            color: var(--sidebar-text, #fff);
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            border-right: 1mm solid var(--border-color, #111);
            z-index: 2;
        }

        .tw-title-en {
            font-family: 'Playfair Display', serif;
            font-size: 15pt;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.3);
        }

        .tw-main {
            flex-grow: 1;
            padding: 2.7mm;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            width: calc(100% - 10mm);
        }

        .tw-header {
            text-align: right;
            border-bottom: 0.5mm dashed var(--f-color);
            padding-bottom: 1.5mm;
            margin-bottom: 1mm;
        }

        .tw-code {
            font-family: 'Courier Prime', monospace;
            font-size: 5pt;
            font-weight: bold;
            color: var(--code-color, #555);
            letter-spacing: 0.2px;
            margin-bottom: 0.5mm;
        }

        .tw-title-id {
            font-family: 'Oswald', sans-serif;
            font-size: 11pt;
            font-weight: 900;
            color: var(--f-color);
            line-height: 1;
            text-transform: uppercase;
        }

        .tw-art {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(4deg);
            position: relative;
        }

        .tw-art svg {
            filter: drop-shadow(0.5mm 1mm 1mm rgba(0, 0, 0, 0.15));
            width: 90%;
            height: 90%;
            margin-top: -2.7mm;
        }

        .tw-text-box {
            background: var(--box-bg, #fff);
            border: 0.6mm solid var(--f-color);
            border-radius: 2mm 0 2mm 0;
            padding: 1.6mm 1.8mm;
            box-shadow: 0.8mm 0.8mm 0 var(--f-color);
            transform: rotate(-2deg);
            margin: 0 -1mm 1mm -1mm;
            color: var(--text-color, #111);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .tw-quote {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            font-size: 7.2pt;
            line-height: 1.3;
            margin-bottom: 1.5mm;
        }

        .tw-quote span {
            color: var(--f-color);
            font-size: 8.2pt;
            font-weight: 900;
        }

        .tw-ability {
            font-family: 'Courier Prime', monospace;
            font-size: 5.4pt;
            font-weight: bold;
            line-height: 1.3;
            border-top: 0.3mm dotted var(--f-color);
            padding-top: 1.2mm;
        }
    </style>
</head>

<body>

    <div class="header-title screen-only">
        <h1>NIGHTMARE ASYLUM</h1>
        <p>TWISTED ASYMMETRIC DECK // 54.5 x 85.5 mm</p>
    </div>

    <!-- CONTROL PANEL FOR PRINT/DOWNLOAD -->
    <div class="control-panel screen-only">
        <div
            style="width: 100%; text-align: center; margin-bottom: 12px; border-bottom: 1px solid #444; padding-bottom: 10px;">
            <p style="margin: 0; font-size: 13px; color: #fff; font-weight: 500;">
                <span style="color: #d4af37; font-weight: 700;">PANDUAN CETAK:</span> Tekan <kbd>Ctrl+P</kbd> dan
                pastikan:
                <strong>1.</strong> Format: <strong style="color:#e53935">A4</strong> &nbsp;&nbsp;
                <strong>2.</strong> Scale: <strong style="color:#e53935">100% (Custom)</strong> &nbsp;&nbsp;
                <strong>3.</strong> Margins: <strong style="color:#e53935">None</strong> &nbsp;&nbsp;
                <strong>4.</strong> Centang <strong style="color:#e53935">Background graphics</strong>.
            </p>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%;">
            <div class="control-group">
                <label for="paper-size">Kertas:</label>
                <select id="paper-size" onchange="changePaperSize()">
                    <option value="a4">A4 (9 Kartu)</option>
                    <option value="f4">F4 / Folio (9 Kartu)</option>
                    <option value="a3">A3 (20 Kartu)</option>
                    <option value="a3plus">A3+ (25 Kartu)</option>
                    <option value="single">Single (Per Kartu)</option>
                </select>
            </div>

            <div style="width: 2px; background: #444; margin: 0 5px; border-radius: 2px;"></div>

            <div class="control-group">
                <label for="export-dpi">Detail PDF:</label>
                <select id="export-dpi" onchange="changePaperSize()">
                    <option value="1">Standar (96 DPI)</option>
                    <option value="2">Tajam (192 DPI)</option>
                    <option value="4" selected>Ekstrem (384 DPI)</option>
                </select>
            </div>

            <button class="control-btn btn-red" onclick="window.print()" title="Simpan sebagai PDF (Ctrl+P)"
                style="background: linear-gradient(135deg, #a32222, #e53935); box-shadow: 0 4px 12px rgba(229, 57, 53, 0.3); color: white;">
                🖨️ Simpan PDF
            </button>

            <div style="width: 2px; background: #444; margin: 0 5px; border-radius: 2px;"></div>

            <div class="control-group">
                <label for="export-format">Zip:</label>
                <select id="export-format">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                </select>
            </div>
            <button id="btn-download-all" class="control-btn btn-gold"
                onclick="downloadAllCardsDomToImage('NiasyTwisted', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#ffffff':null})">
                ⬇ Download (.ZIP)
            </button>
        </div>
    </div>

    <!-- DYNAMIC CONTAINER -->
    <div id="pages-container"></div>

    <!-- SCRIPTS -->
    <script src="niasy_data.js"></script>
    <script src="svg_niasy.js"></script>

    <script>
        // Generate front card HTML
        function generateNiasyCard(card) {
            // Khusus back card punya structure sedikit berbeda untuk tengah
            if (card.id === 'card_back') {
                return `
                <div class="card id-card_back">
                    <div class="theme-twisted" style="${card.style}">
                        <div class="tw-sidebar">
                            <div class="tw-title-en">${card.titleEn}</div>
                        </div>
                        <div class="tw-main">
                            <div class="tw-header">
                                <div class="tw-code c-code">${card.code}</div>
                                <div class="tw-title-id">${card.titleId}</div>
                            </div>
                            <div class="tw-art">
                                ${niasyArt[card.id] || ''}
                            </div>
                            <div class="tw-text-box" style="box-shadow: 0.8mm 0.8mm 0 rgba(212, 175, 55, 0.4);">
                                <div class="tw-quote" style="text-align: center; font-size: 8pt;">${card.quote}</div>
                                <div class="tw-ability" style="text-align: center; border-top: none; color: #d4af37; font-size: 6pt; letter-spacing: 2px;">${card.ability}</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            return `
            <div class="card id-${card.id}">
                <div class="theme-twisted" style="${card.style}">
                    <div class="tw-sidebar">
                        <div class="tw-title-en">${card.titleEn}</div>
                    </div>
                    <div class="tw-main">
                        <div class="tw-header">
                            <div class="tw-code c-code">${card.code}</div>
                            <div class="tw-title-id">${card.titleId}</div>
                        </div>
                        <div class="tw-art">
                            ${niasyArt[card.id] || ''}
                        </div>
                        <div class="tw-text-box">
                            <div class="tw-quote">${card.quote}</div>
                            <div class="tw-ability">${card.ability}</div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function changePaperSize() {
            const paperId = document.getElementById('paper-size').value;
            const container = document.getElementById("pages-container");
            const dpiScale = parseFloat(document.getElementById('export-dpi')?.value || 1);
            container.innerHTML = ""; // Clear existing

            let cols = 3, rows = 3;
            let wMM = 210, hMM = 297, cssPadding = "15mm 15mm", cssGap = "5.5mm";

            if (paperId === 'a4') {
                cols = 3; rows = 3; wMM = 210; hMM = 297;
                cssPadding = "15mm 15mm"; cssGap = "5.5mm";
            } else if (paperId === 'f4') {
                cols = 3; rows = 3; wMM = 215; hMM = 330;
                cssPadding = "25mm 15.5mm"; cssGap = "6mm";
            } else if (paperId === 'a3') {
                cols = 5; rows = 4; wMM = 297; hMM = 420;
                cssPadding = "28mm 1.1mm"; cssGap = "1.5mm";
            } else if (paperId === 'a3plus') {
                cols = 5; rows = 5; wMM = 329; hMM = 483;
                cssPadding = "8.5mm 11.5mm"; cssGap = "4.5mm";
            } else if (paperId === 'single') {
                cols = 1; rows = 1; wMM = 54.5; hMM = 85.5;
                cssPadding = "0"; cssGap = "0mm";
            }

            const cssWidth = wMM + "mm";
            const cssHeight = hMM + "mm";
            const printTargetWidth = parseFloat((wMM * dpiScale).toFixed(2)) + "mm";
            const printTargetHeight = parseFloat((hMM * hMM > 0 ? hMM * dpiScale : 0).toFixed(2)) + "mm";
            const localCardsPerPage = cols * rows;

            // Render Dynamic CSS
            let styleEl = document.getElementById('dynamic-paper-style');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'dynamic-paper-style';
                document.head.appendChild(styleEl);
            }

            styleEl.innerHTML = `
                @page { size: ${printTargetWidth} ${printTargetHeight}; margin: 0; }
                @media print {
                    .screen-only, .control-panel, .header-title { display: none !important; }
                    .page { 
                        width: ${cssWidth}; height: ${cssHeight}; 
                        padding: ${cssPadding} !important; gap: ${cssGap} !important; 
                        margin: 0; page-break-after: always; page-break-inside: avoid; overflow: hidden; 
                        zoom: ${dpiScale};
                    }
                }
                .page {
                    width: ${cssWidth};
                    min-height: ${cssHeight};
                    padding: ${cssPadding};
                    gap: ${cssGap};
                }
            `;

            let htmlContent = '';

            // Only front cards
            const frontCards = niasyDeckData.filter(c => c.id !== 'card_back');
            const backCardData = niasyDeckData.find(c => c.id === 'card_back');

            // Loop and render front pages
            for (let i = 0; i < frontCards.length; i += localCardsPerPage) {
                const pageCards = frontCards.slice(i, i + localCardsPerPage);
                htmlContent += `<div class="page">`;
                pageCards.forEach(card => {
                    htmlContent += generateNiasyCard(card);
                });
                htmlContent += `</div>`;
            }

            // Loop and render back pages matching front layout
            if (paperId !== 'single' && backCardData) {
                const numbPages = Math.ceil(frontCards.length / localCardsPerPage);
                const backHTML = generateNiasyCard(backCardData);

                for (let p = 0; p < numbPages; p++) {
                    htmlContent += `<div class="page page-back">`;
                    const countOnThisPage = (p === numbPages - 1 && frontCards.length % localCardsPerPage !== 0)
                        ? frontCards.length % localCardsPerPage
                        : localCardsPerPage;
                    for (let c = 0; c < countOnThisPage; c++) {
                        htmlContent += backHTML;
                    }
                    htmlContent += `</div>`;
                }
            } else if (paperId === 'single' && backCardData) {
                htmlContent += `<div class="page">`;
                htmlContent += generateNiasyCard(backCardData);
                htmlContent += `</div>`;
            }

            container.innerHTML = htmlContent;
        }

        document.addEventListener("DOMContentLoaded", () => {
            changePaperSize();
        });

        document.addEventListener('dblclick', function (e) {
            const card = e.target.closest('.card');
            if (!card) return;
            downloadCard(card);
        });

        let lastTap = 0;
        document.addEventListener('touchend', function (e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                const card = e.target.closest('.card');
                if (card) {
                    downloadCard(card);
                    e.preventDefault();
                }
            }
            lastTap = currentTime;
        });

        function downloadCard(card) {
            const format = (document.getElementById('export-format').value || 'png').trim().toLowerCase();
            const idElement = card.querySelector('.c-code');
            let cardId = idElement ? idElement.innerText : 'card-back';
            cardId = cardId.replace(/[:\s\/]/g, '-').replace(/--+/g, '-').replace(/^-|-$/g, '');
            const bgColor = format === 'jpg' ? '#ffffff' : null;
            if (typeof downloadCardDomToImage !== "undefined") {
                downloadCardDomToImage(card, `Niasy-${cardId}`, { format, bgColor });
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@2.8.0/dist/dom-to-image-more.min.js"></script>
    <script src="download_helper.js?v=2"></script>
</body>

</html>
