<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Werewolf - Pop-Art Chaos Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet" />

    <style>

        /* --- CONTROL PANEL --- */
        .screen-only {}
        .control-panel {
            background: #1a1a1a;
            border: 2px solid #D500F9;
            border-radius: 8px;
            padding: 15px 25px;
            margin: 0 auto 30px;
            max-width: 900px;
            box-shadow: 5px 5px 0 #00E5FF;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            z-index: 10;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #111;
            padding: 8px 14px;
            border-radius: 4px;
            border: 1.5px solid #00E5FF;
        }
        .control-group label {
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }
        .control-group select {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1.5px solid #fff;
            background: #fff;
            color: #111;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        .control-group select:focus {
            border-color: #D500F9;
        }
        .control-btn {
            font-family: 'Righteous', cursive;
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
            border: 2px solid #111;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-gold {
            background: #FFEA00;
            color: #111;
            box-shadow: 3px 3px 0 #111;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 5px 5px 0 #111;
        }
        .btn-red {
            background: #FF3D00;
            color: #fff;
            box-shadow: 3px 3px 0 #111;
        }
        .btn-red:hover {
            transform: translateY(-2px);
            box-shadow: 5px 5px 0 #111;
        }
        kbd {
            background: #FFEA00;
            color: #111;
            border: 1.5px solid #111;
            border-radius: 2px;
            display: inline-block;
            font-family: 'Righteous', cursive;
            font-size: .85em;
            padding: 2px 4px;
            box-shadow: 1px 1px 0 #111;
        }
        @media print {
            .screen-only, .control-panel, .showcase-header { display: none !important; }
            body { padding: 0 !important; margin: 0 !important; background: none !important; }
            .page { box-shadow: none; margin: 0; page-break-after: always; background: none; }
            .card { box-shadow: none !important; transform: none !important; border: 1.5mm solid #111 !important; }
            /* Memastikan drop-shadow SVG atau elemen tetap terekstrak saat print (opsional) */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        /* --- PAGES CONTAINER --- */
        .page {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;
            background: #fff;
            margin: 0 auto 40px;
        }



        :root {
            /* Dimensi Kartu Presisi Cetak */
            --w: 54.5mm;
            --h: 85.5mm;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            background-image: repeating-linear-gradient(45deg, #1a1a1a 0, #1a1a1a 2px, #111 2px, #111 8px);
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            padding: 50px 20px;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .showcase-header {
            width: 100%;
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
        }

        .showcase-header h1 {
            font-family: 'Righteous', cursive;
            font-size: 32px;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 3px 3px 0px #D500F9, -3px -3px 0px #00E5FF;
        }

        .showcase-header p {
            font-size: 12px;
            color: #ccc;
            margin-top: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* =========================================================
           BASE POP-ART CARD LAYOUT (Berdasarkan Layout Badut)
        ========================================================= */
        .card {
            width: var(--w);
            height: var(--h);
            background: #fff;
            position: relative;
            overflow: hidden;
            border-radius: 3mm;
            border: 1.5mm solid #111;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Latar Belakang Pattern */
        .bg-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.15;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            padding: 3mm;
            display: flex;
            flex-direction: column;
        }

        /* Komponen Atas (Header Miring) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 3mm;
        }

        .badge {
            font-family: 'Righteous', cursive;
            font-size: 6pt;
            color: #111;
            padding: 1mm 2mm;
            border: 1.5px solid #111;
            box-shadow: 2px 2px 0 #111;
        }

        /* Komponen Judul (Dual Text-Shadow) */
        .title-box {
            text-align: center;
            margin-bottom: 1mm;
        }

        .title-id {
            font-family: 'Righteous', cursive;
            font-size: 15pt;
            line-height: 1;
            color: #111;
            text-transform: uppercase;
        }

        .title-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 5.5pt;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Komponen Ilustrasi SVG (Hard Drop Shadow) */
        .art-box {
            width: 34mm;
            height: 34mm;
            margin: 0 auto;
            filter: drop-shadow(4px 4px 0px #111);
        }

        /* Komponen Teks Bawah (Kotak Miring dengan Shadow Warna) */
        .text-wrapper {
            position: absolute;
            bottom: 3mm;
            left: 3mm;
            right: 3mm;
            background: #fff;
            border: 2px solid #111;
            padding: 2.5mm;
        }

        .ability {
            font-family: 'Righteous', cursive;
            font-size: 6.5pt;
            text-align: center;
            margin-bottom: 1mm;
            text-shadow: 1px 1px 0 #111;
            letter-spacing: 0.5px;
        }

        .quote {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 5pt;
            color: #111;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 1.5mm;
            padding-bottom: 1mm;
        }

        .desc {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.5pt;
            font-weight: 700;
            color: #222;
            text-align: center;
            line-height: 1.3;
        }

        /* =========================================================
           1. SEER (PENERAWANG) - Tema Cyan & Yellow
        ========================================================= */
        .t-seer .bg-pattern {
            background-image: radial-gradient(#FFEA00 1.5px, transparent 1.5px);
            background-size: 6px 6px;
        }

        .t-seer .header {
            transform: rotate(4deg);
        }

        .t-seer .code-badge {
            background: #00E5FF;
            color: #111;
        }

        .t-seer .fac-badge {
            background: #FFEA00;
            color: #111;
        }

        .t-seer .title-box {
            transform: rotate(-3deg);
        }

        .t-seer .title-id {
            text-shadow: -2px 2px 0 #00E5FF, 2px -2px 0 #FFEA00;
        }

        .t-seer .title-en {
            color: #00E5FF;
            text-shadow: 1px 1px 0 #111;
        }

        .t-seer .art-box {
            transform: rotate(5deg);
        }

        .t-seer .text-wrapper {
            transform: rotate(2deg);
            box-shadow: 3px 3px 0 #00E5FF;
        }

        .t-seer .ability {
            color: #FFEA00;
        }

        .t-seer .quote {
            border-bottom: 2px dotted #00E5FF;

        .t-guard .bg-pattern {
            background-image: linear-gradient(45deg, #00B0FF 25%, transparent 25%, transparent 75%, #00B0FF 75%, #00B0FF), linear-gradient(45deg, #00B0FF 25%, transparent 25%, transparent 75%, #00B0FF 75%, #00B0FF);

            background-image: repeating-linear-gradient(0deg, #FFD600 0, #FFD600 1px, transparent 1px, transparent 8px), repeating-linear-gradient(90deg, #FFD600 0, #FFD600 1px, transparent 1px, transparent 8px);

        /* =========================================================
           7. CARD BACK (KARTU BELAKANG) - Tema Black, Yellow, White
        ========================================================= */
        .t-back {
            background: #111;
            border-color: transparent !important;
            border-radius: 0 !important;
            overflow: visible !important;
        }

        .t-back::before {
            content: '';
            position: absolute;
            inset: -4mm; /* dikurangi ke 4mm agar menutupi gap tapi tidak terlalu jauh menerobos kartu lain */
            background-color: #111;
            background-image: radial-gradient(rgba(255, 234, 0, 0.2) 2px, transparent 2px);
            background-size: 8px 8px;
            z-index: 0;
        }

        .t-back .bg-pattern {
            display: none !important;
        }

        .t-back .header {
            justify-content: center;
            transform: rotate(-2deg);
            margin-top: 5mm;
        }

<body>

    <div class="showcase-header screen-only">
        <h1>POP-ART CHAOS DECK</h1>
        <p>1 Unified Layout. 5 Explosive Color Palettes. 100% Attitude.</p>
    </div>

    <!-- CONTROL PANEL FOR PRINT/DOWNLOAD -->
    <div class="control-panel screen-only">
        <div style="width: 100%; text-align: center; margin-bottom: 12px; border-bottom: 2px dashed #D500F9; padding-bottom: 10px;">
            <p style="margin: 0; font-size: 13px; color: #fff; font-weight: 700;">
                <span style="color: #00E5FF;">PANDUAN CETAK POP-ART:</span> Tekan <kbd>Ctrl+P</kbd> dan pastikan:
                <strong>1.</strong> Format Kertas <strong style="color:#FFEA00">Sesuai Pilihan</strong> &nbsp;&nbsp;
                <strong>2.</strong> Scale <strong style="color:#FFEA00">100%</strong> &nbsp;&nbsp;
                <strong>3.</strong> Margins <strong style="color:#FFEA00">None</strong> &nbsp;&nbsp;
                <strong>4.</strong> Centang <strong style="color:#FFEA00">Background graphics</strong>.
            </p>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%;">
            <div class="control-group">
                <label for="paper-size">KERTAS</label>
                <select id="paper-size" onchange="changePaperSize()">
                    <option value="a4">A4 (9 Kartu)</option>
                    <option value="f4">F4 / Folio (9 Kartu)</option>
                    <option value="a3">A3 (20 Kartu)</option>
                    <option value="a3plus">A3+ (25 Kartu)</option>
                    <option value="single">Single (Per Kartu)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="export-dpi">DPI PDF</label>
                <select id="export-dpi" onchange="changePaperSize()">
                    <option value="1">Standar (96 DPI)</option>
                    <option value="2">Tajam (192 DPI)</option>
                    <option value="4" selected>Ekstrem (384 DPI)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="back-mode">Balik:</label>
                <select id="back-mode" onchange="changePaperSize()">
                    <option value="duplex">Duplex / Otomatis</option>
                    <option value="manual-long">Manual (Sisi Panjang)</option>
                    <option value="manual-short">Manual (Sisi Pendek)</option>
                </select>

            </button>

    <script>

        function generatePopArtCard(card) {
            if (card.id === 'card_back') {
                return `
                <div class="card ${card.themeClass} c-code-hook" data-id="${card.id}">
                    <div class="bg-pattern"></div>
                    <div class="content">
                        <div class="header" style="${card.themeClass === 't-back' ? 'justify-content: center; transform: rotate(-2deg); margin-top: 5mm;' : ''}">
                            <div class="badge code-badge c-code">${card.codeBadge}</div>
                        </div>
                        <div class="art-box">
                            ${popArtSvg[card.id] || ''}
                        </div>
                        <div class="title-box">
                            <div class="title-id">${card.titleId}</div>
                        </div>
                    </div>
                </div>`;
            }

            return `
            <div class="card ${card.themeClass} c-code-hook" data-id="${card.id}">
                <div class="bg-pattern"></div>
                <div class="content">
                    <div class="header">
                        ${card.facBadge ? `<div class="badge fac-badge">${card.facBadge}</div>` : ''}
                        <div class="badge code-badge c-code">${card.codeBadge}</div>
                    </div>
                    <div class="title-box">
                        <div class="title-id">${card.titleId}</div>
                        <div class="title-en">${card.titleEn}</div>
                    </div>
                    <div class="art-box">
                        ${popArtSvg[card.id] || ''}
                    </div>
                    <div class="text-wrapper">
                        <div class="ability">${card.ability}</div>
                        <div class="quote">${card.quote}</div>
                        <div class="desc">${card.desc}</div>
                    </div>
                </div>
            </div>`;
        }

                function mapBackSlotIndex(slotIndex, cols, rows, backMode) {
            var row = Math.floor(slotIndex / cols);
            var col = slotIndex % cols;
            if (backMode === 'manual-long') {
                col = (cols - 1) - col;
            } else if (backMode === 'manual-short') {
                row = (rows - 1) - row;
            }
            return (row * cols) + col;
        }

        function renderPageFromSlots(slotCards, isBackPage, renderCardFn, placeholderClass) {
            var html = "<div class=\"page" + (isBackPage ? " page-back" : "") + "\">";
            var placeholder = "<div class=\"" + placeholderClass + " card-placeholder\" style=\"visibility:hidden;border:0 !important;box-shadow:none !important;background:transparent !important;pointer-events:none !important;\" aria-hidden=\"true\"></div>";
            for (var i = 0; i < slotCards.length; i++) {
                if (slotCards[i]) html += renderCardFn(slotCards[i]);
                else html += placeholder;
            }
            html += "</div>";
            return html;
        }

        function changePaperSize() {
            var paperSelect = document.getElementById('paper-size');
            var dpiSelect = document.getElementById('export-dpi') || document.getElementById('pdf-dpi');
            var backModeSelect = document.getElementById('back-mode');
            var paperId = paperSelect ? paperSelect.value : 'a4';
            var dpiScale = parseFloat(dpiSelect ? dpiSelect.value : '1');
            var backMode = backModeSelect ? backModeSelect.value : 'duplex';
            var container = document.getElementById('pages-container') || document.querySelector('.pages-container');
            if (!container) return;
            container.innerHTML = "";

            var config = window.CardPrintLayout ? window.CardPrintLayout.applyCSS(paperId, dpiScale) : { cardsPerPage: 9, cols: 3, rows: 3 };
            var cardsPerPage = config.cardsPerPage || (config.cols * config.rows);
            var cols = config.cols || 3;
            var rows = config.rows || 3;
            var renderCardFn = generatePopArtCard;
            var placeholderClass = 'card';

            var htmlContent = "";
            var frontCards = popartDeckData.filter(function(c) { return c.id !== 'card_back'; });
            var backCardData = null;
            for (var k = 0; k < popartDeckData.length; k++) {
                if (popartDeckData[k].id === 'card_back') { backCardData = popartDeckData[k]; break; }
            }

            if (paperId === 'single') {
                for (var s = 0; s < frontCards.length; s++) {
                    htmlContent += renderPageFromSlots([frontCards[s]], false, renderCardFn, placeholderClass);
                    if (backCardData) {
                        htmlContent += renderPageFromSlots([backCardData], true, renderCardFn, placeholderClass);
                    }
                }
            } else {
                for (var i = 0; i < frontCards.length; i += cardsPerPage) {
                    var pageCards = frontCards.slice(i, i + cardsPerPage);
                    var frontSlots = new Array(cardsPerPage).fill(null);
                    for (var j = 0; j < pageCards.length; j++) {
                        frontSlots[j] = pageCards[j];
                    }
                    htmlContent += renderPageFromSlots(frontSlots, false, renderCardFn, placeholderClass);

                    if (backCardData) {
                        var backSlots = new Array(cardsPerPage).fill(null);
                        for (var b = 0; b < pageCards.length; b++) {
                            var mappedIndex = mapBackSlotIndex(b, cols, rows, backMode);
                            backSlots[mappedIndex] = backCardData;
                        }
                        htmlContent += renderPageFromSlots(backSlots, true, renderCardFn, placeholderClass);
                    }
                }
            }

            container.innerHTML = htmlContent;
        }
        document.addEventListener("DOMContentLoaded", () => {
            if(typeof popartDeckData !== 'undefined' && typeof popArtSvg !== 'undefined') {
                changePaperSize();
            } else {
                console.error("Data files not loaded correctly!");
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@2.8.0/dist/dom-to-image-more.min.js"></script>
    <script src="download_helper.js?v=3"></script>
