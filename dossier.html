<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Cards - Classified Dossier Edition</title>

    <!-- Google Fonts: Mesin Tik, Stempel, dan Sans-Serif -->
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Oswald:wght@500;700;900&family=Montserrat:ital,wght@0,700;0,900;1,700&family=Special+Elite&display=swap"
        rel="stylesheet">

    <style>
        :root {
            /* Ukuran Presisi Kartu */
            --w: 54mm;
            --h: 85.6mm;

            /* Palet Dossier */
            --paper-bg: #F0EFEB;
            /* Putih kusam kertas arsip */
            --paper-dot: #d5d5d5;
            --ink-black: #111111;
            --ink-fade: #444444;
            --stamp-red: #A00000;
            --stamp-green: #006400;
            --stamp-purple: #4B0082;
            --stamp-gold: #996515;
            --stamp-pink: #B03060;
            --stamp-blue: #003366;
            --stamp-orange: #CC4400;
            --stamp-brass: #8B6508;
            --bg-web: #1a1c20;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-web);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            min-height: 100vh;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .header h1 {
            font-family: 'Oswald', sans-serif;
            color: #fff;
            letter-spacing: 4px;
            font-size: 2.5rem;
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #222;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        kbd {
            background: #333;
            border-radius: 3px;
            border: 1px solid #555;
            color: #fff;
            display: inline-block;
            font-size: .85em;
            font-weight: 700;
            padding: 2px 4px;
        }

        /* --- PAGES --- */
        .page {
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 0 auto 40px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        @media print {

            .screen-only,
            .control-panel,
            .header {
                display: none !important;
            }

            body {
                background: none !important;
                padding: 0 !important;
            }

            .page {
                box-shadow: none !important;
                margin: 0 !important;
                page-break-after: always;
                page-break-inside: avoid;
                background: none !important;
            }

            .card {
                box-shadow: none !important;
                border: 1px solid #b0b0b0 !important;
                transform: none !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                page-break-inside: avoid;
            }
        }

        /* BASE CARD STYLE (Gaya Dokumen Arsip) */
        .card {
            width: var(--w);
            height: var(--h);
            background-color: var(--paper-bg);
            background-image: radial-gradient(var(--paper-dot) 1px, transparent 1px);
            background-size: 3px 3px;
            border-radius: 3mm;
            border: 1px solid #b0b0b0;
            /* border abu-abu sangat tipis */
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            padding: 4mm;
            display: flex;
            flex-direction: column;
            font-family: 'Courier Prime', monospace;
            flex-shrink: 0;
        }

        /* Dihapus .card:hover */

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 10;
        }

        /* HEADER DOKUMEN */
        .doc-header {
            display: flex;
            justify-content: space-between;
            font-size: 5pt;
            font-weight: 700;
            color: var(--ink-black);
            border-bottom: 1.5px dashed var(--ink-fade);
            padding-bottom: 2mm;
            margin-bottom: 3mm;
            text-transform: uppercase;
        }

        /* FOTO POLAROID / BUKTI */
        .photo-container {
            width: 100%;
            height: 36mm;
            background: #fff;
            border: 1px solid #aaa;
            padding: 2mm 2mm 5mm 2mm;
            box-sizing: border-box;
            position: relative;
            /* Shadow dihapus sesuai instruksi "tanpa shadow" */
            z-index: 2;
        }

        /* SELOTIP */
        .tape {
            position: absolute;
            top: -3mm;
            left: 50%;
            width: 18mm;
            height: 6mm;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(1px);
        }

        /* STEMPEL */
        .stamp {
            position: absolute;
            bottom: 1mm;
            right: -3mm;
            font-family: 'Oswald', sans-serif;
            font-size: 10pt;
            font-weight: 900;
            border: 2px solid;
            padding: 0 3px;
            border-radius: 2px;
            letter-spacing: 1px;
            opacity: 0.85;
            z-index: 5;
            mix-blend-mode: multiply;
        }

        /* JUDUL KARAKTER */
        .title-block {
            margin-top: 4mm;
            color: var(--ink-black);
        }

        .title-block h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 15pt;
            margin: 0;
            font-weight: 900;
            letter-spacing: -0.5px;
            line-height: 1;
            text-transform: uppercase;
        }

        .title-block h2 {
            font-size: 7.5pt;
            margin: 0;
            color: var(--ink-fade);
            font-weight: 700;
        }

        /* DESKRIPSI (Gaya Mesin Tik) */
        .desc-block {
            font-size: 6.5pt;
            margin-top: auto;
            color: var(--ink-black);
            line-height: 1.3;
            background: rgba(255, 255, 255, 0.7);
            padding: 2mm;
            border-left: 2px solid var(--ink-black);
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        /* EFEK REDACTED (Coretan Hitam) */
        .redacted {
            background-color: var(--ink-black);
            color: var(--ink-black);
            /* Hide text */
            padding: 0 1px;
            display: inline-block;
        }

        /* KLIP KERTAS */
        .paperclip {
            position: absolute;
            top: 1mm;
            right: 8mm;
            width: 6mm;
            height: 18mm;
            border: 1.5px solid #888;
            border-radius: 5mm;
            z-index: 6;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 0 80%);
        }

        /* =========================================
           KARTU BELAKANG (BLACK DOSSIER)
           ========================================= */
        .card-back {
            background-color: #111 !important;
            background-image: radial-gradient(#222 1px, transparent 1px) !important;
            background-size: 3px 3px !important;
            color: #fff;
            padding: 0;
            justify-content: center;
            align-items: center;
        }

        .back-border {
            position: absolute;
            inset: 4mm;
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .back-tape {
            position: absolute;
            width: 120%;
            height: 8mm;
            background: repeating-linear-gradient(45deg, #111, #111 5px, #A00000 5px, #A00000 10px);
            z-index: 10;
        }
        @media print {
            html, body {
                margin: 0 !important;
                padding: 0 !important;
            }
            body {
                display: block !important;
            }
            #pages-container {
                margin: 0 !important;
                padding: 0 !important;
            }
            .page {
                break-after: page;
            }
            .page:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }
        }

    </style>
</head>

<body>

    <div class="header screen-only">
        <h1>Classified Dossier</h1>
        <p style="font-family: 'Courier Prime', monospace; color: #aaa; font-size: 12px; margin: 0;">PROJECT WW - THEMED
            ROLES</p>
    </div>

    <!-- CONTROL PANEL -->
    <div class="control-panel screen-only"
        style="background: rgba(30,30,30,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px 25px; margin: 0 auto 30px; max-width: 900px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; z-index: 10;">
        <div
            style="width:100%; text-align:center; margin-bottom:12px; border-bottom:1px solid #444; padding-bottom:10px;">
            <p style="margin:0; font-size:13px; color:#fff; font-weight:500;">
                <span style="color:#27AE60; font-weight:700;">PANDUAN CETAK:</span>
                Tekan <kbd>Ctrl+P</kbd> dan pastikan:
                <strong>1.</strong> Format: <strong style="color:#27AE60">A4</strong>&nbsp;&nbsp;
                <strong>2.</strong> Scale: <strong style="color:#27AE60">100%</strong>&nbsp;&nbsp;
                <strong>3.</strong> Margins: <strong style="color:#27AE60">None</strong>&nbsp;&nbsp;
                <strong>4.</strong> Centang <strong style="color:#27AE60">Background graphics</strong>.
            </p>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; width:100%;">
            <div class="control-group">
                <label for="paper-size"
                    style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Kertas:</label>
                <select id="paper-size" onchange="changePaperSize()"
                    style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="a4">A4 (9 Kartu)</option>
                    <option value="f4">F4 / Folio (9 Kartu)</option>
                    <option value="a3">A3 (20 Kartu)</option>
                    <option value="a3plus">A3+ (25 Kartu)</option>
                    <option value="single">Single (Per Kartu)</option>
                </select>
            </div>
            <div style="width:2px; background:#444; margin:0 5px; border-radius:2px;"></div>
            <div class="control-group">
                <label for="export-dpi"
                    style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Detail PDF:</label>
                <select id="export-dpi" onchange="changePaperSize()"
                    style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="1">Standar (96 DPI)</option>
                    <option value="2">Tajam (192 DPI)</option>
                    <option value="4" selected>Ekstrem (384 DPI)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="back-mode"
                    style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Balik:</label>
                <select id="back-mode" onchange="changePaperSize()"
                    style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="duplex">Duplex / Otomatis</option>
                    <option value="manual-long">Manual (Sisi Panjang)</option>
                    <option value="manual-short">Manual (Sisi Pendek)</option>
                </select>
            </div>

            <button onclick="window.print()"
                style="font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; padding:10px 18px; border-radius:8px; cursor:pointer; border:none; background:linear-gradient(135deg,#1E272E,#27AE60); box-shadow:0 4px 12px rgba(39,174,96,0.3); color:white;">
                🖨️ Simpan PDF
            </button>
            <div style="width:2px; background:#444; margin:0 5px; border-radius:2px;"></div>
            <div class="control-group">
                <label for="export-format"
                    style="font-size:11px; font-weight:700; color:#ccc; text-transform:uppercase;">Zip:</label>
                <select id="export-format"
                    style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; padding:4px 8px; border-radius:4px; border:1px solid #555; background:#333; color:#fff; cursor:pointer; outline:none;">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                </select>
            </div>
            <button id="btn-download-all"
                onclick="downloadAllCardsDomToImage('Dossier', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#ffffff':null})"
                style="font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; padding:10px 18px; border-radius:8px; cursor:pointer; border:none; background:linear-gradient(135deg,#3B1C54,#F39C12); box-shadow:0 4px 12px rgba(243,156,18,0.3); color:white;">
                ⬇ Download (.ZIP)
            </button>
        </div>
    </div>

    <!-- DYNAMIC CONTAINER -->
    <div id="pages-container"></div>

    <!-- DATA & ART SCRIPTS -->
    <script src="dossier_data.js"></script>
    <script src="svg_dossier.js"></script>

    <script>
        function generateDossierCard(card) {
            if (card.isBack) {
                return '<div class="card card-back" data-id="card-back">' + dossierArt[card.id] + '</div>';
            }

            var html = '';
            html += '<div class="card" data-id="' + card.id + '">';
            html += '  <div class="doc-header">';
            html += '    <span>' + card.file + '</span>';
            html += '    <span>' + card.clearance + '</span>';
            html += '  </div>';
            html += '  <div class="photo-container" style="' + (card.photoStyle || '') + '">';
            html += '    ' + (dossierArt[card.id] || '');
            html += '  </div>';
            html += '  <div class="title-block">';
            html += '    <h1>' + card.titleId + '</h1>';
            html += '    <h2>' + card.titleEn + '</h2>';
            html += '  </div>';
            html += '  <div class="desc-block">';
            html += '    ' + card.desc;
            html += '  </div>';
            html += '</div>';

            return html;
        }

                function mapBackSlotIndex(slotIndex, cols, rows, backMode) {
            var row = Math.floor(slotIndex / cols);
            var col = slotIndex % cols;
            if (backMode === 'manual-long') {
                col = (cols - 1) - col;
            } else if (backMode === 'manual-short') {
                row = (rows - 1) - row;
            }
            return (row * cols) + col;
        }

        function renderPageFromSlots(slotCards, isBackPage, renderCardFn, placeholderClass) {
            var html = "<div class=\"page" + (isBackPage ? " page-back" : "") + "\">";
            var placeholder = "<div class=\"" + placeholderClass + " card-placeholder\" style=\"visibility:hidden;border:0 !important;box-shadow:none !important;background:transparent !important;pointer-events:none !important;\" aria-hidden=\"true\"></div>";
            for (var i = 0; i < slotCards.length; i++) {
                if (slotCards[i]) html += renderCardFn(slotCards[i]);
                else html += placeholder;
            }
            html += "</div>";
            return html;
        }

        function changePaperSize() {
            var paperSelect = document.getElementById('paper-size');
            var dpiSelect = document.getElementById('export-dpi') || document.getElementById('pdf-dpi');
            var backModeSelect = document.getElementById('back-mode');
            var paperId = paperSelect ? paperSelect.value : 'a4';
            var dpiScale = parseFloat(dpiSelect ? dpiSelect.value : '1');
            var backMode = backModeSelect ? backModeSelect.value : 'duplex';
            var container = document.getElementById('pages-container') || document.querySelector('.pages-container');
            if (!container) return;
            container.innerHTML = "";

            var config = window.CardPrintLayout ? window.CardPrintLayout.applyCSS(paperId, dpiScale) : { cardsPerPage: 9, cols: 3, rows: 3 };
            var cardsPerPage = config.cardsPerPage || (config.cols * config.rows);
            var cols = config.cols || 3;
            var rows = config.rows || 3;
            var renderCardFn = generateDossierCard;
            var placeholderClass = 'card';

            var htmlContent = "";
            var frontCards = dossierDeckData.filter(function(c) { return !c.isBack; });
            var backCardData = null;
            for (var k = 0; k < dossierDeckData.length; k++) {
                if (dossierDeckData[k].isBack) { backCardData = dossierDeckData[k]; break; }
            }

            if (paperId === 'single') {
                for (var s = 0; s < frontCards.length; s++) {
                    htmlContent += renderPageFromSlots([frontCards[s]], false, renderCardFn, placeholderClass);
                    if (backCardData) {
                        htmlContent += renderPageFromSlots([backCardData], true, renderCardFn, placeholderClass);
                    }
                }
            } else {
                for (var i = 0; i < frontCards.length; i += cardsPerPage) {
                    var pageCards = frontCards.slice(i, i + cardsPerPage);
                    var frontSlots = new Array(cardsPerPage).fill(null);
                    for (var j = 0; j < pageCards.length; j++) {
                        frontSlots[j] = pageCards[j];
                    }
                    htmlContent += renderPageFromSlots(frontSlots, false, renderCardFn, placeholderClass);

                    if (backCardData) {
                        var backSlots = new Array(cardsPerPage).fill(null);
                        for (var b = 0; b < pageCards.length; b++) {
                            var mappedIndex = mapBackSlotIndex(b, cols, rows, backMode);
                            backSlots[mappedIndex] = backCardData;
                        }
                        htmlContent += renderPageFromSlots(backSlots, true, renderCardFn, placeholderClass);
                    }
                }
            }

            container.innerHTML = htmlContent;
        }
        document.addEventListener('DOMContentLoaded', function () { changePaperSize(); });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@2.8.0/dist/dom-to-image-more.min.js"></script>
    <script src="download_helper.js?v=2"></script>
</body>

</html>
