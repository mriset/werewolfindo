<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Werewolf Obsidian Vanguard Edition</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Montserrat:wght@300;400;600;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --gold-light: #fcf6ba;
            --gold-base: #d4af37;
            --gold-dark: #aa771c;
            --card-w: 54mm;
            --card-h: 85.6mm;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 10px;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color: #1a1a1a;
        }

        h1.print-title {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--gold-dark);
            margin: 10px 0 6px;
            letter-spacing: 12px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
        }

        .print-subtitle {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .screen-note { display: none; }
        
        /* Modern Control Panel */
        .control-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; padding: 15px 25px; margin: 0 auto 30px; max-width: 900px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; position: relative; z-index: 100;}
        .control-group { display: flex; align-items: center; gap: 8px; background: #fdfbf7; padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); }
        .control-group label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
        .control-group select { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; background: #fff; color: #222; cursor: pointer; outline: none; transition: border-color 0.2s; }
        .control-group select:focus { border-color: #d4af37; }
        .control-btn { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; padding: 10px 18px; border-radius: 8px; cursor: pointer; letter-spacing: 0.5px; border: none; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; align-items: center; gap: 6px; }
        .btn-gold { background: linear-gradient(135deg, #aa771c, #d4af37); color: #000; box-shadow: 0 4px 12px rgba(170, 119, 28, 0.3); }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(170, 119, 28, 0.5); }
        .btn-red { background: linear-gradient(135deg, #dc143c, #8a0303); color: #fff; box-shadow: 0 4px 12px rgba(138, 3, 3, 0.3); }
        .btn-red:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(138, 3, 3, 0.5); }
        kbd { background: #eee; border-radius: 3px; border: 1px solid #b4b4b4; box-shadow: 0 1px 1px rgba(0,0,0,.2); color: #333; display: inline-block; font-size: .85em; font-weight: 700; line-height: 1; padding: 2px 4px; white-space: nowrap; }

        @media print {
            body { background: #fff; padding: 0; min-height: auto; }
            .header-title, .header-subtitle, .print-title, .print-subtitle, .control-panel { display: none !important; }
            .page {
                margin: 0; box-shadow: none; page-break-after: always;
                padding: 9.15mm 3.75mm; border: none; background: transparent; outline: none;
            }
            .page:last-child { page-break-after: auto; }
        }

        .card {
            width: var(--card-w);
            height: var(--card-h);
            position: relative;
            border-radius: 4mm;
            page-break-inside: avoid;
            background: #0a0a0c;
            overflow: hidden;
            border: 0.2mm solid #333;
            box-shadow: inset 0 0 20px #000;
        }

        .t2-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(145deg, #16181c 0%, #050506 100%);
        }

        .t2-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 2mm, rgba(212, 175, 55, 0.03) 2mm, rgba(212, 175, 55, 0.03) 4mm);
        }

        /* Accent gradients based on faction */
        .faction-supreme .t2-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(138, 43, 226, 0.15) 0%, transparent 100%);
        }

        .faction-good .t2-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(65, 131, 215, 0.1) 0%, transparent 100%);
        }

        .faction-evil .t2-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(220, 20, 60, 0.15) 0%, transparent 100%);
        }

        .faction-neutral .t2-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(160, 160, 160, 0.1) 0%, transparent 100%);
        }

        .t2-inner {
            position: absolute;
            inset: 2mm;
            z-index: 3;
            display: flex;
            flex-direction: column;
            padding: 4mm;
        }

        .t2-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5mm;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 1.5mm;
        }

        .card-id {
            font-family: 'Montserrat', sans-serif;
            font-size: 8px;
            color: #fff;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .card-faction {
            font-family: 'Montserrat', sans-serif;
            font-size: 6px;
            color: #0a0a0c;
            padding: 0.8mm 2mm;
            border-radius: 4mm;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Hardcode colors based on theme */
        .faction-supreme .card-faction {
            background: #8a2be2;
            color: #fff;
        }

        .faction-good .card-faction {
            background: #4183d7;
            color: #fff;
        }

        .faction-evil .card-faction {
            background: #dc143c;
            color: #fff;
        }

        .faction-neutral .card-faction {
            background: #a0a0a0;
            color: #000;
        }

        .t2-art {
            flex-shrink: 0;
            width: 100%;
            height: 25mm;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2mm;
        }

        .t2-art svg {
            width: 25mm;
            height: 25mm;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.8));
        }

        .t2-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .t2-name-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 6.5px;
            color: var(--gold-base);
            letter-spacing: 3px;
            font-weight: 600;
            margin-bottom: 0.5mm;
            text-transform: uppercase;
        }

        .t2-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            color: #fff;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1;
            margin-bottom: 1.5mm;
            text-transform: uppercase;
        }

        .gold-text {
            background: linear-gradient(to right, #bf953f, var(--gold-light), #b38728, #fbf5b7, var(--gold-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .t2-ability-box {
            background: rgba(212, 175, 55, 0.08);
            border-left: 1.5mm solid var(--gold-base);
            padding: 1mm 1.5mm;
            margin-bottom: 2mm;
        }

        .t2-ability {
            font-family: 'Montserrat', sans-serif;
            font-size: 7px;
            color: var(--gold-light);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .t2-desc {
            font-family: 'Montserrat', sans-serif;
            font-size: 8px;
            font-weight: 500;
            color: #ffffff;
            line-height: 1.4;
            text-align: left;
        }

        .t2-desc strong {
            color: #ffffff;
            font-weight: 800;
        }

        .t2-footer {
            font-family: 'Montserrat', sans-serif;
            font-size: 6px;
            color: #666;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: right;
            margin-top: auto;
        }

        @media print {
            body {
                background: #fff !important;
                padding: 0;
            }

            h1.print-title,
            .print-subtitle,
            .screen-note,
            .screen-only {
                display: none !important;
            }

            .page {
                background: #ffffff !important;
                margin: 0;
                box-shadow: none !important;
                outline: none !important;
                page-break-after: always;
                padding: 9.15mm 3.75mm;
                border: none;
            }

            .page:last-child {
                page-break-after: auto;
            }
        }

        /* Mobile Responsive */
        @media screen and (max-width: 768px) {
            body { padding: 15px 5px; }
            h1.print-title { font-size: 22px; letter-spacing: 5px; text-align: center; }
            .print-subtitle { font-size: 10px; letter-spacing: 2px; text-align: center; margin-bottom: 15px; }
            .control-panel { 
                padding: 12px; 
                flex-direction: column; 
                gap: 10px;
                border-radius: 8px;
            }
            .control-panel > div {
                flex-direction: column;
                gap: 8px !important;
            }
            .control-group { 
                width: 100%; 
                flex-direction: column; 
                align-items: stretch; 
                gap: 5px; 
            }
            .control-group label { text-align: left; }
            .control-group select { width: 100%; font-size: 14px; padding: 8px; }
            .control-btn { width: 100%; justify-content: center; padding: 12px; font-size: 14px; }
            .control-panel > div > div[style*="width: 2px"] { display: none; } /* Hide separator on mobile */
            
            #pages-container {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 20px;
            }
            
            /* Add some visual cue that it is scrollable horizontally */
            #pages-container::after {
                content: '→ Geser untuk melihat semua kartu →';
                display: block;
                text-align: center;
                font-size: 11px;
                color: #888;
                margin-top: 10px;
                font-family: 'Montserrat', sans-serif;
                width: max-content;
                min-width: 100%;
            }
            
            .screen-note.mobile-only {
                display: block;
                text-align: center;
                font-size: 12px;
                color: #d4af37;
                font-weight: bold;
                margin-bottom: 10px;
            }
        }
    </style>
</head>

<body>

    <h1 class="print-title">Werewolf</h1>
    <p class="print-subtitle">OBSIDIAN VANGUARD EDITION (MODERN SLEEK)</p>
    <div class="control-panel screen-only">
        <div style="width: 100%; text-align: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <p style="margin: 0; font-size: 13px; color: #333; font-weight: 500;">
                <span style="color: #aa771c; font-weight: 700;">PANDUAN CETAK:</span> Tekan <kbd>Ctrl+P</kbd> dan pastikan opsi <strong>"Background graphics"</strong> tercentang.
            </p>
            <p style="margin: 4px 0 0; font-size: 11px; color: #777;">
                Gunakan panel di bawah ini untuk mengontrol resolusi &amp; format, atau klik ganda pada kartu untuk unduhan instan.
            </p>
        </div>
        
        <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%;">
            <div class="control-group">
                <label for="paper-size">Kertas:</label>
                <select id="paper-size" onchange="changePaperSize()">
                    <option value="a4">A4 (9 Kartu)</option>
                    <option value="f4">F4 / Folio (9 Kartu)</option>
                    <option value="a3">A3 (20 Kartu)</option>
                    <option value="a3plus">A3+ (25 Kartu)</option>
                    <option value="single">Single (Cetak PVC)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="pdf-dpi">Detail PDF:</label>
                <select id="pdf-dpi" onchange="changePaperSize()">
                    <option value="1">Standar (96 DPI)</option>
                    <option value="2">Tajam (192 DPI)</option>
                    <option value="4">Ekstrem (384 DPI)</option>
                </select>
            </div>
            <button class="control-btn btn-red" onclick="window.print()" title="Simpan sebagai PDF (Ctrl+P)">
                🖨️ Simpan PDF
            </button>
            
            <div style="width: 2px; background: #eee; margin: 0 5px; border-radius: 2px;"></div>
            
            <div class="control-group">
                <label for="export-format">Format:</label>
                <select id="export-format">
                    <option value="png">PNG (Transparan)</option>
                    <option value="jpg">JPG (Background Hitam)</option>
                </select>
            </div>
            <button id="btn-download-all" class="control-btn btn-gold" onclick="downloadAllCardsDomToImage('ObsidianVanguard', {format: document.getElementById('export-format').value, bgColor: document.getElementById('export-format').value==='jpg'?'#0a0a0c':null})">
                ⬇ Download ZIP
            </button>
        </div>
    </div>

    <div id="pages-container"></div>

    <script src="cards.js"></script>
    <script src="svg_obsidianv.js"></script>
    <script>
        // cardsPerPage is determined dynamically per paper size
        const container = document.getElementById("pages-container");

        function generateCardHTML(card) {
            let factionClass = card.factionUpClass || 'faction-neutral';
            let svgIcon = getSvgObsidianV(card.id, factionClass);

            let factionLabel = '';
            if (factionClass === 'faction-supreme') factionLabel = 'SPECIAL';
            else if (factionClass === 'faction-good') factionLabel = 'ALLIANCE';
            else if (factionClass === 'faction-evil') factionLabel = 'SHADOWS';
            else factionLabel = 'NEUTRAL';

            return `
        <div class="card t2-card ${factionClass}">
            <div class="t2-bg"></div>
            <div class="t2-inner">
                <div class="t2-header">
                    <div class="card-id">${card.id}</div>
                    <div class="card-faction">${factionLabel}</div>
                </div>
                <div class="t2-art">
                    ${svgIcon}
                </div>
                <div class="t2-content">
                    <div class="t2-name-en">${card.nameEn}</div>
                    <div class="t2-name gold-text">${card.nameId}</div>
                    <div class="t2-ability-box">
                        <div class="t2-ability">${card.ability}</div>
                    </div>
                    <div class="t2-desc">${card.desc}</div>
                </div>
                <div class="t2-footer">${card.footer.replace('—', '//')}</div>
            </div>
        </div>
        `;
        }

        // Layout Logic
        function changePaperSize() {
            const paperId = document.getElementById('paper-size').value;
            const container = document.getElementById("pages-container");
            const dpiScale = parseFloat(document.getElementById('pdf-dpi')?.value || 1);
            container.innerHTML = ""; // Clear existing

            let cols = 3, rows = 3;
            let wMM = 210, hMM = 297, cssPadding = "10.5mm 15mm", cssGap = "3mm";
            
            if (paperId === 'a4') {
                cols = 3; rows = 3; wMM = 210; hMM = 297;
                cssPadding = "10.5mm 15mm"; cssGap = "3mm";
            } else if (paperId === 'f4') {
                cols = 3; rows = 3; wMM = 215; hMM = 330;
                cssPadding = "25mm 15.5mm"; cssGap = "5mm";
            } else if (paperId === 'a3') {
                cols = 5; rows = 4; wMM = 297; hMM = 420;
                cssPadding = "28mm 1.1mm"; cssGap = "1.2mm";
            } else if (paperId === 'a3plus') {
                cols = 5; rows = 5; wMM = 329; hMM = 483;
                cssPadding = "8.5mm 11.5mm"; cssGap = "4mm";
            } else if (paperId === 'single') {
                cols = 1; rows = 1; wMM = 54; hMM = 85.6;
                cssPadding = "0"; cssGap = "0mm";
            }
            
            const cssWidth = wMM + "mm";
            const cssHeight = hMM + "mm";
            const printTargetWidth = parseFloat((wMM * dpiScale).toFixed(2)) + "mm";
            const printTargetHeight = parseFloat((hMM * dpiScale).toFixed(2)) + "mm";
            
            const localCardsPerPage = cols * rows;

            // Render Dynamic CSS
            let styleEl = document.getElementById('dynamic-paper-style');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'dynamic-paper-style';
                document.head.appendChild(styleEl);
            }
            
            styleEl.innerHTML = `
                @page { size: ${printTargetWidth} ${printTargetHeight}; margin: 0; }
                @media print {
                    .screen-only, h1.print-title, .print-subtitle, .screen-note { display: none !important; }
                    .page { 
                        width: ${cssWidth}; height: ${cssHeight}; 
                        padding: ${cssPadding} !important; gap: ${cssGap} !important; 
                        margin: 0 !important; page-break-after: always; page-break-inside: avoid; display: grid; overflow: hidden; 
                        zoom: ${dpiScale};
                        background: transparent !important;
                        box-shadow: none !important;
                        border-radius: 0 !important;
                    }
                }
                .page {
                    width: ${cssWidth};
                    min-height: ${cssHeight};
                    padding: ${cssPadding};
                    gap: ${cssGap};
                    display: grid;
                    grid-template-columns: repeat(${cols}, 54mm);
                    grid-auto-rows: 85.6mm;
                    align-content: start;
                    justify-content: center;
                    margin: 0 auto 30px auto;
                    background: #ffffff;
                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
                    border-radius: 12px;
                }
            `;

            let htmlContent = '';
            for (let i = 0; i < cardsData.length; i += localCardsPerPage) {
                const pageCards = cardsData.slice(i, i + localCardsPerPage);
                
                htmlContent += `<div class="page">`;
                pageCards.forEach(card => {
                    htmlContent += generateCardHTML(card);
                });
                htmlContent += `</div>`;
            }

            // Card Backs
            const backContent = `
            <div class="card t2-card">
                <div class="t2-bg"></div>
                <div class="t2-inner" style="justify-content: center; align-items: center; padding: 5mm;">
                    <div style="position: absolute; inset: 2mm; border: 1mm solid rgba(212,175,55,0.8); border-radius: 2mm;"></div>
                    <div style="position: absolute; inset: 4mm; border: 0.3mm dashed rgba(212,175,55,0.5); border-radius: 1mm;"></div>

                    <!-- SVG: Massive Compass Rose / Monogram -->
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width: 35mm; height: 35mm; filter: drop-shadow(0 0 10px rgba(212,175,55,0.5));">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#d4af37" stroke-width="2" />
                        <circle cx="50" cy="50" r="38" fill="none" stroke="#aa771c" stroke-width="1" stroke-dasharray="2,2" />
                        <path d="M50,5 L55,40 L90,50 L55,60 L50,95 L45,60 L10,50 L45,40 Z" fill="#1a1a1a" stroke="#d4af37" stroke-width="1.5" />
                        <path d="M50,5 L50,95 M10,50 L90,50" stroke="#d4af37" stroke-width="1" />
                        <circle cx="50" cy="50" r="16" fill="#8b0000" stroke="#d4af37" stroke-width="2" />
                        <text x="50" y="58" font-family="'Cinzel', serif" font-size="24" font-weight="900" fill="#fcf6ba" text-anchor="middle">W</text>
                    </svg>

                    <div style="font-family: 'Cinzel', serif; font-size: 16px; font-weight: 900; color: var(--gold-base); margin-top: 6mm; letter-spacing: 5px; text-shadow: 0 2px 4px #000;">
                        WEREWOLF</div>
                    <div style="font-family: 'Cinzel', serif; font-size: 10px; font-weight: 800; color: var(--gold-base); letter-spacing: 3px; margin-top: 3px; text-shadow: 0 1px 2px #000;">
                        MRSETIAWAN</div>
                </div>
            </div>
            `;

            htmlContent += `<div class="page">`;
            for(let i = 0; i < localCardsPerPage; i++) {
                htmlContent += backContent;
            }
            htmlContent += `</div>`;

            container.innerHTML = htmlContent;
        }

        // Initialize first render
        changePaperSize();

        // Download Logic
        document.addEventListener('dblclick', function (e) {
            const card = e.target.closest('.card');
            if (!card) return;
            downloadCard(card);
        });

        let lastTap = 0;
        document.addEventListener('touchend', function (e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                const card = e.target.closest('.card');
                if (card) {
                    downloadCard(card);
                    e.preventDefault();
                }
            }
            lastTap = currentTime;
        });

        function downloadCard(card) {
            const format = (document.getElementById('export-format').value || 'png').trim().toLowerCase();
            const idElement = card.querySelector('.card-id');
            let cardId = idElement ? idElement.innerText : 'card-back';
            cardId = cardId.replace(/·/g, '-');
            const bgColor = format === 'jpg' ? '#0a0a0c' : null;
            downloadCardDomToImage(card, `ObsidianVanguard-${cardId}`, { format, bgColor });
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="download_helper.js?v=2"></script>
</body>

</html>
