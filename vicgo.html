<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf: Premium Card Themes Gallery</title>

    <!-- Fonts for all themes -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@700;900&family=Chakra+Petch:wght@400;600&family=Macondo&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            /* Faction Colors - Strictly Enforced */
            --c-mod-m: #2C2C2C;
            --c-mod-a: #C9A84C;
            --c-see-m: #1A2744;
            --c-see-a: #C0C0C0;
            --c-ww-m: #8B1A1A;
            --c-ww-a: #3A3A3A;
            --c-jes-m: #1A1A1A;
            --c-jes-a: #E8DCC4;

            /* Gallery Colors */
            --bg-gallery: #121418;
            --text-gallery: #F0F4F8;
            --panel-bg: #1E2229;
            --tab-active: #C9A84C;
        }

        [data-theme="light"] {
            --bg-gallery: #E2E8F0;
            --text-gallery: #1A202C;
            --panel-bg: #FFFFFF;
            --tab-active: #8B1A1A;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gallery);
            color: var(--text-gallery);
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
        }

        /* Gallery Layout */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.2);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-family: 'Cinzel', serif;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background: var(--panel-bg);
            color: var(--text-gallery);
            border: 1px solid rgba(128, 128, 128, 0.3);
            transition: all 0.2s;
        }

        button:hover {
            filter: brightness(1.2);
        }

        .tab-btn.active {
            background: var(--tab-active);
            color: #111;
            border-color: var(--tab-active);
        }

        .theme-section {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        .theme-section.active {
            display: flex;
        }

        .theme-info {
            background: var(--panel-bg);
            padding: 15px 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 800px;
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        .theme-info h2 {
            color: var(--tab-active);
            margin-bottom: 5px;
        }

        /* Card Grid Layout */
        .card-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
        }

        /* --- THE CARD --- 
           Size ratio 54x85.6mm -> using 270x428px for crisp web viewing 
        */
        .card-wrapper {
            position: relative;
            transition: transform 0.3s;
        }

        .card-wrapper:hover {
            transform: scale(1.05) translateY(-10px);
            z-index: 10;
        }

        .card-label {
            position: absolute;
            top: -25px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-gallery);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            width: 270px;
            height: 428px;
            background-color: var(--c-bg);
            border: 2px solid var(--c-main);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* Card Zones - STRICT Layout */
        .c-top {
            height: 12%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            background: var(--c-main);
            color: var(--c-bg);
            border-bottom: 2px solid var(--c-acc);
            z-index: 2;
        }

        .c-top .id {
            font-size: 0.7rem;
            font-family: sans-serif;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .c-top .fac {
            font-size: 0.85rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .c-top .ico {
            font-size: 1.1rem;
        }

        .c-mid {
            height: 50%;
            width: 100%;
            position: relative;
            overflow: hidden;
            background: var(--c-bg);
            border-bottom: 2px solid var(--c-main);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .c-mid svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .c-bot {
            height: 38%;
            padding: 10px;
            display: flex;
            flex-direction: column;
            background: var(--c-bg);
            position: relative;
            z-index: 2;
        }

        /* Typography within Card */
        .c-title {
            font-family: var(--f-disp);
            font-size: 1.6rem;
            color: var(--c-main);
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .c-sub {
            font-family: var(--f-body);
            font-size: 0.8rem;
            color: var(--c-acc);
            font-style: italic;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--c-acc);
            padding-bottom: 4px;
        }

        .c-quote {
            font-family: var(--f-body);
            font-size: 0.75rem;
            color: var(--c-main);
            font-style: italic;
            margin-bottom: 6px;
            line-height: 1.2;
            opacity: 0.9;
            flex-shrink: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .c-desc {
            font-family: var(--f-body);
            font-size: 0.75rem;
            color: #222;
            /* Always dark for readability on CMYK safe BG */
            line-height: 1.3;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Ensures Jester's light background doesn't make text invisible */
        .card[data-fac="jes"] .c-desc {
            color: #111;
        }

        .c-num {
            position: absolute;
            bottom: 6px;
            right: 10px;
            font-family: sans-serif;
            font-size: 0.6rem;
            font-weight: bold;
            color: var(--c-main);
            opacity: 0.6;
        }

        /* Back Card Specifics */
        .card-back {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--c-bg);
            border: 4px solid var(--c-acc);
            padding: 10px;
        }

        .card-back svg {
            width: 90%;
            height: auto;
            max-height: 80%;
        }

        .back-footer {
            position: absolute;
            bottom: 8px;
            font-size: 0.55rem;
            letter-spacing: 2px;
            color: var(--c-acc);
            font-family: sans-serif;
            font-weight: bold;
        }

        /* SVG Inner Layers & FX Base */
        .fg-layer {
            z-index: 3;
        }

        .mg-layer {
            z-index: 2;
            opacity: 0.8;
        }

        .bg-layer {
            z-index: 1;
            opacity: 0.4;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Faction Variable Injection */
        .fac-mod {
            --c-main: var(--c-mod-m);
            --c-acc: var(--c-mod-a);
        }

        .fac-see {
            --c-main: var(--c-see-m);
            --c-acc: var(--c-see-a);
        }

        .fac-ww {
            --c-main: var(--c-ww-m);
            --c-acc: var(--c-ww-a);
        }

        .fac-jes {
            --c-main: var(--c-jes-m);
            --c-acc: var(--c-jes-a);
        }

        /* Theme Variable Injection */
        .theme-t1 {
            --f-disp: 'Cinzel', serif;
            --f-body: 'Crimson Pro', serif;
            --c-bg: #F9F7F2;
        }


    </style>
</head>

<body>

    <header>
        <h1>Werewolf: Victorian Gothic Gallery</h1>
        <div class="controls">
            <button onclick="toggleMode()">🌓 Dark/Light Mode</button>
        </div>
    </header>

    <main id="gallery-container">
        <!-- Rendered via JS -->
    </main>

    <script>
        // Faction Data Definition
        const factions = [
            {
                id: 'mod', code: 'WW-M01', fac: 'Moderator', icon: '⚖️',
                title: 'Moderator', sub: 'The Moderator',
                quote: '"Aturan adalah absolut. Nyawa kalian adalah bidak di atas papanku."',
                desc: 'Mengatur jalannya permainan. Tak tersentuh oleh kekuatan faksi manapun. Netral dan berkuasa.'
            },
            {
                id: 'see', code: 'WW-S02', fac: 'Seer', icon: '👁️',
                title: 'Peramal', sub: 'The Seer',
                quote: '"Mataku menguliti gelapnya malam, mengungkap monster di balik senyum palsumu."',
                desc: 'Setiap malam, tunjuk 1 pemain. Kamu akan melihat faksi aslinya. Bimbing warga di siang hari.'
            },
            {
                id: 'ww', code: 'WW-W03', fac: 'Werewolf', icon: '🐺',
                title: 'Manusia Serigala', sub: 'The Werewolf',
                quote: '"Lolongan kami adalah melodi kematian. Daging kalian hanyalah hidangan pembuka."',
                desc: 'Bangun setiap malam bersama kawanannya untuk mencabik 1 mangsa. Berbaur sebagai warga di siang hari.'
            },
            {
                id: 'jes', code: 'WW-J04', fac: 'Jester', icon: '🃏',
                title: 'Badut', sub: 'The Jester',
                quote: '"Hahaha! Gantung aku! Sorakan kebencian kalian adalah melodi kemenanganku."',
                desc: 'Menang mutlak sendirian jika kamu berhasil memanipulasi warga untuk mengeksekusimu di siang hari.'
            }
        ];

        // SVG Arts Data (Massive Inline SVGs meeting all strict criteria)
        const svgs = {
            /* ================= THEME 1: VICTORIAN GOTHIC ================= */
            t1: {
                mod: `
                <svg viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="t1-m-bg" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#F9F7F2"/>
                            <stop offset="100%" stop-color="#E8E2D2"/>
                        </radialGradient>
                        <linearGradient id="t1-m-gold" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#E5C773"/>
                            <stop offset="50%" stop-color="#C9A84C"/>
                            <stop offset="100%" stop-color="#8B7330"/>
                        </linearGradient>
                    </defs>
                    <rect width="100" height="100" fill="url(#t1-m-bg)"/>
                    <!-- BG Layer: Ornate Clockwork -->
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#2C2C2C" stroke-width="0.5" opacity="0.3"/>
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#2C2C2C" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.4"/>
                    <path d="M50 10 L50 90 M10 50 L90 50 M22 22 L78 78 M22 78 L78 22" stroke="#2C2C2C" stroke-width="0.5" opacity="0.2"/>
                    <!-- Mid Layer: Stand & Chains -->
                    <path d="M48 20 L52 20 L52 80 L48 80 Z" fill="#2C2C2C"/>
                    <path d="M35 80 L65 80 L60 85 L40 85 Z" fill="#2C2C2C"/>
                    <path d="M50 20 L25 40 L25 60 M50 20 L75 40 L75 60" fill="none" stroke="url(#t1-m-gold)" stroke-width="1" stroke-dasharray="1 1"/>
                    <!-- Fore Layer: Gothic Scales & Crown -->
                    <path d="M20 38 L80 38 L75 42 L25 42 Z" fill="url(#t1-m-gold)"/>
                    <path d="M15 60 Q25 70 35 60 Z" fill="#2C2C2C"/>
                    <path d="M65 60 Q75 70 85 60 Z" fill="#2C2C2C"/>
                    <!-- Central Gem -->
                    <polygon points="50,42 55,50 50,58 45,50" fill="#8B1A1A"/>
                    <polygon points="50,42 52,50 50,58 48,50" fill="#FF5555" opacity="0.5"/>
                    <path d="M45 15 L50 5 L55 15 Z" fill="url(#t1-m-gold)"/>
                </svg>`,
                see: `
                <svg viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="t1-s-bg" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#1A2744"/>
                            <stop offset="100%" stop-color="#0B1221"/>
                        </radialGradient>
                    </defs>
                    <rect width="100" height="100" fill="url(#t1-s-bg)"/>
                    <!-- BG Layer: Gothic Window Arch -->
                    <path d="M20 50 L20 20 Q50 -10 80 20 L80 50 Q80 80 50 90 Q20 80 20 50 Z" fill="none" stroke="#C0C0C0" stroke-width="1.5" opacity="0.4"/>
                    <path d="M30 50 L30 30 Q50 10 70 30 L70 50 Q70 70 50 80 Q30 70 30 50 Z" fill="none" stroke="#C0C0C0" stroke-width="0.5" opacity="0.3"/>
                    <!-- Mid Layer: Mystical Filigree/Tears -->
                    <path d="M50 80 Q45 90 50 95 Q55 90 50 80 Z" fill="#C0C0C0"/>
                    <path d="M50 5 Q48 15 50 20 Q52 15 50 5 Z" fill="#C0C0C0"/>
                    <circle cx="50" cy="50" r="25" fill="none" stroke="#C0C0C0" stroke-width="2" stroke-dasharray="3 3"/>
                    <!-- Fore Layer: The All-Seeing Eye -->
                    <path d="M25 50 Q50 30 75 50 Q50 70 25 50 Z" fill="#F9F7F2" stroke="#C0C0C0" stroke-width="2"/>
                    <circle cx="50" cy="50" r="12" fill="#1A2744"/>
                    <circle cx="50" cy="50" r="5" fill="#C0C0C0"/>
                    <circle cx="47" cy="47" r="2" fill="#FFFFFF"/>
                </svg>`,
                ww: `
                <svg viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="t1-w-bg" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#8B1A1A"/>
                            <stop offset="100%" stop-color="#3A0A0A"/>
                        </radialGradient>
                        <linearGradient id="t1-w-fur" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3A3A3A"/>
                            <stop offset="100%" stop-color="#111111"/>
                        </linearGradient>
                    </defs>
                    <rect width="100" height="100" fill="url(#t1-w-bg)"/>
                    <!-- BG Layer: Blood Moon & Dead Trees -->
                    <circle cx="50" cy="45" r="30" fill="#E8DCC4" opacity="0.8"/>
                    <path d="M50 45 A 30 30 0 0 1 25 60 A 35 35 0 0 0 50 45 Z" fill="#3A0A0A" opacity="0.3"/>
                    <path d="M0 100 L15 70 L20 80 L30 65 L40 90 L0 100 Z" fill="#1A1A1A" opacity="0.6"/>
                    <path d="M100 100 L85 60 L80 75 L70 50 L60 85 L100 100 Z" fill="#1A1A1A" opacity="0.6"/>
                    <!-- Mid Layer: Fangs/Saliva Silhouette -->
                    <path d="M60 55 L58 75 L62 70 Z" fill="#8B1A1A"/>
                    <path d="M65 60 L64 80 L67 75 Z" fill="#8B1A1A"/>
                    <!-- Fore Layer: Gothic Wolf Profile -->
                    <path d="M10 90 Q30 50 40 30 L45 15 L55 30 L65 30 L80 45 Q70 50 60 45 L50 60 L85 65 L80 80 Q50 70 30 95 Z" fill="url(#t1-w-fur)" stroke="#1A1A1A" stroke-width="1.5"/>
                    <!-- Eye & Teeth -->
                    <polygon points="50,38 58,40 54,43" fill="#8B1A1A"/>
                    <polygon points="65,46 72,52 68,48" fill="#F9F7F2"/>
                    <polygon points="60,47 66,54 62,50" fill="#F9F7F2"/>
                    <polygon points="65,60 70,55 68,62" fill="#F9F7F2"/>
                </svg>`,
                jes: `
                <svg viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="t1-j-mask" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FFFFFF"/>
                            <stop offset="100%" stop-color="#E8DCC4"/>
                        </linearGradient>
                    </defs>
                    <rect width="100" height="100" fill="#1A1A1A"/>
                    <!-- BG Layer: Curtains/Chaos -->
                    <path d="M0 0 Q25 50 0 100 Z" fill="#3A3A3A"/>
                    <path d="M100 0 Q75 50 100 100 Z" fill="#3A3A3A"/>
                    <path d="M20 0 L30 100 M80 0 L70 100" stroke="#F5F0E8" stroke-width="0.5" opacity="0.2"/>
                    <!-- Mid Layer: Hat/Bells -->
                    <path d="M25 40 Q50 -10 75 40 Q85 30 90 45 Q50 20 10 45 Q15 30 25 40 Z" fill="#8B1A1A" stroke="#E8DCC4" stroke-width="1"/>
                    <circle cx="10" cy="45" r="4" fill="#C9A84C"/>
                    <circle cx="90" cy="45" r="4" fill="#C9A84C"/>
                    <!-- Fore Layer: Porcelain Mask -->
                    <path d="M25 40 Q50 20 75 40 Q85 70 50 90 Q15 70 25 40 Z" fill="url(#t1-j-mask)" stroke="#C9A84C" stroke-width="2"/>
                    <!-- Eyes & Tears -->
                    <path d="M35 55 Q40 50 45 55 Q40 60 35 55 Z" fill="#1A1A1A"/>
                    <path d="M55 55 Q60 48 65 55 Q60 62 55 55 Z" fill="#1A1A1A"/>
                    <path d="M40 60 Q38 70 42 75 Q42 65 40 60 Z" fill="#8B1A1A"/>
                    <!-- Smile & Cracks -->
                    <path d="M30 75 Q50 90 70 75" fill="none" stroke="#8B1A1A" stroke-width="3"/>
                    <path d="M30 75 L35 70 M70 75 L65 70" stroke="#8B1A1A" stroke-width="2"/>
                    <path d="M60 35 L65 45 L70 40 M45 80 L50 70 L55 85" stroke="#1A1A1A" stroke-width="1" fill="none" opacity="0.6"/>
                </svg>`,
                back: `
                <svg viewBox="0 0 100 100">
                    <rect width="100" height="100" fill="#1A1A1A"/>
                    <!-- BG Mandala -->
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#3A3A3A" stroke-width="2"/>
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="2 2"/>
                    <path d="M50 5 L55 25 L75 25 L60 40 L65 60 L50 50 L35 60 L40 40 L25 25 L45 25 Z" fill="none" stroke="#3A3A3A" stroke-width="1.5"/>
                    <path d="M50 95 L45 75 L25 75 L40 60 L35 40 L50 50 L65 40 L60 60 L75 75 L55 75 Z" fill="none" stroke="#3A3A3A" stroke-width="1.5"/>
                    
                    <!-- Mid Layer Ornamentation -->
                    <circle cx="50" cy="50" r="22" fill="#2C2C2C" stroke="#C9A84C" stroke-width="2"/>
                    <path d="M50 28 A 22 22 0 0 1 72 50 A 22 22 0 0 0 50 72 A 22 22 0 0 1 28 50 A 22 22 0 0 0 50 28 Z" fill="#1A1A1A" opacity="0.8"/>
                    
                    <!-- Fore Center Brand -->
                    <text x="50" y="52" font-family="Cinzel" font-size="8" font-weight="900" fill="#C9A84C" text-anchor="middle" letter-spacing="1">WEREWOLF</text>
                    <text x="50" y="58" font-family="Crimson Pro" font-size="4" fill="#E8DCC4" text-anchor="middle" letter-spacing="2">GOTHIC DECK</text>
                </svg>`
            },
        };

        const themes = [
            {
                id: 't1',
                name: 'Victorian Gothic',
                tagline: 'Klasik, Elegan, Mencekam',
                desc: 'Gaya visual Eropa klasik yang mengandalkan garis tegas, lengkung simetris, dan atmosfer gelap. Penggunaan bingkai filigree dengan perpaduan warna yang kaya dan muram.'
            },

        ];

        function renderCard(faction, themeId) {
            // Build Front Card
            const isBack = faction.id === 'back';
            const facClass = `fac-${faction.id}`;
            const themeClass = `theme-${themeId}`;
            const svgContent = svgs[themeId][faction.id];

            if (isBack) {
                return `
                <div class="card-wrapper">
                    <div class="card-label">Back Card</div>
                    <div class="card card-back ${themeClass}">
                        ${svgContent}
                        <div class="back-footer">&copy; MRSETIAWAN</div>
                    </div>
                </div>
            `;
            }

            return `
            <div class="card-wrapper">
                <div class="card-label">${faction.fac}</div>
                <div class="card ${facClass} ${themeClass}" data-fac="${faction.id}">
                    <div class="c-top">
                        <span class="id">${faction.code}</span>
                        <span class="fac">${faction.fac}</span>
                        <span class="ico">${faction.icon}</span>
                    </div>
                    <div class="c-mid">
                        ${svgContent}
                    </div>
                    <div class="c-bot">
                        <div class="c-title">${faction.title}</div>
                        <div class="c-sub">${faction.sub}</div>
                        <div class="c-quote">${faction.quote}</div>
                        <div class="c-desc">${faction.desc}</div>
                        <span class="c-num">${faction.code.slice(-2)}/05</span>
                    </div>
                </div>
            </div>
        `;
        }

        function renderGallery() {
            const container = document.getElementById('gallery-container');
            let html = '';

            themes.forEach((theme, index) => {
                const isActive = index === 0 ? 'active' : '';
                html += `
                <section id="sec-${theme.id}" class="theme-section ${isActive}">
                    <div class="theme-info">
                        <h2>${theme.name}</h2>
                        <h4 style="color: var(--text-gallery); margin-bottom: 10px; font-weight: normal; opacity: 0.8;">${theme.tagline}</h4>
                        <p style="font-size: 0.9rem; line-height: 1.5; color: var(--text-gallery);">${theme.desc}</p>
                    </div>
                    <div class="card-grid">
                        ${factions.map(fac => renderCard(fac, theme.id)).join('')}
                        ${renderCard({ id: 'back' }, theme.id)}
                    </div>
                </section>
            `;
            });

            container.innerHTML = html;
        }

        // Interactions

        function toggleMode() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
            }
        }

        // Initialize
        window.onload = renderGallery;

    </script>

</body>

</html>
